<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Work Tracker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --bg: #f5f6f8;
      --surface: #ffffff;
      --surface-soft: #f8fafc;
      --border: #dfe3e8;
      --text: #1f2937;
      --muted: #667085;
      --primary: #4f46e5;
      --primary-dark: #4338ca;
      --danger: #c62828;
      --shadow: 0 12px 36px rgba(15, 23, 42, .14);
      --radius: 10px;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, "Segoe UI", system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    header {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem 1.5rem;
      background: rgba(255, 255, 255, .96);
      border-bottom: 1px solid var(--border);
    }
    .brand h1 { margin: 0; font-size: 1.25rem; }
    .brand p { margin: .2rem 0 0; color: var(--muted); font-size: .8rem; }
    .header-actions { display: flex; align-items: center; gap: 1rem; }
    .stats { display: flex; gap: 1rem; color: var(--muted); font-size: .78rem; }
    .stats strong { color: var(--text); }
    .btn {
      border: 1px solid transparent;
      border-radius: 8px;
      padding: .55rem .9rem;
      font-weight: 650;
      font-size: .82rem;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-secondary {
      background: #fff;
      border-color: var(--border);
      color: var(--text);
    }
    .btn-secondary:hover { background: var(--surface-soft); }
    .btn-danger {
      background: #fff;
      border-color: #efb4b4;
      color: var(--danger);
    }
    .board {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      min-height: calc(100vh - 74px);
      overflow-x: auto;
      padding: 1.25rem 1.5rem 2rem;
    }
    .column {
      display: flex;
      flex-direction: column;
      width: 285px;
      min-width: 285px;
      max-height: calc(100vh - 110px);
      background: #eef1f5;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      transition: border-color .15s, background .15s;
    }
    .column.drag-over {
      border-color: var(--primary);
      background: #e8e7ff;
    }
    .column-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .8rem .85rem;
      border-bottom: 1px solid var(--border);
    }
    .column-title {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-size: .8rem;
      font-weight: 750;
    }
    .column-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
    }
    .column-count {
      padding: .15rem .45rem;
      border-radius: 20px;
      background: #fff;
      color: var(--muted);
      font-size: .72rem;
    }
    .card-list {
      display: flex;
      flex-direction: column;
      gap: .65rem;
      min-height: 70px;
      overflow-y: auto;
      padding: .7rem;
    }
    .empty {
      padding: 1rem .5rem;
      color: var(--muted);
      font-size: .78rem;
      text-align: center;
    }
    .task-card {
      position: relative;
      padding: .8rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 1px 2px rgba(15, 23, 42, .04);
      cursor: pointer;
      transition: transform .15s, border-color .15s, box-shadow .15s;
    }
    .task-card:hover {
      transform: translateY(-1px);
      border-color: #aaa6f5;
      box-shadow: 0 5px 16px rgba(15, 23, 42, .08);
    }
    .task-card.dragging { opacity: .45; }
    .card-title {
      margin: 0 1.5rem .55rem 0;
      font-size: .88rem;
      line-height: 1.4;
    }
    .card-delete {
      position: absolute;
      top: .55rem;
      right: .55rem;
      border: 0;
      background: transparent;
      color: #98a2b3;
      font-size: .85rem;
    }
    .card-delete:hover { color: var(--danger); }
    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: .35rem;
      margin-bottom: .5rem;
    }
    .pill {
      padding: .17rem .45rem;
      border-radius: 20px;
      background: #eef2ff;
      color: #4338ca;
      font-size: .66rem;
      font-weight: 650;
    }
    .priority-high { background: #fee2e2; color: #b91c1c; }
    .priority-medium { background: #fef3c7; color: #92400e; }
    .priority-low { background: #dcfce7; color: #166534; }
    .card-line {
      margin: .3rem 0 0;
      color: var(--muted);
      font-size: .72rem;
      line-height: 1.35;
    }
    .card-line strong { color: #475467; }
    .add-task {
      margin: 0 .7rem .7rem;
      padding: .5rem;
      border: 1px dashed #b8c0cc;
      border-radius: 7px;
      background: transparent;
      color: #596579;
      font-size: .78rem;
    }
    .add-task:hover {
      border-color: var(--primary);
      background: #fff;
      color: var(--primary);
    }
    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background: rgba(15, 23, 42, .55);
    }
    .modal {
      width: min(820px, 100%);
      max-height: calc(100vh - 2rem);
      overflow-y: auto;
      background: var(--surface);
      border-radius: 14px;
      box-shadow: var(--shadow);
    }
    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      padding: 1.2rem 1.35rem;
      border-bottom: 1px solid var(--border);
    }
    .modal-header h2 { margin: 0; font-size: 1.1rem; }
    .modal-header p {
      margin: .25rem 0 0;
      color: var(--muted);
      font-size: .78rem;
    }
    .close-button {
      border: 0;
      background: transparent;
      color: var(--muted);
      font-size: 1.3rem;
      line-height: 1;
    }
    .form-body { padding: 1.2rem 1.35rem; }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: .9rem 1rem;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: .35rem;
    }
    .field.full { grid-column: 1 / -1; }
    label {
      color: #344054;
      font-size: .76rem;
      font-weight: 700;
    }
    input, select, textarea {
      width: 100%;
      padding: .58rem .65rem;
      border: 1px solid #cfd5dd;
      border-radius: 7px;
      outline: none;
      background: #fff;
      color: var(--text);
      font-size: .83rem;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, .1);
    }
    textarea {
      min-height: 82px;
      resize: vertical;
      line-height: 1.45;
    }
    textarea.long { min-height: 115px; }
    .hint {
      margin: 0;
      color: var(--muted);
      font-size: .7rem;
    }
    .modal-actions {
      display: flex;
      justify-content: space-between;
      gap: .75rem;
      padding: 1rem 1.35rem;
      border-top: 1px solid var(--border);
      border-radius: 0 0 14px 14px;
      background: var(--surface-soft);
    }
    .action-group { display: flex; gap: .6rem; }
    .required { color: var(--danger); }
    .account-area {
      display: flex;
      align-items: center;
      gap: .65rem;
    }
    .account-email {
      max-width: 220px;
      overflow: hidden;
      color: var(--muted);
      font-size: .76rem;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .sync-status {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      padding: .28rem .55rem;
      border-radius: 20px;
      background: #eef2f6;
      color: #475467;
      font-size: .7rem;
      font-weight: 700;
    }
    .sync-status::before {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #98a2b3;
      content: "";
    }
    .sync-status.synced::before { background: #22c55e; }
    .sync-status.syncing::before { background: #f59e0b; }
    .sync-status.failed::before { background: #ef4444; }
    .welcome-wrap {
      display: grid;
      min-height: calc(100vh - 75px);
      padding: 2rem 1rem;
      place-items: center;
    }
    .welcome-card {
      width: min(560px, 100%);
      padding: 2rem;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--surface);
      box-shadow: 0 8px 28px rgba(15, 23, 42, .08);
      text-align: center;
    }
    .welcome-card h2 { margin: 0 0 .65rem; }
    .welcome-card p {
      margin: 0 auto 1.25rem;
      color: var(--muted);
      line-height: 1.6;
    }
    .setup-note, .error-note {
      margin-top: 1rem;
      padding: .75rem;
      border-radius: 8px;
      font-size: .78rem;
      line-height: 1.45;
      text-align: left;
    }
    .setup-note { background: #fff7ed; color: #9a3412; }
    .error-note { background: #fef2f2; color: #b91c1c; }
    .import-banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin: 1rem 1.5rem 0;
      padding: .75rem 1rem;
      border: 1px solid #c7d2fe;
      border-radius: 9px;
      background: #eef2ff;
      color: #3730a3;
      font-size: .8rem;
    }
    .import-banner.error-note {
      border-color: #fecaca;
      background: #fef2f2;
      color: #b91c1c;
    }
    .loading-board {
      padding: 3rem;
      color: var(--muted);
      text-align: center;
    }
    @media (max-width: 700px) {
      header {
        align-items: flex-start;
        padding: .85rem 1rem;
      }
      .brand p, .stats { display: none; }
      .board { padding: 1rem; }
      .column {
        width: 270px;
        min-width: 270px;
      }
      .form-grid { grid-template-columns: 1fr; }
      .field.full { grid-column: auto; }
      .modal-actions {
        align-items: stretch;
        flex-direction: column-reverse;
      }
      .action-group { justify-content: flex-end; }
      .account-email { display: none; }
      .account-area { gap: .4rem; }
      .header-actions { gap: .45rem; }
      .sync-status { padding: .28rem .42rem; }
      .import-banner {
        align-items: stretch;
        flex-direction: column;
        margin: .75rem 1rem 0;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import {
      browserLocalPersistence,
      getAuth,
      GoogleAuthProvider,
      onAuthStateChanged,
      setPersistence,
      signInWithPopup,
      signOut
    } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    import {
      collection,
      deleteDoc,
      doc,
      getFirestore,
      onSnapshot,
      serverTimestamp,
      setDoc,
      writeBatch
    } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT.firebaseapp.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    const configured = !Object.values(firebaseConfig).some(
      value => typeof value === "string" && value.includes("YOUR_")
    );

    try {
      if (!configured) {
        window.firebaseServices = { configured: false };
      } else {
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        await setPersistence(auth, browserLocalPersistence);
        const db = getFirestore(app);

        window.firebaseServices = {
          configured: true,
          auth,
          db,
          GoogleAuthProvider,
          onAuthStateChanged,
          signInWithPopup,
          signOut,
          collection,
          doc,
          setDoc,
          deleteDoc,
          onSnapshot,
          serverTimestamp,
          writeBatch
        };
      }
    } catch (error) {
      console.error("Firebase could not start", error);
      window.firebaseServices = { configured: false, error };
    }

    window.dispatchEvent(new CustomEvent("firebase-ready"));
  </script>

  <script type="text/babel">
    const { useEffect, useRef, useState } = React;

    const STORAGE_KEY = "dailyWorkTrackerTasks";
    const LEGACY_KEY = "kanban";
    const CACHE_PREFIX = "dailyWorkTrackerCache:";

    const COLUMNS = [
      { id: "new", title: "New", color: "#64748b" },
      { id: "todo", title: "To Do", color: "#8b5cf6" },
      { id: "inprogress", title: "In Progress", color: "#f59e0b" },
      { id: "feedback", title: "Waiting for Feedback", color: "#0ea5e9" },
      { id: "done", title: "Done", color: "#22c55e" },
      { id: "archived", title: "Archived", color: "#94a3b8" }
    ];

    const PRIORITIES = ["Low", "Medium", "High"];

    const today = () => new Date().toISOString().slice(0, 10);

    const makeId = () =>
      `task-${Date.now()}-${Math.random().toString(16).slice(2)}`;

    const blankTask = status => ({
      id: makeId(),
      status: status || "new",
      title: "",
      source: "",
      receivedDate: today(),
      project: "",
      background: "",
      priority: "Medium",
      deadline: "",
      nextAction: "",
      processNotes: "",
      feedbackRecords: "",
      finalResult: "",
      links: "",
      order: 0
    });

    function normalizeTask(task) {
      const oldStatus = task.status || task.col || "new";
      const status = oldStatus === "review" ? "feedback" : oldStatus;

      return {
        ...blankTask(status),
        ...task,
        id: task.id || makeId(),
        status,
        title: task.title || task.text || "Untitled task",
        project: task.project || task.tag || "",
        background: task.background || "",
        source: task.source || "",
        receivedDate: task.receivedDate || "",
        priority: PRIORITIES.includes(task.priority)
          ? task.priority
          : "Medium",
        deadline: task.deadline || "",
        nextAction: task.nextAction || "",
        processNotes: task.processNotes || "",
        feedbackRecords: task.feedbackRecords || "",
        finalResult: task.finalResult || "",
        links: task.links || "",
        order: Number.isFinite(task.order) ? task.order : 0
      };
    }

    function loadLocalTasks() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) return JSON.parse(saved).map(normalizeTask);

        const legacy = localStorage.getItem(LEGACY_KEY);
        if (legacy) return JSON.parse(legacy).map(normalizeTask);
      } catch (error) {
        console.warn("Could not load saved tasks", error);
      }

      return [];
    }

    function loadCache(uid) {
      try {
        const saved = localStorage.getItem(`${CACHE_PREFIX}${uid}`);
        return saved ? JSON.parse(saved).map(normalizeTask) : [];
      } catch {
        return [];
      }
    }

    function saveCache(uid, tasks) {
      try {
        localStorage.setItem(
          `${CACHE_PREFIX}${uid}`,
          JSON.stringify(tasks)
        );
      } catch (error) {
        console.warn("Could not update the local task cache", error);
      }
    }

    function taskForFirestore(task, timestamp) {
      return {
        title: task.title || "",
        source: task.source || "",
        receivedDate: task.receivedDate || "",
        project: task.project || "",
        background: task.background || "",
        priority: task.priority || "Medium",
        deadline: task.deadline || "",
        nextAction: task.nextAction || "",
        processNotes: task.processNotes || "",
        feedbackRecords: task.feedbackRecords || "",
        finalResult: task.finalResult || "",
        links: task.links || "",
        status: task.status || "new",
        order: Number.isFinite(task.order) ? task.order : 0,
        updatedAt: timestamp
      };
    }

    function TaskModal({
      task,
      isNew,
      onSave,
      onDelete,
      onClose
    }) {
      const [form, setForm] = useState(task);

      useEffect(() => {
        const closeOnEscape = event => {
          if (event.key === "Escape") onClose();
        };

        window.addEventListener("keydown", closeOnEscape);
        return () =>
          window.removeEventListener("keydown", closeOnEscape);
      }, [onClose]);

      const change = event => {
        setForm({
          ...form,
          [event.target.name]: event.target.value
        });
      };

      const submit = event => {
        event.preventDefault();
        if (!form.title.trim()) return;

        onSave({
          ...form,
          title: form.title.trim()
        });
      };

      return (
        <div
          className="modal-backdrop"
          onMouseDown={event => {
            if (event.target === event.currentTarget) onClose();
          }}
        >
          <form className="modal" onSubmit={submit}>
            <div className="modal-header">
              <div>
                <h2>{isNew ? "Add a work task" : "Task details"}</h2>
                <p>
                  Record only what is useful now. You can return and
                  add more detail later.
                </p>
              </div>

              <button
                type="button"
                className="close-button"
                aria-label="Close"
                onClick={onClose}
              >
                ×
              </button>
            </div>

            <div className="form-body">
              <div className="form-grid">
                <div className="field full">
                  <label htmlFor="title">
                    Task title <span className="required">*</span>
                  </label>
                  <input
                    id="title"
                    name="title"
                    value={form.title}
                    onChange={change}
                    placeholder="What needs to be done?"
                    autoFocus
                  />
                </div>

                <div className="field">
                  <label htmlFor="source">
                    Task source / who assigned it
                  </label>
                  <input
                    id="source"
                    name="source"
                    value={form.source}
                    onChange={change}
                    placeholder="e.g. Manager, client, self"
                  />
                </div>

                <div className="field">
                  <label htmlFor="project">
                    Project or category
                  </label>
                  <input
                    id="project"
                    name="project"
                    value={form.project}
                    onChange={change}
                    placeholder="e.g. Website launch"
                  />
                </div>

                <div className="field full">
                  <label htmlFor="background">
                    Task background
                  </label>
                  <textarea
                    id="background"
                    name="background"
                    value={form.background}
                    onChange={change}
                    placeholder="Why is this task needed? Add the request, context, or expected outcome…"
                  />
                </div>

                <div className="field">
                  <label htmlFor="receivedDate">
                    Received date
                  </label>
                  <input
                    id="receivedDate"
                    type="date"
                    name="receivedDate"
                    value={form.receivedDate}
                    onChange={change}
                  />
                </div>

                <div className="field">
                  <label htmlFor="deadline">Deadline</label>
                  <input
                    id="deadline"
                    type="date"
                    name="deadline"
                    value={form.deadline}
                    onChange={change}
                  />
                </div>

                <div className="field">
                  <label htmlFor="priority">Priority</label>
                  <select
                    id="priority"
                    name="priority"
                    value={form.priority}
                    onChange={change}
                  >
                    {PRIORITIES.map(priority => (
                      <option key={priority}>{priority}</option>
                    ))}
                  </select>
                </div>

                <div className="field">
                  <label htmlFor="status">
                    Current progress
                  </label>
                  <select
                    id="status"
                    name="status"
                    value={form.status}
                    onChange={change}
                  >
                    {COLUMNS.map(column => (
                      <option key={column.id} value={column.id}>
                        {column.title}
                      </option>
                    ))}
                  </select>
                </div>

                <div className="field full">
                  <label htmlFor="nextAction">Next action</label>
                  <textarea
                    id="nextAction"
                    name="nextAction"
                    value={form.nextAction}
                    onChange={change}
                    placeholder="What is the very next step?"
                  />
                </div>

                <div className="field full">
                  <label htmlFor="processNotes">
                    Work process notes
                  </label>
                  <textarea
                    className="long"
                    id="processNotes"
                    name="processNotes"
                    value={form.processNotes}
                    onChange={change}
                    placeholder="Add dated notes about decisions, progress, conversations, or blockers…"
                  />
                </div>

                <div className="field full">
                  <label htmlFor="feedbackRecords">
                    Feedback records
                  </label>
                  <textarea
                    className="long"
                    id="feedbackRecords"
                    name="feedbackRecords"
                    value={form.feedbackRecords}
                    onChange={change}
                    placeholder="Record who gave feedback, when, and what changed…"
                  />
                </div>

                <div className="field full">
                  <label htmlFor="finalResult">
                    Final result
                  </label>
                  <textarea
                    className="long"
                    id="finalResult"
                    name="finalResult"
                    value={form.finalResult}
                    onChange={change}
                    placeholder="What was delivered or achieved? Add the outcome when the task is complete."
                  />
                </div>

                <div className="field full">
                  <label htmlFor="links">
                    Links or attachment notes
                  </label>
                  <textarea
                    id="links"
                    name="links"
                    value={form.links}
                    onChange={change}
                    placeholder="Paste document links, ticket URLs, file paths, or attachment notes here…"
                  />
                  <p className="hint">
                    This simple version stores text and links, not
                    uploaded files.
                  </p>
                </div>
              </div>
            </div>

            <div className="modal-actions">
              <div>
                {!isNew && (
                  <button
                    type="button"
                    className="btn btn-danger"
                    onClick={() => onDelete(form.id)}
                  >
                    Delete task
                  </button>
                )}
              </div>

              <div className="action-group">
                <button
                  type="button"
                  className="btn btn-secondary"
                  onClick={onClose}
                >
                  Cancel
                </button>

                <button type="submit" className="btn btn-primary">
                  Save task
                </button>
              </div>
            </div>
          </form>
        </div>
      );
    }

    function TaskCard({
      task,
      onOpen,
      onDelete,
      onDragStart,
      onDragEnd
    }) {
      return (
        <article
          className="task-card"
          draggable
          onClick={() => onOpen(task)}
          onDragStart={event => onDragStart(event, task.id)}
          onDragEnd={onDragEnd}
        >
          <button
            className="card-delete"
            aria-label={`Delete ${task.title}`}
            onClick={event => {
              event.stopPropagation();
              onDelete(task.id);
            }}
          >
            ×
          </button>

          <h3 className="card-title">{task.title}</h3>

          <div className="card-meta">
            <span
              className={`pill priority-${task.priority.toLowerCase()}`}
            >
              {task.priority}
            </span>

            {task.project && (
              <span className="pill">{task.project}</span>
            )}
          </div>

          {task.source && (
            <p className="card-line">
              <strong>From:</strong> {task.source}
            </p>
          )}

          {task.deadline && (
            <p className="card-line">
              <strong>Due:</strong> {task.deadline}
            </p>
          )}

          {task.nextAction && (
            <p className="card-line">
              <strong>Next:</strong> {task.nextAction}
            </p>
          )}
        </article>
      );
    }

    function Column({
      column,
      tasks,
      onAdd,
      onOpen,
      onDelete,
      onDragStart,
      onDragEnd,
      onDragOver,
      onDrop,
      isOver
    }) {
      return (
        <section
          className={`column${isOver ? " drag-over" : ""}`}
          onDragOver={event => onDragOver(event, column.id)}
          onDrop={event => onDrop(event, column.id)}
        >
          <div className="column-header">
            <div className="column-title">
              <span
                className="column-dot"
                style={{ background: column.color }}
              />
              {column.title}
            </div>

            <span className="column-count">{tasks.length}</span>
          </div>

          <div className="card-list">
            {!tasks.length && (
              <div className="empty">No tasks here</div>
            )}

            {tasks.map(task => (
              <TaskCard
                key={task.id}
                task={task}
                onOpen={onOpen}
                onDelete={onDelete}
                onDragStart={onDragStart}
                onDragEnd={onDragEnd}
              />
            ))}
          </div>

          <button
            className="add-task"
            onClick={() => onAdd(column.id)}
          >
            + Add task
          </button>
        </section>
      );
    }

    function App() {
      const [tasks, setTasks] = useState([]);
      const [editing, setEditing] = useState(null);
      const [isNew, setIsNew] = useState(false);
      const [dragOver, setDragOver] = useState(null);
      const [services, setServices] = useState(
        window.firebaseServices || null
      );
      const [user, setUser] = useState(null);
      const [authReady, setAuthReady] = useState(false);
      const [remoteReady, setRemoteReady] = useState(false);
      const [syncStatus, setSyncStatus] = useState("Not signed in");
      const [message, setMessage] = useState("");
      const [localTasks, setLocalTasks] = useState(loadLocalTasks);
      const draggedId = useRef(null);

      useEffect(() => {
        if (window.firebaseServices) {
          setServices(window.firebaseServices);
          return;
        }

        const ready = () =>
          setServices(window.firebaseServices);

        window.addEventListener("firebase-ready", ready);

        return () =>
          window.removeEventListener("firebase-ready", ready);
      }, []);

      useEffect(() => {
        if (!services) return;

        if (!services.configured) {
          setAuthReady(true);
          setSyncStatus("Not signed in");
          return;
        }

        return services.onAuthStateChanged(
          services.auth,
          nextUser => {
            setUser(nextUser);
            setAuthReady(true);
            setMessage("");
          },
          error => {
            console.error(
              "Authentication listener failed",
              error
            );
            setAuthReady(true);
            setSyncStatus("Sync failed");
            setMessage(
              "Could not check your sign-in. Please refresh and try again."
            );
          }
        );
      }, [services]);

      useEffect(() => {
        setRemoteReady(false);

        if (!services?.configured || !user) {
          setTasks([]);
          setSyncStatus("Not signed in");
          return;
        }

        const cached = loadCache(user.uid);
        if (cached.length) setTasks(cached);

        setSyncStatus("Syncing");

        const tasksCollection = services.collection(
          services.db,
          "users",
          user.uid,
          "tasks"
        );

        const unsubscribe = services.onSnapshot(
          tasksCollection,
          { includeMetadataChanges: true },
          snapshot => {
            const nextTasks = snapshot.docs
              .map(item =>
                normalizeTask({
                  ...item.data(),
                  id: item.id
                })
              )
              .sort((a, b) => {
                const columnDifference =
                  COLUMNS.findIndex(
                    column => column.id === a.status
                  ) -
                  COLUMNS.findIndex(
                    column => column.id === b.status
                  );

                return (
                  columnDifference ||
                  a.order - b.order ||
                  a.title.localeCompare(b.title)
                );
              });

            setTasks(nextTasks);
            saveCache(user.uid, nextTasks);
            setRemoteReady(true);
            setSyncStatus(
              snapshot.metadata.hasPendingWrites
                ? "Syncing"
                : "Synced"
            );
          },
          error => {
            console.error("Task sync failed", error);
            setRemoteReady(true);
            setSyncStatus("Sync failed");
            setMessage(
              "Tasks could not sync. Check your connection and Firebase setup."
            );
          }
        );

        return unsubscribe;
      }, [services, user]);

      const tasksCollection = () =>
        services.collection(
          services.db,
          "users",
          user.uid,
          "tasks"
        );

      const writeTask = async task => {
        if (!services?.configured || !user) return false;

        setSyncStatus("Syncing");
        setMessage("");

        try {
          await services.setDoc(
            services.doc(tasksCollection(), task.id),
            taskForFirestore(
              task,
              services.serverTimestamp()
            ),
            { merge: true }
          );

          return true;
        } catch (error) {
          console.error("Could not save task", error);
          setSyncStatus("Sync failed");
          setMessage(
            "This task could not be saved. Check your connection and try again."
          );

          return false;
        }
      };

      const signIn = async () => {
        if (!services?.configured) return;

        setMessage("");

        try {
          const provider =
            new services.GoogleAuthProvider();

          provider.setCustomParameters({
            prompt: "select_account"
          });

          await services.signInWithPopup(
            services.auth,
            provider
          );
        } catch (error) {
          console.error("Google sign-in failed", error);

          setMessage(
            error.code === "auth/popup-blocked"
              ? "The sign-in window was blocked. Allow pop-ups for this page and try again."
              : "Google sign-in failed. Check the Firebase authorized domains and try again."
          );
        }
      };

      const logOut = async () => {
        setSyncStatus("Syncing");

        try {
          await services.signOut(services.auth);
        } catch (error) {
          console.error("Sign out failed", error);
          setSyncStatus("Sync failed");
          setMessage(
            "Could not sign out. Please try again."
          );
        }
      };

      const openNew = status => {
        setEditing(blankTask(status));
        setIsNew(true);
      };

      const openExisting = task => {
        setEditing({ ...task });
        setIsNew(false);
      };

      const saveTask = async task => {
        const previous = tasks.find(
          item => item.id === task.id
        );

        if (
          isNew ||
          (previous && previous.status !== task.status)
        ) {
          const columnOrders = tasks
            .filter(item => item.status === task.status)
            .map(item => item.order || 0);

          task.order =
            (columnOrders.length
              ? Math.max(...columnOrders)
              : 0) + 1;
        }

        if (await writeTask(task)) {
          setEditing(null);
        }
      };

      const deleteTask = async id => {
        if (
          !window.confirm(
            "Delete this task? This cannot be undone."
          )
        ) {
          return;
        }

        setSyncStatus("Syncing");
        setMessage("");

        try {
          await services.deleteDoc(
            services.doc(tasksCollection(), id)
          );

          setEditing(null);
        } catch (error) {
          console.error("Could not delete task", error);
          setSyncStatus("Sync failed");
          setMessage(
            "This task could not be deleted. Check your connection and try again."
          );
        }
      };

      const startDrag = (event, id) => {
        draggedId.current = id;
        event.currentTarget.classList.add("dragging");
        event.dataTransfer.effectAllowed = "move";
      };

      const endDrag = event => {
        event.currentTarget.classList.remove("dragging");
        draggedId.current = null;
        setDragOver(null);
      };

      const drop = async (event, status) => {
        event.preventDefault();

        const task = tasks.find(
          item => item.id === draggedId.current
        );

        if (task && task.status !== status) {
          const columnOrders = tasks
            .filter(item => item.status === status)
            .map(item => item.order || 0);

          const movedTask = {
            ...task,
            status,
            order:
              (columnOrders.length
                ? Math.max(...columnOrders)
                : 0) + 1
          };

          setTasks(current =>
            current.map(item =>
              item.id === movedTask.id
                ? movedTask
                : item
            )
          );

          await writeTask(movedTask);
        }

        setDragOver(null);
      };

      const importLocalTasks = async () => {
        if (!localTasks.length || !user) return;

        setSyncStatus("Syncing");
        setMessage("");

        try {
          for (
            let start = 0;
            start < localTasks.length;
            start += 400
          ) {
            const batch =
              services.writeBatch(services.db);

            localTasks
              .slice(start, start + 400)
              .forEach((task, index) => {
                const prepared = {
                  ...normalizeTask(task),
                  order:
                    task.order ||
                    start + index + 1
                };

                batch.set(
                  services.doc(
                    tasksCollection(),
                    prepared.id
                  ),
                  taskForFirestore(
                    prepared,
                    services.serverTimestamp()
                  ),
                  { merge: true }
                );
              });

            await batch.commit();
          }

          localStorage.removeItem(STORAGE_KEY);
          localStorage.removeItem(LEGACY_KEY);
          setLocalTasks([]);
        } catch (error) {
          console.error(
            "Local task import failed",
            error
          );
          setSyncStatus("Sync failed");
          setMessage(
            "Local tasks could not be imported. Nothing was removed; please try again."
          );
        }
      };

      const activeCount = tasks.filter(
        task =>
          !["done", "archived"].includes(task.status)
      ).length;

      const doneCount = tasks.filter(
        task => task.status === "done"
      ).length;

      const statusClass =
        syncStatus === "Synced"
          ? "synced"
          : syncStatus === "Syncing"
          ? "syncing"
          : syncStatus === "Sync failed"
          ? "failed"
          : "";

      if (!services || !authReady) {
        return (
          <div className="loading-board">
            Starting Daily Work Tracker…
          </div>
        );
      }

      return (
        <>
          <header>
            <div className="brand">
              <h1>Daily Work Tracker</h1>
              <p>
                Keep the background, progress, feedback,
                and result of your work in one place.
              </p>
            </div>

            <div className="header-actions">
              {user && (
                <div className="stats">
                  <span>
                    <strong>{activeCount}</strong> active
                  </span>
                  <span>
                    <strong>{doneCount}</strong> done
                  </span>
                </div>
              )}

              <span
                className={`sync-status ${statusClass}`}
              >
                {syncStatus}
              </span>

              {user ? (
                <div className="account-area">
                  <span
                    className="account-email"
                    title={user.email}
                  >
                    {user.email}
                  </span>

                  <button
                    className="btn btn-secondary"
                    onClick={logOut}
                  >
                    Sign out
                  </button>

                  <button
                    className="btn btn-primary"
                    onClick={() => openNew("new")}
                  >
                    + New task
                  </button>
                </div>
              ) : (
                <button
                  className="btn btn-primary"
                  onClick={signIn}
                  disabled={!services.configured}
                >
                  Sign in with Google
                </button>
              )}
            </div>
          </header>

          {!user ? (
            <main className="welcome-wrap">
              <div className="welcome-card">
                <h2>
                  Your work, available on every device
                </h2>

                <p>
                  Sign in with the same Google account on
                  your computer and phone. Your tasks will
                  stay private to your account and sync
                  automatically.
                </p>

                <button
                  className="btn btn-primary"
                  onClick={signIn}
                  disabled={!services.configured}
                >
                  Sign in with Google
                </button>

                {!services.configured && (
                  <div className="setup-note">
                    Firebase is not configured yet. Replace
                    the placeholder values in{" "}
                    <strong>firebaseConfig</strong>, then
                    publish the page again.
                  </div>
                )}

                {message && (
                  <div className="error-note">
                    {message}
                  </div>
                )}
              </div>
            </main>
          ) : (
            <>
              {localTasks.length > 0 && (
                <div className="import-banner">
                  <span>
                    {localTasks.length} task
                    {localTasks.length === 1 ? "" : "s"}{" "}
                    from the old local-only app were found
                    on this device.
                  </span>

                  <button
                    className="btn btn-secondary"
                    onClick={importLocalTasks}
                  >
                    Import into my account
                  </button>
                </div>
              )}

              {message && (
                <div className="import-banner error-note">
                  {message}
                </div>
              )}

              {!remoteReady && !tasks.length ? (
                <div className="loading-board">
                  Syncing your tasks…
                </div>
              ) : (
                <main className="board">
                  {COLUMNS.map(column => (
                    <Column
                      key={column.id}
                      column={column}
                      tasks={tasks.filter(
                        task =>
                          task.status === column.id
                      )}
                      onAdd={openNew}
                      onOpen={openExisting}
                      onDelete={deleteTask}
                      onDragStart={startDrag}
                      onDragEnd={endDrag}
                      onDragOver={(event, status) => {
                        event.preventDefault();
                        setDragOver(status);
                      }}
                      onDrop={drop}
                      isOver={dragOver === column.id}
                    />
                  ))}
                </main>
              )}
            </>
          )}

          {editing && (
            <TaskModal
              task={editing}
              isNew={isNew}
              onSave={saveTask}
              onDelete={deleteTask}
              onClose={() => setEditing(null)}
            />
          )}
        </>
      );
    }

    ReactDOM
      .createRoot(document.getElementById("root"))
      .render(<App />);
  </script>
</body>
</html>
