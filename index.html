function App(){const[tasks,setTasks]=useState([]),[editing,setEditing]=useState(null),[isNew,setIsNew]=useState(false),[dragOver,setDragOver]=useState(null),[services,setServices]=useState(window.firebaseServices||null),[user,setUser]=useState(null),[authReady,setAuthReady]=useState(false),[remoteReady,setRemoteReady]=useState(false),[syncStatus,setSyncStatus]=useState("Not signed in"),[message,setMessage]=useState(""),[localTasks,setLocalTasks]=useState(loadLocalTasks),[view,setView]=useState("kanban"),[aiSettings,setAISettings]=useState(loadAISettings),[showAISettings,setShowAISettings]=useState(false),[quickEntryStart,setQuickEntryStart]=useState(false);const draggedId=useRef(null);useEffect(()=>{if(window.firebaseServices){setServices(window.firebaseServices);return}const ready=()=>setServices(window.firebaseServices);window.addEventListener("firebase-ready",ready);return()=>window.removeEventListener("firebase-ready",ready)},[]);useEffect(()=>{if(!services)return;if(!services.configured){setAuthReady(true);setSyncStatus("Not signed in");return}return services.onAuthStateChanged(services.auth,u=>{setUser(u);setAuthReady(true);setMessage("")},e=>{console.error(e);setAuthReady(true);setSyncStatus("Sync failed");setMessage("Could not check your sign-in. Please refresh and try again.")})},[services]);useEffect(()=>{setRemoteReady(false);if(!services?.configured||!user){setTasks([]);setSyncStatus("Not signed in");return}const cached=loadCache(user.uid);if(cached.length)setTasks(cached);setSyncStatus("Syncing");const col=services.collection(services.db,"users",user.uid,"tasks");return services.onSnapshot(col,{includeMetadataChanges:true},snap=>{const next=snap.docs.map(d=>normalizeTask({...d.data(),id:d.id})).sort((a,b)=>COLUMNS.findIndex(c=>c.id===a.status)-COLUMNS.findIndex(c=>c.id===b.status)||a.order-b.order||a.title.localeCompare(b.title));setTasks(next);saveCache(user.uid,next);setRemoteReady(true);setSyncStatus(snap.metadata.hasPendingWrites?"Syncing":"Synced") t.status===task.status).map(t=>t.order||0);task.order=(orders.length?Math.max(...orders):0)+1}if(await writeTask(task,isNew))setEditing(null)};const deleteTask=async id=>{if(!window.confirm("Delete this task? This cannot be undone."))return;try{await services.deleteDoc(services.doc(tasksCollection(),id));setEditing(null)}catch(e){setSyncStatus("Sync failed");setMessage("This task could not be deleted. Check your connection and try again.")}};const startDrag=(e,id)=>{draggedId.current=id;e.currentTarget.classList.add("dragging");e.dataTransfer.effectAllowed="move"};const endDrag=e=>{e.currentTarget.classList.remove("dragging");draggedId.current=null;setDragOver(null)};const drop=async(e,status)=>{e.preventDefault();const task=tasks.find(t=>t.id===draggedId.current);if(task&&task.status!==status){const orders=tasks.filter(t=>t.status===status).map(t=>t.order||0);const moved={...task,status,order:(orders.length?Math.max(...orders):0)+1};setTasks(xs=>xs.map(x=>x.id===moved.id?moved:x));await writeTask(moved)}setDragOver(null)};const importLocalTasks=async()=>{if(!localTasks.length||!user)return;try{for(let start=0;start<localTasks.length;start+=400){const batch=services.writeBatch(services.db);localTasks.slice(start,start+400).forEach((task,index)=>{const p={...normalizeTask(task),order:task.order||start+index+1};batch.set(services.doc(tasksCollection(),p.id),taskForFirestore(p,services.serverTimestamp(),true),{merge:true})});await batch.commit()}localStorage.removeItem(STORAGE_KEY);localStorage.removeItem(LEGACY_KEY);setLocalTasks([])}catch(e){setSyncStatus("Sync failed");setMessage("Local tasks could not be imported. Nothing was removed; please try again.")}};const statusClass=syncStatus==="Synced"?"synced":syncStatus==="Syncing"?"syncing":syncStatus==="Sync failed"?"failed":"";if(!services||!authReady)return <div className="loading">Starting Daily Work Tracker…</div>;return <><header><div className="brand"><h1>Daily Work Tracker</h1><p>Keep the background, progress,
