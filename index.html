==status)return;await saveTask({...t,status,order:Date.now()})}async function login(){const p=new services.GoogleAuthProvider();await services.signInWithPopup(services.auth,p)}async function logout(){await services.signOut(services.auth)}if(!services)return <div className="loading">Loading…</div>;if(!services.configured)return <div className="welcome"><div className="welcome-card"><h2>Daily Work Tracker</h2><p>Firebase is not configured.</p><div className="setup">Please keep the real Firebase web config in index.html.</div></div></div>;if(!user)return <div><header><div className="brand"><h1>Daily Work Tracker</h1><p>Personal daily work tracking app</p></div></header><div className="welcome"><div className="welcome-card"><h2>Sign in to sync</h2><p>Open the same GitHub Pages URL on computer and phone, then sign in with the same Google account.</p><button className="btn btn-primary" onClick={login}>Sign in with Google</button></div></div></div>;return <><header><div className="brand"><h1>Daily Work Tracker</h1><p>Kanban for workflow · Table for review · Firestore sync</p></div><div className="header-actions"><span className={`sync ${status}`}>{sync}</span><span className="email">{user.email}</span><button className="btn btn-secondary" onClick={logout}>Sign out</button></div></header><div className="toolbar"><div className="switcher"><button className={view==="kanban"?"active":""} onClick={()=>setView("kanban")}>Kanban View</button><button className={view==="table"?"active":""} onClick={()=>setView("table")}>Table View</button></div><div className="qactions"><button className="btn btn-primary" onClick={()=>setModal({task:blankTask("new"),isNew:true})}>智能入口</button><button className="btn btn-secondary" onClick={()=>setModal({task:blankTask("new"),isNew:true})}>+ New task</button></div></div>{view==="kanban"?<Board tasks={tasks} onOpen={(task,isNew=false)=>setModal({task:normalizeTask(task),isNew})} onDelete={delTask} onMove={moveTask}/>:<TableView tasks={tasks} onOpen={task=>setModal({task:normalizeTask(task),isNew:false})} priorities={priorities}/>} {modal&&<TaskModal task={modal.task} isNew={modal.isNew} onSave={saveTask} onDelete={delTask} onClose={()=>setModal(null)} onOpenAISettings={()=>setShowAI(true)} aiSettings={ai} priorities={priorities}/>} {showAI&&<AISettingsModal settings={ai} onSave={setAI} onClose={()=>setShowAI(false)}/>}</>}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
