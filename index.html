})});await b.commit()}localStorage.removeItem(LOCAL);localStorage.removeItem(LEGACY);setLocal([])}if(!services||!ready)return <div className="welcome">Starting Daily Work Tracker…</div>;let active=tasks.filter(t=>!["done","archived"].includes(t.status)).length,done=tasks.filter(t=>t.status=="done").length,statusClass=sync=="Synced"?"ok":sync=="Syncing"?"wait":sync=="Sync failed"?"bad":"";return <><header><div className="brand"><h1>Daily Work Tracker</h1><p>Keep task background, progress, feedback, and results in one place.</p></div><div className="header-actions">{user&&<span className="line"><b>{active}</b> active · <b>{done}</b> done</span>}<span className={`sync ${statusClass}`}>{sync}</span>{user?<div className="account"><span className="email" title={user.email}>{user.email}</span><button className="btn btn-secondary" onClick={logOut}>Sign out</button><button className="btn btn-secondary" onClick={()=>setShowAI(true)}>AI Settings</button><button className="btn btn-secondary" onClick={()=>openNew("new",true)}>智能入口</button><button className="btn btn-primary" onClick={()=>openNew("new")}>+ New task</button></div>:<button className="btn btn-primary" onClick={signIn}>Sign in with Google</button>}</div></header>{!user?<main className="welcome"><div className="welcome-card"><h2>Your work, available on every device</h2><p>Sign in with the same Google account on your computer and phone. Your tasks sync automatically through Firestore.</p><button className="btn btn-primary" onClick={signIn}>Sign in with Google</button>{msg&&<div className="note badnote">{msg}</div>}</div></main>:<>{local.length>0&&<div className="note">{local.length} local task(s) found. <button className="btn btn-secondary" onClick={importLocal}>Import into my account</button></div>}{msg&&<div className="note badnote">{msg}</div>}{!remote&&!tasks.length?<div className="welcome">Syncing your tasks…</div>:<><div className="toolbar"><div className="switch"><button className={view=="kanban"?"on":""} onClick
