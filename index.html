    function addDays(date, days) {
      const result = new Date(date);
      result.setDate(result.getDate() + days);
      return dateKey(result);
    }

    function parseDateExpression(text) {
      const now = new Date();
      let match = text.match(/(20\d{2})[-\/]([01]?\d)[-\/]([0-3]?\d)/);
      if (match) return `${match[1]}-${String(Number(match[2])).padStart(2, "0")}-${String(Number(match[3])).padStart(2, "0")}`;
      match = text.match(/([01]?\d)月([0-3]?\d)日?/);
      if (match) return `${now.getFullYear()}-${String(Number(match[1])).padStart(2, "0")}-${String(Number(match[2])).padStart(2, "0")}`;
      match = text.match(/(?:这个|本|下)?(?:星期|周)([一二三四五六日天])/);
      if (match) {
        const weekdayMap = { "日": 0, "天": 0, "一": 1, "二": 2, "三": 3, "四": 4, "五": 5, "六": 6 };
        const target = weekdayMap[match[1]];
        let days = target - now.getDay();
        if (days < 0 || /下(?:星期|周)/.test(match[0])) days += 7;
        return addDays(now, days);
      }
      match = text.match(/day after tomorrow|后天|tomorrow|明天|today|今天/i);
      if (/day after tomorrow|后天/i.test(match?.[0] || "")) return addDays(now, 2);
      if (/tomorrow|明天/i.test(match?.[0] || "")) return addDays(now, 1);
      if (/today|今天/i.test(match?.[0] || "")) return dateKey(now);
      return "";
    }

    function normalizeReminder(text) {
      const value = String(text || "").trim();
      if (!value || /不提醒|无需提醒|不用提醒/.test(value)) return NO_REMINDER;
      const explicit = extractReminderDateTime(value);
      if (explicit) return explicit;
      if (!/(提醒|叫我|通知)/.test(value) && !/^\d{4}[/-]\d{1,2}[/-]\d{1,2}[ T]\d{1,2}:\d{2}$/.test(value)) return "";
      return datetimeLocalFromReminder(value) || normalizeDateTimeText(value);
    }

    function extractStartDate(text) {
      const match = String(text || "").match(/((?:20\d{2}[-\/])?\d{1,2}月\d{1,2}日?|20\d{2}[-\/]\d{1,2}[-\/]\d{1,2}|今天|明天|后天)\s*(?:决定|计划)?\s*(?:要|就|正式)?\s*(?:开始|启动|开工|开始处理|开始做)/);
      return match ? parseDateExpression(match[1]) : "";
    }

    function extractCompletionDate(text) {
      const match = String(text || "").match(/((?:20\d{2}[-\/])?\d{1,2}月\d{1,2}日?|20\d{2}[-\/]\d{1,2}[-\/]\d{1,2}|今天|明天|后天|本周[一二三四五六日天]|这个周[一二三四五六日天]|周[一二三四五六日天]|星期[一二三四五六日天])\s*(?:前)?(?:完成|提交|交付|结束|交一份|交)/);
      return match ? parseDateExpression(match[1]) : extractRuleDueDate(text);
    }

    function firstMatch(text, patterns) {
      for (const pattern of patterns) {
        const match = text.match(pattern);
        if (match?.[1]?.trim()) return match[1].trim().replace(/[，。；;,.]+$/, "");
      }
      return "";
    }

    function cleanVoiceRepeat(text) {
      return String(text || "")
        .replace(/\s+/g, " ")
        .replace(/(我今天已经做了)\s+\1/g, "$1")
        .replace(/(今天已经做了)\s+\1/g, "$1")
        .replace(/(我已经整理了)\s+\1/g, "$1")
        .replace(/(已经完成)\s+\1/g, "$1")
        .trim();
    }

    function cleanProgressText(text) {
      return cleanVoiceRepeat(text)
        .replace(/^我今天已经做了/, "今天已经做了")
        .replace(/[，。；;,.]+$/, "")
        .trim();
    }

    function cleanTaskPhrase(text) {
      return String(text || "")
        .replace(/^(?:我今天|今天|我)?(?:收到|接到).*(?:作业|任务)?/, "")
        .replace(/^(?:老板|领导|客户|海尔|苗|王总)?(?:让我|叫我|要求我|安排我|给我)\s*/, "")
        .replace(/^(?:要完成|需要完成|让我做|安排我做)\s*/, "")
        .replace(/(?:今天|明天|后天|本周|下周|周[一二三四五六日天]|星期[一二三四五六日天])(?:前)?/g, "")
        .replace(/(?:给他|给她|给老板|给客户|前完成|前提交)$/g, "")
        .replace(/[，。；;,.]+$/g, "")
        .trim();
    }

    function classifyRuleClause(clause) {
      const text = String(clause || "").trim();
      if (!text) return "";
      if (/等反馈|等待反馈|待反馈/.test(text)) return "next";
      if (/(?:老板|领导|客户|供应商)?反馈(?:说|是|为)?/.test(text)) return "feedback";
      if (/(?:最终|最终结果|结论|已提交|已经提交|已交付|已完成交付|已经提交给)/.test(text)) return "final";
      if (/^(?:下一步|接下来|之后|还要|需要再)/.test(text)) return "next";
      if (/^(?:明天|后天|本周|下周|周[一二三四五六日天]|星期[一二三四五六日天])/.test(text) && !/(?:让我|要求|安排|要完成|需要完成)/.test(text)) return "next";
      if (/(?:我今天已经做了|今天已经做了|已经完成|已经整理|我已经整理|我已经做了|我做了|目前已经|现在已经)/.test(text)) return "progress";
      if (/(?:收到.*作业|收到.*任务|老板给我的|我老板给我的|老板让我|领导安排|客户让我|要完成|需要完成|让我做|安排我做|苗让我|王总让我|自己要做)/.test(text)) return "assignment";
      return "other";
    }

    function segmentRuleText(text) {
      const compact = cleanVoiceRepeat(text);
      const clauses = compact
        .split(/[。；;\n，,]/)
        .map(item => item.trim())
        .filter(Boolean);
      const segments = { assignment: [], progress: [], feedback: [], final: [], next: [], other: [] };
      clauses.forEach(clause => {
        const kind = classifyRuleClause(clause);
        if (segments[kind]) segments[kind].push(clause);
        else segments.other.push(clause);
      });
      return { compact, clauses, segments };
    }

    function assignmentPhraseFromSegments(segments) {
      const assignmentText = segments.assignment.join("，");
      const patterns = [
        /(?:要完成|需要完成)\s*([^，。；;\n]+)/,
        /(?:让我做|安排我做)\s*([^，。；;\n]+)/,
        /(?:老板|领导|客户|海尔|苗|王总)?(?:让我|叫我|要求我|安排我)\s*(?:今天|明天|后天|本周|下周|周[一二三四五六日天]|星期[一二三四五六日天])?\s*([^，。；;\n]+)/,
        /(?:老板给我的|我老板给我的)\s*([^，。；;\n]+?)(?:作业|任务)?$/
      ];
      for (const pattern of patterns) {
        const match = assignmentText.match(pattern);
        if (match?.[1]?.trim()) return cleanTaskPhrase(match[1]);
      }
      return cleanTaskPhrase(segments.assignment.find(item => !/^(?:我今天|今天)?收到/.test(item)) || segments.other[0] || "");
    }

    function projectFromPhrase(phrase) {
      let value = String(phrase || "")
        .replace(/^((?:做|跟进|确认|整理|修改|检查|核对|输出|提交|准备|处理|对接|反馈|翻译|优化))/, "")
        .replace(/的/g, "")
        .replace(/工作$/, "")
        .replace(/(?:问题清单|修改清单|清单|初稿|一版|确认|修改|补充|调研工作)$/, match => match === "调研工作" ? "调研" : "")
        .trim();
      if (/PPT/.test(phrase) && /俄罗斯市场数据/.test(phrase)) return "PPT / 俄罗斯市场数据";
      if (/PPT/.test(phrase)) return "PPT";
      if (/包装文案/.test(phrase)) return "包装文案";
      if (/俄罗斯市场/.test(phrase) && /调研/.test(phrase)) return "俄罗斯市场调研";
      if (/俄罗斯市场规划/.test(phrase)) return "俄罗斯市场规划";
      if (/俄罗斯水槽说明书/.test(phrase)) return "俄罗斯水槽说明书";
      if (/工作交接SOP/i.test(phrase)) return "工作交接SOP";
      return value;
    }

    function titleFromAssignmentPhrase(phrase, fallbackText = "") {
      const cleaned = cleanTaskPhrase(phrase);
      if (!cleaned) return "";
      if (/俄罗斯市场/.test(cleaned) && /调研/.test(cleaned)) return "俄罗斯市场调研";
      if (/俄罗斯水槽/.test(cleaned) && /市场规划/i.test(cleaned) && /ppt/i.test(cleaned)) return "俄罗斯水槽市场规划PPT";
      if (/^(?:做|跟进|确认|整理|修改|检查|核对|输出|提交|准备|处理|对接|反馈|翻译|优化)/.test(cleaned)) return cleaned.replace(/的/g, "");
      if (/规划|SOP|文案|清单|说明书|调研|PPT/.test(cleaned)) return cleaned.replace(/的/g, "") + (/(?:工作|规划|SOP|文案|清单|说明书|调研|初稿)$/.test(cleaned.replace(/的/g, "")) ? "" : "工作");
      return extractRuleTitle(fallbackText || cleaned);
    }

    function cleanExtractedTitle(value) {
      let title = String(value || "")
        .replace(/^[，,。；;\s]+/, "")
        .replace(/^(?:在)?(?:今天|明天|后天|本周|下周|周[一二三四五六日天]|星期[一二三四五六日天]|这个周[一二三四五六日天]|本星期[一二三四五六日天])(?:前)?/, "")
        .replace(/^(?:交|提交|完成|准备|做)(?:一份|一个|一下)?/, "")
        .replace(/^(?:一份|一个)/, "")
        .split(/(?:，|,|。|；|;|分别涵盖|主要包括|内容包括)/)[0]
        .replace(/的/g, "")
        .replace(/\bppt\b/ig, "PPT")
        .trim();
      if (/俄罗斯水槽/.test(title) && /市场规划/i.test(title) && /PPT/.test(title)) return "俄罗斯水槽市场规划PPT";
      return title || "";
    }

    function extractImprovedTitle(text) {
      const compact = String(text || "").trim();
      const patterns = [
        /(?:老板|领导|客户|海尔|苗|王总)?(?:让我|叫我|要求我|安排我)\s*(?:在)?(?:今天|明天|后天|本周|下周|周[一二三四五六日天]|星期[一二三四五六日天])?(?:前)?\s*(?:交|提交|完成|准备|做)(?:一份|一个|一下)?\s*([^，,。；;\n]+)/,
        /我要(?:做|准备|完成|提交|交)(?:一份|一个|一下)?\s*([^，,。；;\n]+)/,
        /(?:今天|明天|后天|本周|下周|周[一二三四五六日天]|星期[一二三四五六日天])(?:前)?\s*(?:交|提交|完成|准备|做)(?:一份|一个|一下)?\s*([^，,。；;\n]+)/,
        /(?:交|提交|完成|准备|做)(?:一份|一个|一下)?\s*([^，,。；;\n]+)/
      ];
      for (const pattern of patterns) {
        const match = compact.match(pattern);
        const title = cleanExtractedTitle(match?.[1] || "");
        if (title) return title;
      }
      return "";
    }

    function buildMarketPlanningSteps(title, text) {
      if (!/俄罗斯水槽市场规划PPT/.test(title || "")) return [];
      const steps = [];
      if (/市场大盘/.test(text)) steps.push("梳理俄罗斯水槽市场大盘");
      if (/消费者习惯/.test(text)) steps.push("分析消费者习惯");
      steps.push("输出俄罗斯水槽市场规划PPT");
      return [...new Set(steps)].map(step => ({ id: makeRowId("exec"), text: step, status: "未开始", dueText: "", reminderAt: "", actualHours: "", feedbackNote: "", attachments: [] }));
    }

    function extractRuleSource(text) {
      const sourceRules = [
        [/(?:^|[，,。；;\s])老板\s*让我/, "老板"],
        [/老板给我的/, "老板"],
        [/我老板给我的/, "老板"],
        [/(?:^|[，,。；;\s])领导\s*让我/, "领导"],
        [/(?:^|[，,。；;\s])领导\s*反馈/, "领导"],
        [/(?:^|[，,。；;\s])领导\s*安排/, "领导"],
        [/(?:^|[，,。；;\s])客户\s*(?:让我|要求)/, "客户"],
        [/(?:^|[，,。；;\s])客户\s*反馈/, "客户"],
        [/(?:^|[，,。；;\s])老板\s*反馈/, "老板"],
        [/(?:^|[，,。；;\s])海尔\s*(?:让我|要求)/, "海尔"],
        [/(?:^|[，,。；;\s])供应商\s*反馈/, "供应商"],
        [/(?:^|[，,。；;\s])物流\s*反馈/, "物流"],
        [/(?:^|[，,。；;\s])自己\s*要做/, "自己"]
      ];
      const fixedSource = sourceRules.find(([pattern]) => pattern.test(text))?.[1];
      if (fixedSource) return fixedSource;
      const namedAssigner = text.match(/(?:^|[，,。；;\s])([\u4e00-\u9fa5]{1,4}(?:总)?)\s*(?:让我|叫我|要求我|安排我|给我)/);
      if (namedAssigner && !/^(?:今天|明天|后天|项目|客户|老板|领导)$/.test(namedAssigner[1])) return namedAssigner[1];
      return "";
    }

    function extractRuleProject(text) {
      const match = text.match(
        /(?:项目\s*(?:是|为|[:：])|类别\s*(?:是|为|[:：])|属于)\s*(.+?)(?=[，,。；;\n]|优先级|目前|当前|状态|进行中|待办|等待反馈|等反馈|待反馈|下一步|接下来|截止|最后期限|今天|明天|后天|反馈|结果|结论|$)/i
      );
      if (match?.[1]?.trim()) return match[1].trim().replace(/[，,。；;]+$/, "");
      const title = extractRuleTitle(text) || text;
      return inferProjectCategory(text, title) || inferRuleProject(title);
    }

    function cleanRuleTaskText(text) {
      return String(text || "")
        .replace(/^.*?我今天收到了?/, "")
        .replace(/^.*?今天接到/, "")
        .replace(/^.*?我老板给我的/, "")
        .replace(/^.*?(?:老板|领导)\s*(?:让我|安排)\s*/, "")
        .replace(/^.*?(?:客户|海尔)\s*(?:让我|要求)\s*/, "")
        .replace(/^.*?([\u4e00-\u9fa5]{1,4}(?:总)?)\s*(?:让我|叫我|要求我|安排我|给我)\s*/, "")
        .replace(/^.*?(?:供应商|物流)\s*反馈(?:是|说|为)?\s*/, "")
        .replace(/^自己\s*要做\s*/, "")
        .replace(/^.*?\b(?:asked|told) me to\b\s*/i, "")
        .replace(/(?:周[一二三四五六日天]|星期[一二三四五六日天]|今天|明天|后天|本周|下周)(?:前)?(?:给他|给她)?/g, "")
        .replace(/(?:截止到|最后期限|需要在).*/, "")
        .replace(/(?:目前|当前|状态).*/, "")
        .trim();
    }

    function inferRuleProject(title) {
      let value = String(title || "")
        .replace(/^(?:做|跟进|确认|整理|修改|检查|核对|输出|提交|准备|处理|对接|反馈|翻译|优化)/, "")
        .replace(/(?:修改|确认|作业|任务|清单|版本|问题清单)$/, "")
        .trim();
      const inferred = inferProjectCategory(title, value);
      if (inferred) return inferred;
      if (/工作交接SOP/i.test(title)) return "工作交接SOP";
      if (/包装文案/.test(title)) return "包装文案";
      if (/市场规划/.test(title)) return value || "市场规划";
      if (/说明书/.test(title)) return value || title;
      return value.length >= 3 && value.length <= 18 ? value : "";
    }

    function extractRuleTitle(text) {
      const actionPattern = /跟进|确认|整理|修改|检查|核对|输出|提交|做|准备|处理|对接|反馈|翻译|优化/;
      let working = cleanRuleTaskText(text);

      const clauses = working.split(/[，,。；;\n]/).map(item => item.trim()).filter(Boolean);
      const candidates = [];
      clauses.forEach(clause => {
        if (/^(?:项目\s*(?:是|为|[:：])|类别\s*(?:是|为|[:：])|属于|优先级|目前|当前|状态|下一步|接下来|截止|最后期限|反馈|结果|结论)/.test(clause)) return;
        let cleaned = clause
          .split(/(?=项目\s*(?:是|为|[:：])|类别\s*(?:是|为|[:：])|优先级|目前|当前|状态|下一步|接下来|截止|最后期限|反馈|结果|结论)/)[0]
          .replace(/需要在\s*(?:今天|明天|后天|本周|下周)?(?:上午|下午|晚上)?(?:前完成)?/g, "")
          .replace(/截止到\s*(?:今天|明天|后天|本周|下周)?(?:上午|下午|晚上)?/g, "")
          .replace(/(?:今天|明天|后天|本周|下周|上午|下午|晚上)/g, "")
          .replace(/最后期限/g, "")
          .trim();
        const action = cleaned.match(actionPattern);
        if (!action) return;
        const title = cleaned.slice(action.index).replace(/前完成$/, "").trim();
        if (title) candidates.push(title);
      });

      return candidates.find(title => title !== "提交") || candidates[0] || cleanRuleTaskText(text).split(/[，,。；;\n]/)[0] || "";
    }

    function cleanStepTextWithTiming(text) {
      const dueText = extractDueText(text);
      return cleanExecutionStep(
        String(text || "")
          .replace(/((?:20\d{2}[-\/])?\d{1,2}月\d{1,2}日?|20\d{2}[-\/]\d{1,2}[-\/]\d{1,2}|今天|明天|后天|周[一二三四五六日天]|星期[一二三四五六日天])[^，。；;\n]*(?:提醒|叫我|通知)/g, "")
          .replace(dueText || "", "")
          .replace(/(?:前)?(?:完成|提交|交付)$/g, "")
      );
    }

    function buildExecutionItemFromText(text, defaultStatus = "未开始", attachments = []) {
      const timing = extractStepTiming(text);
      const actualHours = extractActualHours(text);
      const cleanedStep = cleanStepTextWithTiming(removeActualHoursText(text));
      if (!cleanedStep || isDeadlineOnlyStep(cleanedStep)) return null;
      return { id: makeRowId("exec"), text: cleanedStep, status: defaultStatus, dueText: timing.dueText, reminderAt: timing.reminderAt, actualHours, feedbackNote: "", attachments };
    }

    function extractRuleDueDate(text) {
      const explicit = text.match(
        /(?:截止(?:到|日期)?|最后期限(?:是|为)?|需要在)[：:\s]*(day after tomorrow|后天|tomorrow|明天|today|今天|20\d{2}[-\/]\d{1,2}[-\/]\d{1,2}|\d{1,2}月\d{1,2}日?)/i
      );
      if (explicit) return parseDateExpression(explicit[1]);
      const delivery = text.match(/(day after tomorrow|后天|tomorrow|明天|today|今天)(?:前)?\s*(?:提交|完成|交付)/i);
      if (delivery) return parseDateExpression(delivery[1]);
      return parseDateExpression(text);
    }

    function ruleParse(text) {
      const result = emptyParsedResult();
      const { compact, segments } = segmentRuleText(text);
      const assignmentPhrase = assignmentPhraseFromSegments(segments);
      const progressText = segments.progress.map(cleanProgressText).filter(Boolean).join("\n");
      result.inputType = classifyInputType(compact);
      result.actualHours = extractActualHours(compact);

      const explicitPriority = compact.match(/(?:优先级|priority)\s*(?:是|为|[:：])?\s*(\d+|高|中|低|high|medium|normal|low|urgent|紧急|最高|高优先级|重要|中等|普通|一般|不急|低优先级)/i);
      if (explicitPriority) result.priority = normalizePriority(explicitPriority[1]);
      else if (/(?:最高|紧急|高优先级|重要|urgent|\bhigh\b)/i.test(compact)) result.priority = "优先级1";
      else if (/(?:中等|一般|\bnormal\b|\bmedium\b)/i.test(compact)) result.priority = "优先级2";
      else if (/(?:普通|不急|低优先级|\blow\b)/i.test(compact)) result.priority = "优先级3";

      const statusChecks = [
        [/(等待反馈|等反馈|待反馈|waiting for feedback)/i, "inprogress"],
        [/(进行中|正在处理|处理中|in progress)/i, "inprogress"],
        [/(待办|还没开始|未开始|to do|todo)/i, "new"],
        [/(新任务|新的|new task)/i, "new"],
        [/(已完成|已经完成|做完了|任务完成|completed|mark as done|\bdone\b)/i, "done"],
        [/(已归档|归档|archived)/i, "archived"]
      ];
      result.status = statusChecks.find(([pattern]) => pattern.test(compact))?.[1] || "";

      result.dueDate = extractRuleDueDate(compact);

      const nextItems = [];
      const nextBlock = compact.match(/(?:下一步(?:是|为)?|接下来(?:要|是)?)[：:\s]*(.+?)(?=反馈|结果|结论|$)/i);
      if (nextBlock?.[1]?.trim()) nextItems.push(nextBlock[1].trim().replace(/[，。；;,.]+$/, ""));
      segments.next.forEach(item => {
        const dueText = extractDueText(item);
        const cleanedStep = cleanExecutionStep(removeDuePrefix(item.replace(/^(?:下一步|接下来|之后|还要|需要再)(?:是|要|先)?/, ""), dueText));
        if (!isDeadlineOnlyStep(item) && cleanedStep) {
          nextItems.push(`${dueText && !isDeadlineOnlyStep(item) ? `${dueText} ` : ""}${cleanedStep}`.trim());
        }
      });
      result.nextAction = nextItems.filter(Boolean).join("\n") || firstMatch(compact, [
        /next step(?: is|:)?\s*([^,.;\n]+)/i
      ]);
      if (!result.nextAction && /交接|sop|SOP|提交/.test(compact)) {
        const actions = [];
        if (/完成.*?交接/.test(compact)) actions.push("完成现有工作的交接");
        if (/整理.*?SOP/i.test(compact)) actions.push("整理工作SOP");
        const submitMatch = compact.match(/提交给([^，,。；;\n]+)/);
        if (submitMatch) actions.push(`提交给${submitMatch[1].trim()}`);
        if (actions.length) result.nextAction = actions.join("\n");
      }
      result.feedback = firstMatch(compact, [
        /(?:客户|供应商)?反馈(?:是|说|为)?[：:\s]*([^，。；;\n]+)/i,
        /(?:customer|supplier) feedback(?: is| says|:)?\s*([^,.;\n]+)/i
      ]);
      const feedbackClauses = compact.split(/[，,。；;\n]/).map(item => item.trim()).filter(item => /反馈/.test(item) && !/(等反馈|等待反馈|待反馈)/.test(item));
      if (segments.feedback.length) result.feedback = segments.feedback.join("\n");
      else if (feedbackClauses.length > 1) result.feedback = feedbackClauses.join("\n");
      result.finalResult = firstMatch(compact, [
        /(?:交付成果|最终结果|结论|最终)(?:是|为)?[：:\s]*([^，。；;\n]+)/i,
        /(?:已提交|已经提交|已交付|已完成交付|已经提交给)([^，。；;\n]*)/i,
        /result(?: is|:)?\s*([^,.;\n]+)/i
      ]);
      if (segments.final.length) result.finalResult = segments.final.join("\n");
      if (result.finalResult && /发给老板/.test(compact) && !/发给老板/.test(result.finalResult)) result.finalResult = `${result.finalResult}已发给老板。`;
      result.source = extractRuleSource(compact) || firstMatch(compact, [
        /接收到([^，。；;\n]{1,20}?)(?:的)?任务/,
        /([^，。；;\n]{1,30}?)(?:让我|叫我|要求我|安排我)/,
        /(?:assigned by|from)\s+([^,.;\n]+)/i,
        /([^,.;\n]{1,30}?)\s+(?:asked|told) me to/i
      ]);
      result.background = firstMatch(compact, [
        /(?:背景|原因)(?:是|为)?[：:\s]*([^，。；;\n]+)/i,
        /(?:background|because)(?: is|:)?\s*([^,.;\n]+)/i
      ]);
      result.receivedDate = /(?:今天收到|今天接到|received today)/i.test(compact) ? dateKey(new Date()) : "";
      result.startDate = extractStartDate(compact);
      result.dueDate = extractCompletionDate(compact) || result.dueDate;
      result.reminder = normalizeReminder(compact);

      if (result.inputType === "反馈调整") {
        result.title = conciseFeedbackTitle(compact) || extractImprovedTitle(compact) || titleFromAssignmentPhrase(assignmentPhrase, compact);
        result.project = projectFromPhrase(result.title) || extractRuleProject(compact);
      } else if (result.inputType === "完成交付") {
        result.title = cleanExtractedTitle(compact.split(/已完成|已提交|已交付|已发给|已发出|已经给到/)[0]) || extractImprovedTitle(compact) || titleFromAssignmentPhrase(assignmentPhrase, compact);
        result.project = projectFromPhrase(result.title) || extractRuleProject(compact);
      } else if (!assignmentPhrase && progressText && segments.next.length) {
        const progressCore = progressText.replace(/^(?:今天已经|我已经|已经|我今天已经)(?:完成|做了|整理了)?/, "").trim();
        const nextCore = segments.next
          .map(item => removeDuePrefix(item, extractDueText(item)).replace(/^(?:下一步|接下来|之后|还要|需要再)(?:是|要|先)?/, "").trim())
          .map(item => item.replace(/^补充(.+)/, "$1补充"))
          .filter(Boolean)
          .join("及");
        result.title = [progressCore, nextCore].filter(Boolean).join("及") || extractRuleTitle(compact);
        result.project = projectFromPhrase(result.title);
      } else {
        result.title = extractImprovedTitle(compact) || (/交接/i.test(compact) && /SOP/i.test(compact) && !/^.*反馈/.test(compact) ? "整理工作交接SOP" : titleFromAssignmentPhrase(assignmentPhrase, compact));
        result.project = projectFromPhrase(assignmentPhrase || result.title) || extractRuleProject(compact);
      }
      if (!result.title || /^Untitled task$/i.test(result.title)) result.title = extractImprovedTitle(compact) || "未命名任务";
      result.project = result.project || firstMatch(compact, [
        /(?:project|category)(?: is|:)?\s*([^,.;\n]+)/i
      ]);
      if (result.inputType === "反馈调整" || result.inputType === "进展更新") result.status = "inprogress";
      if (result.inputType === "完成交付") result.status = "done";
      if (result.inputType === "新建任务" && !/(已经|已完成|处理了|正在|反馈|调整)/.test(compact)) result.status = "new";
      if (result.inputType === "进展更新") {
        const doneTitle = compact.match(/(?:今天)?完成了(.+?)(?:，|,|。|；|;|$)/);
        if (doneTitle?.[1]) result.title = doneTitle[1].replace(/和/g, "与").trim();
      }
      if (progressText && !/(?:等待反馈|等反馈|待反馈)/.test(compact)) result.status = "inprogress";
      if (!result.status) result.status = result.receivedDate ? "new" : (result.source ? "new" : "");
      if (!result.status && /已经开始|开始做|开始处理/.test(compact)) result.status = "inprogress";
      if (!result.status && /还没开始|未开始|先放到收集箱/.test(compact)) result.status = "new";
      if (!result.status && /已经完成|已完成|做完了/.test(compact)) result.status = "done";

      const workflowSentences = compact.split(/[。;；\n]/).filter(sentence => /(?:进展(?:是|为|：|:)|处理记录|已做|沟通记录|workflow notes?|progress notes?)/i.test(sentence));
      result.workflowNotes = progressText || workflowSentences.join("；");
      result.executionItems = [];
      buildPriceBandAdjustmentItems(compact).forEach(item => {
        if (!result.executionItems.some(existing => existing.text === item.text)) result.executionItems.push(item);
      });
      buildContentChecklistItems(compact).forEach(item => {
        if (!result.executionItems.some(existing => existing.text === item.text)) result.executionItems.push(item);
      });
      buildProgressChecklistItems(compact).forEach(item => {
        if (!result.executionItems.some(existing => existing.text === item.text)) result.executionItems.push(item);
      });
      extractActualHourStepItems(compact).forEach(item => {
        if (!result.executionItems.some(existing => existing.text === item.text)) result.executionItems.push(item);
      });
      if (result.nextAction) {
        splitStructuredItems(result.nextAction).forEach(text => {
          const dueText = extractDueText(text);
          const timing = extractStepTiming(text);
          const cleanedStep = cleanStepTextWithTiming(removeDuePrefix(text, dueText));
          if (!isDeadlineOnlyStep(text) && cleanedStep) {
            result.executionItems.push({ id: makeRowId("exec"), text: cleanedStep, status: "未开始", dueText: timing.dueText || dueText, reminderAt: timing.reminderAt, actualHours: extractActualHours(text), feedbackNote: "", attachments: [] });
          }
        });
      }
      const planMatch = compact.match(/(?:我准备|准备|计划|打算)(.+?)(?=老板反馈|领导反馈|客户反馈|反馈|最终|已提交|已经提交|$)/);
      if (planMatch?.[1]) {
        planMatch[1]
          .split(/(?:先|再|然后|最后|，|,|；|;|。)/)
          .map(item => item.trim())
          .map(cleanExecutionStep)
          .filter(item => item && !isDeadlineOnlyStep(item))
          .forEach(text => {
            const item = buildExecutionItemFromText(text);
            if (item && !result.executionItems.some(existing => existing.text === item.text)) {
              result.executionItems.push(item);
            }
          });
      }
      if (!result.executionItems.length && result.inputType !== "完成交付") {
        buildMarketPlanningSteps(result.title, compact).forEach(item => {
          if (!result.executionItems.some(existing => existing.text === item.text)) result.executionItems.push(item);
        });
      }
      if (!(result.inputType === "新建任务" && result.executionItems.length)) {
        compact.split(/[；;\n]/).map(item => item.trim()).filter(Boolean).forEach(clause => {
          const stepTimingMatch = clause.match(/((?:20\d{2}[-\/])?\d{1,2}月\d{1,2}日?|20\d{2}[-\/]\d{1,2}[-\/]\d{1,2}|今天|明天|后天|周[一二三四五六日天]|星期[一二三四五六日天])前\s*([^，。；;\n]+?)(?:，|,|$)/);
          if (stepTimingMatch?.[2]) {
            const reminderPart = clause.match(/((?:20\d{2}[-\/])?\d{1,2}月\d{1,2}日?|20\d{2}[-\/]\d{1,2}[-\/]\d{1,2}|今天|明天|后天|周[一二三四五六日天]|星期[一二三四五六日天])[^，。；;\n]*(?:上午|早上|中午|下午|晚上)?\s*[0-2]?\d(?:点|:)(?:半|[0-5]\d)?[^，。；;\n]*(?:提醒|叫我|通知)/);
            const item = {
              id: makeRowId("exec"),
              text: cleanExecutionStep(stepTimingMatch[2]),
              status: "未开始",
              dueText: parseDateExpression(stepTimingMatch[1]) || stepTimingMatch[1],
              reminderAt: reminderPart ? datetimeLocalFromReminder(reminderPart[0]) : "",
              actualHours: extractActualHours(clause),
              feedbackNote: "",
              attachments: []
            };
            if (item.text && !isDeadlineOnlyStep(item.text) && !result.executionItems.some(existing => existing.text === item.text && existing.dueText === item.dueText)) {
              result.executionItems.push(item);
            }
          }
        });
      }
      if (progressText) {
        progressText.split("\n").filter(Boolean).forEach(text => {
          const item = buildExecutionItemFromText(text, /完成|整理完|做完/.test(text) ? "已完成" : "进行中");
          if (item) result.executionItems.push(item);
        });
      }
      if (result.inputType === "反馈调整") {
        if (/竞品价格/.test(compact) && /价格带|重新拆分/.test(compact)) result.feedback = `${result.source || "对方"}反馈竞品价格部分需要按四个价格带重新拆分。`;
        else if (/包装文案/.test(compact)) result.feedback = `${result.source || "对方"}反馈包装文案需要调整指定表述。`;
        else if (!result.feedback) result.feedback = compact.split(/[。；;\n]/)[0];
      }
      if (result.feedback && !buildPriceBandAdjustmentItems(compact).length) {
        splitStructuredItems(result.feedback).forEach(text => {
          result.executionItems.push({ id: makeRowId("exec"), text: text.replace(/^(?:老板|领导|客户)?反馈(?:说|是)?/, "") || "反馈调整", status: "需调整", dueText: "", reminderAt: "", actualHours: extractActualHours(text), feedbackNote: text, attachments: [] });
        });
      }
      const missingMatch = compact.match(/发现([^，。；;\n]+?)(?:还)?(?:缺|缺失|不够|需要补)/);
      if (missingMatch?.[1]) {
        const target = missingMatch[1].trim();
        result.executionItems.push({ id: makeRowId("exec"), text: `补充${target}`, status: "需调整", dueText: "", reminderAt: "", actualHours: "", feedbackNote: `${target}数据缺失`, attachments: [] });
      }
      if (/等反馈|等待反馈/.test(compact) && !result.executionItems.some(item => item.status === "等待反馈")) {
        const confirmMatch = compact.match(/(?:已经|已)?([^，。；;\n]*?发给[^，。；;\n]*?确认)/);
        result.executionItems.push({ id: makeRowId("exec"), text: confirmMatch?.[1]?.trim() || "发给相关人员确认", status: "等待反馈", dueText: "", reminderAt: "", actualHours: "", feedbackNote: "等待反馈", attachments: [] });
      }
      if (/复盘|总结|经验|下次|建议|最好|可优先|教训|这次发现/.test(compact)) {
        result.reviewSummary = firstMatch(compact, [/复盘[：:\s]*(.+)$/i, /总结[：:\s]*(.+)$/i, /(后续要注意.+)$/i, /(下次要.+)$/i]) || compact.replace(/^这次发现/, "").trim();
      }
      return normalizeParsedResult(result);
    }

    function compactSummary(text, fallback = "空") {
      const cleaned = String(text || "").replace(/\s+/g, " ").trim();
      return cleaned ? (cleaned.length > 52 ? `${cleaned.slice(0, 52)}…` : cleaned) : fallback;
    }

    function appendLongText(existing, addition) {
      const oldText = String(existing || "").trim();
      const newText = String(addition || "").trim();
      if (!newText) return oldText;
      return oldText ? `${oldText}\n${newText}` : newText;
    }

    function escapeICS(text) {
      return String(text || "").replace(/\\/g, "\\\\").replace(/;/g, "\\;").replace(/,/g, "\\,").replace(/\n/g, "\\n");
    }

    function addDaysToDateKey(value, days) {
      const date = toDate(value);
      if (!date) return "";
      date.setDate(date.getDate() + days);
      return dateKey(date);
    }

    function icsDate(value) {
      return String(value || "").replace(/-/g, "");
    }

    function icsDateTime(value) {
      const text = String(value || "").trim();
      const match = text.match(/(20\d{2})[\/-](\d{1,2})[\/-](\d{1,2})(?:[ T](\d{1,2}):(\d{2}))?/);
      if (!match) return "";
      const year = match[1];
      const month = String(Number(match[2])).padStart(2, "0");
      const day = String(Number(match[3])).padStart(2, "0");
      const hour = String(Number(match[4] || 9)).padStart(2, "0");
      const minute = String(Number(match[5] || 0)).padStart(2, "0");
      return `${year}${month}${day}T${hour}${minute}00`;
    }

    function loadGoogleCalendarSession() {
      try {
        const saved = JSON.parse(sessionStorage.getItem(GOOGLE_CALENDAR_SESSION_KEY) || "null");
        if (!saved?.accessToken || Number(saved.expiresAt || 0) <= Date.now() + 30000) {
          sessionStorage.removeItem(GOOGLE_CALENDAR_SESSION_KEY);
          return null;
        }
        return saved;
      } catch {
        return null;
      }
    }

    function saveGoogleCalendarSession(response) {
      const expiresIn = Math.max(60, Number(response.expires_in || 3600));
      const session = {
        accessToken: response.access_token,
        expiresAt: Date.now() + expiresIn * 1000,
        scope: response.scope || GOOGLE_CALENDAR_SCOPE
      };
      sessionStorage.setItem(GOOGLE_CALENDAR_SESSION_KEY, JSON.stringify(session));
      return session;
    }

    function clearGoogleCalendarSession() {
      sessionStorage.removeItem(GOOGLE_CALENDAR_SESSION_KEY);
    }

    function loadGoogleCalendarAutoSync() {
      return localStorage.getItem(GOOGLE_CALENDAR_AUTO_SYNC_KEY) === "yes";
    }

    function waitForGoogleIdentity(timeoutMs = 12000) {
      if (window.google?.accounts?.oauth2) return Promise.resolve(window.google.accounts.oauth2);
      return new Promise((resolve, reject) => {
        const startedAt = Date.now();
        const timer = window.setInterval(() => {
          if (window.google?.accounts?.oauth2) {
            window.clearInterval(timer);
            resolve(window.google.accounts.oauth2);
          } else if (Date.now() - startedAt >= timeoutMs) {
            window.clearInterval(timer);
            reject(new Error("Google授权组件加载失败，请检查网络后重试。"));
          }
        }, 150);
      });
    }

    async function requestGoogleCalendarAccess() {
      const oauth2 = await waitForGoogleIdentity();
      return new Promise((resolve, reject) => {
        let settled = false;
        const finish = callback => value => {
          if (settled) return;
          settled = true;
          callback(value);
        };
        const tokenClient = oauth2.initTokenClient({
          client_id: GOOGLE_CALENDAR_CLIENT_ID,
          scope: GOOGLE_CALENDAR_SCOPE,
          prompt: "consent",
          callback: finish(response => {
            if (!response?.access_token || response.error) {
              reject(new Error(response?.error_description || response?.error || "Google日历授权没有完成。"));
              return;
            }
            resolve(saveGoogleCalendarSession(response));
          }),
          error_callback: finish(error => reject(new Error(error?.message || error?.type || "Google日历授权窗口已关闭。")))
        });
        tokenClient.requestAccessToken();
      });
    }

    async function googleCalendarRequest(path, accessToken, options = {}) {
      const response = await fetch(`https://www.googleapis.com/calendar/v3${path}`, {
        ...options,
        headers: {
          Authorization: `Bearer ${accessToken}`,
          ...(options.body ? { "Content-Type": "application/json" } : {}),
          ...(options.headers || {})
        }
      });
      if (response.status === 401) {
        const error = new Error("Google日历授权已失效，请重新连接。 ");
        error.code = "google-auth-expired";
        throw error;
      }
      if (!response.ok) {
        const details = await response.json().catch(() => ({}));
        const error = new Error(details?.error?.message || `Google日历请求失败（${response.status}）`);
        error.status = response.status;
        throw error;
      }
      if (response.status === 204) return null;
      return response.json();
    }

    function googleTaskEventPayload(task) {
      const startDate = task.startDate || task.deadline || "";
      if (!startDate) return null;
      const lastDate = task.deadline && task.startDate && task.deadline >= task.startDate ? task.deadline : startDate;
      const titlePrefix = task.status === "done" ? "✅" : "工作任务";
      const event = {
        summary: `${titlePrefix}｜${task.title || "未命名任务"}`,
        description: taskCalendarDescription(task),
        start: { date: startDate },
        end: { date: addDaysToDateKey(lastDate, 1) },
        reminders: { useDefault: true },
        extendedProperties: { private: { dailyWorkTrackerTaskId: task.id, dailyWorkTrackerKind: "task" } }
      };
      const reminderAt = toDate(task.reminderAt || task.reminder);
      const eventStart = toDate(startDate);
      if (reminderAt && eventStart) {
        const minutes = Math.round((eventStart.getTime() - reminderAt.getTime()) / 60000);
        if (minutes >= 0 && minutes <= 40320) event.reminders = { useDefault: false, overrides: [{ method: "popup", minutes }] };
      }
      return event;
    }

    function googleExecutionEventPayload(task, item, index) {
      const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone || "Asia/Shanghai";
      const description = [
        `所属任务：${task.title || ""}`,
        `执行项序号：${index + 1}`,
        `状态：${item.status || ""}`,
        item.actualHours && `耗时：${item.actualHours} 小时`,
        item.feedbackNote && `反馈/调整记录：${item.feedbackNote}`,
        "由每日工作追踪器同步。"
      ].filter(Boolean).join("\n");
      const event = {
        summary: `${item.status === "已完成" ? "✅" : "执行项"}｜${item.text || `执行项${index + 1}`}`,
        description,
        reminders: { useDefault: true },
        extendedProperties: { private: { dailyWorkTrackerTaskId: task.id, dailyWorkTrackerExecutionId: item.id, dailyWorkTrackerKind: "execution" } }
      };
      if (item.startedAt || item.endedAt) {
        const start = item.startedAt || localDateTimeValue(new Date(new Date(item.endedAt).getTime() - 3600000));
        const end = item.endedAt || localDateTimeValue(new Date(new Date(item.startedAt).getTime() + 3600000));
        event.start = { dateTime: `${start}:00`, timeZone: timezone };
        event.end = { dateTime: `${end}:00`, timeZone: timezone };
        return event;
      }
      const dueDate = parseDateExpression(item.dueText);
      if (!dueDate) return null;
      event.start = { date: dueDate };
      event.end = { date: addDaysToDateKey(dueDate, 1) };
      return event;
    }

    async function upsertGoogleCalendarEvent(existingId, payload, accessToken) {
      if (existingId) {
        try {
          return await googleCalendarRequest(`/calendars/primary/events/${encodeURIComponent(existingId)}`, accessToken, {
            method: "PATCH",
            body: JSON.stringify(payload)
          });
        } catch (error) {
          if (error.status !== 404 && error.status !== 410) throw error;
        }
      }
      return googleCalendarRequest("/calendars/primary/events", accessToken, {
        method: "POST",
        body: JSON.stringify(payload)
      });
    }

    async function deleteGoogleCalendarEvent(eventId, accessToken) {
      if (!eventId) return;
      try {
        await googleCalendarRequest(`/calendars/primary/events/${encodeURIComponent(eventId)}`, accessToken, { method: "DELETE" });
      } catch (error) {
        if (error.status !== 404 && error.status !== 410) throw error;
      }
    }

    async function syncTaskToGoogleCalendar(task, accessToken) {
      const normalized = normalizeTask(task);
      const previousGoogle = normalizeCalendarSync(normalized.calendarSync).google;
      let taskEventId = previousGoogle.taskEventId;
      const taskPayload = googleTaskEventPayload(normalized);
      if (taskPayload) {
        const event = await upsertGoogleCalendarEvent(taskEventId, taskPayload, accessToken);
        taskEventId = event.id;
      } else if (taskEventId) {
        await deleteGoogleCalendarEvent(taskEventId, accessToken);
        taskEventId = "";
      }

      const executionItems = normalizeExecutionItems(normalized.executionItems, normalized);
      const executionEventIds = {};
      for (let index = 0; index < executionItems.length; index += 1) {
        const item = executionItems[index];
        const payload = googleExecutionEventPayload(normalized, item, index);
        const existingId = previousGoogle.executionEventIds[item.id] || "";
        if (payload) {
          const event = await upsertGoogleCalendarEvent(existingId, payload, accessToken);
          executionEventIds[item.id] = event.id;
        } else if (existingId) {
          await deleteGoogleCalendarEvent(existingId, accessToken);
        }
      }
      const currentRowIds = new Set(executionItems.map(item => item.id));
      for (const [rowId, eventId] of Object.entries(previousGoogle.executionEventIds)) {
        if (!currentRowIds.has(rowId)) await deleteGoogleCalendarEvent(eventId, accessToken);
      }

      return {
        ...normalized,
        calendarSync: {
          google: {
            taskEventId,
            executionEventIds,
            syncedAt: new Date().toISOString()
          }
        }
      };
    }

    async function deleteTaskFromGoogleCalendar(task, accessToken) {
      const google = normalizeCalendarSync(task.calendarSync).google;
      const eventIds = [google.taskEventId, ...Object.values(google.executionEventIds)].filter(Boolean);
      for (const eventId of eventIds) await deleteGoogleCalendarEvent(eventId, accessToken);
    }

    function taskCalendarDescription(task) {
      const executionSummary = normalizeExecutionItems(task.executionItems, task).map((item, index) => `${index + 1}. ${item.text}（${item.status}）`).join("\n");
      const finalSummary = normalizeFinalResults(task.finalResults, task.finalResult).map(item => item.text).join("\n");
      const reviewSummary = normalizeReviewItems(task.reviewItems, task).map(item => item.text).join("\n");
      return [
        `项目或类别：${task.project || ""}`,
        `任务来源/指派人：${task.source || ""}`,
        `优先级：${normalizePriority(task.priority) || "优先级3"}`,
        `当前进展：${statusTitle(task.status)}`,
        `开始日期：${task.startDate || ""}`,
        `完成日期 / 最后期限：${task.deadline || ""}`,
        `提醒时间：${displayReminder(task.reminderAt || task.reminder)}`,
        executionSummary && `执行清单摘要：\n${executionSummary}`,
        finalSummary && `交付结果摘要：\n${finalSummary}`,
        reviewSummary && `复盘小结摘要：\n${reviewSummary}`,
        "由 Daily Work Tracker 生成。"
      ].filter(Boolean).join("\n");
    }

    function calendarAlarmLines(reminder, title) {
      const normalized = normalizeReminder(reminder);
      if (!normalized || normalized === NO_REMINDER) return [];
      const compact = icsDateTime(normalized);
      if (compact) return ["BEGIN:VALARM", `TRIGGER;VALUE=DATE-TIME:${compact}`, "ACTION:DISPLAY", `DESCRIPTION:${escapeICS(`提醒：${title}`)}`, "END:VALARM"];
      return [];
    }

    function downloadTaskICS(task) {
      const exportRows = normalizeExecutionItems(task.executionItems, task).filter(item => item.startedAt || item.endedAt || item.dueText);
      const summaryItems = [
        task.startDate || task.deadline ? `任务：${task.title || "未命名任务"}` : "",
        ...exportRows.map(item => `节点：${item.text || "未命名节点"}`)
      ].filter(Boolean);
      if (!summaryItems.length) {
        alert("没有可生成日历事项的日期。请先填写任务开始/完成日期，或执行清单的启动/结束时间。");
        return;
      }
      if (!window.confirm(`将下载日历提醒文件：\n- ${summaryItems.join("\n- ")}\n\n下载后请用 Outlook、系统日历或手机日历打开导入。`)) return;
      const start = task.startDate || task.deadline || "";
      const end = task.deadline && task.startDate ? addDaysToDateKey(task.deadline, 1) : addDaysToDateKey(start || task.deadline, 1);
      const uid = `${task.id || makeId()}@daily-work-tracker`;
      const lines = [
        "BEGIN:VCALENDAR",
        "VERSION:2.0",
        "PRODID:-//Daily Work Tracker//Task Export//CN",
        "CALSCALE:GREGORIAN"
      ];
      const stamp = new Date().toISOString().replace(/[-:]/g, "").replace(/\.\d{3}Z$/, "Z");
      if (start || task.deadline) {
        lines.push(
          "BEGIN:VEVENT",
          `UID:${uid}`,
          `DTSTAMP:${stamp}`,
          `SUMMARY:${escapeICS(`任务：${task.title || "未命名任务"}`)}`,
          `DTSTART;VALUE=DATE:${icsDate(start || task.deadline)}`,
          `DTEND;VALUE=DATE:${icsDate(end || addDaysToDateKey(start || task.deadline, 1))}`,
          `DESCRIPTION:${escapeICS(taskCalendarDescription(task))}`,
          ...calendarAlarmLines(task.reminderAt || task.reminder, task.title || "未命名任务"),
          "END:VEVENT"
        );
      }
      exportRows.forEach((item, index) => {
        const timedStart = item.startedAt || item.endedAt;
        const timedEnd = item.endedAt || (item.startedAt ? localDateTimeValue(new Date(new Date(item.startedAt).getTime() + 3600000)) : "");
        const dueDate = parseDateExpression(item.dueText);
        if (!timedStart && !dueDate) return;
        const dateLines = timedStart
          ? [`DTSTART:${icsDateTime(timedStart)}`, `DTEND:${icsDateTime(timedEnd)}`]
          : [`DTSTART;VALUE=DATE:${icsDate(dueDate)}`, `DTEND;VALUE=DATE:${icsDate(addDaysToDateKey(dueDate, 1))}`];
        lines.push(
          "BEGIN:VEVENT",
          `UID:${uid}-step-${index + 1}`,
          `DTSTAMP:${stamp}`,
          `SUMMARY:${escapeICS(`节点：${item.text || "未命名节点"}`)}`,
          ...dateLines,
          `DESCRIPTION:${escapeICS([`所属任务：${task.title || ""}`, `节点状态：${item.status || ""}`, item.startedAt && `启动时间：${item.startedAt}`, item.endedAt && `结束时间：${item.endedAt}`, item.actualHours && `耗时：${item.actualHours} 小时`, item.feedbackNote && `反馈/调整记录：${item.feedbackNote}`].filter(Boolean).join("\n"))}`,
          "END:VEVENT"
        );
      });
      lines.push("END:VCALENDAR");
      const blob = new Blob([lines.join("\r\n")], { type: "text/calendar;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `任务-${String(task.title || "未命名任务").replace(/[\\/#?%*:|"<>]/g, "-")}.ics`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(url), 30000);
    }

    function inferExecutionStepText(text) {
      const value = String(text || "").trim();
      const finishedOrganize = value.match(/(?:今天|我)?(?:已经)?(?:整理了|整理完|完成了)\s*([^，。；;\n]+)/);
      if (finishedOrganize?.[1]?.trim()) return `${finishedOrganize[1].trim()}整理`;
      const marketData = value.match(/(?:今天|我)?(?:已经)?(?:整理了|整理完|完成了)?\s*([^，。；;\n]*?(?:市场规模|价格段|数据表|数据|资料|清单))\s*(?:数据|资料|清单)?/);
      if (marketData?.[1]?.trim()) return `${marketData[1].trim()}整理`;
      const outputPpt = value.match(/(输出\s*PPT|做\s*PPT|制作\s*PPT)/i);
      if (outputPpt) return outputPpt[1].replace(/\s+/g, "");
      const needTemplate = value.match(/([^，。；;\n]*?(?:PPT|模板|表格|清单|说明书))需要用/);
      if (needTemplate?.[1]?.trim()) return needTemplate[1].trim();
      return value;
    }

    function inferExecutionStatus(text) {
      const value = String(text || "");
      if (/已完成|已经完成|完成了|做完|整理完|整理了|今天整理/.test(value)) return "已完成";
      if (/等待反馈|等反馈|待反馈/.test(value)) return "等待反馈";
      if (/反馈|调整|需调整|需要改/.test(value)) return "需调整";
      if (/准备|计划|需要|待|接下来|下一步/.test(value)) return "未开始";
      return "进行中";
    }

    function inferTaskStatusFromText(text) {
      const value = String(text || "");
      if (/先放到收集箱|还没开始|未开始/.test(value)) return "new";
      if (/已经完成|已完成|做完了|任务完成|标记完成/.test(value)) return "done";
      if (/已经开始|开始做|开始处理|进行中|正在处理/.test(value)) return "inprogress";
      return "";
    }

    function inferExecutionUpdate(text) {
      const value = String(text || "").trim();
      if (!value) return null;
      const actualHours = extractActualHours(value);
      const nowValue = localDateTimeValue();
      const ordinalIndex = executionOrdinalIndex(value);
      if (ordinalIndex >= 0) {
        const ordinalLabel = `序号${ordinalIndex + 1}`;
        const ordinalFields = executionCommandFields(value);
        if (ordinalFields) return { targetIndex: ordinalIndex, matchText: ordinalLabel, text: ordinalLabel, ...ordinalFields, requiresExistingMatch: true };
      }
      let match = value.match(/(?:我\s*)?(?:今天|现在)?\s*(?:我\s*)?(?:已经|刚刚?|终于)?\s*(?:处理完了?|做完了?|完成了?)\s*([^，。；;\n]+)/);
      if (match?.[1]) return { matchText: cleanExecutionStep(removeActualHoursText(match[1])), text: cleanExecutionStep(removeActualHoursText(match[1])), status: "已完成", endedAt: nowValue, actualHours, feedbackNote: "", requiresExistingMatch: true };
      match = value.match(/(.+?)(?:这一步|这项|这个步骤)?(?:已经完成|已完成|做完了|完成了)/);
      if (match?.[1]) return { matchText: cleanExecutionStep(removeActualHoursText(match[1])), text: cleanExecutionStep(removeActualHoursText(match[1])), status: "已完成", endedAt: nowValue, actualHours, feedbackNote: "", requiresExistingMatch: true };
      match = value.match(/(.+?)(?:还没开始|未开始|暂不处理|先不做)/);
      if (match?.[1]) return { matchText: cleanExecutionStep(removeActualHoursText(match[1])), text: cleanExecutionStep(removeActualHoursText(match[1])), status: "未开始", actualHours, feedbackNote: "", requiresExistingMatch: true };
      match = value.match(/(?:我)?\s*(?:决定)?\s*(?:今天|现在)?\s*(?:要|就)?\s*(?:开始处理|开始做|着手处理|着手做|开始)\s*(?:先)?\s*([^，。；;\n]+)/);
      if (match?.[1]) return { matchText: cleanExecutionStep(removeActualHoursText(match[1])), text: cleanExecutionStep(removeActualHoursText(match[1])), status: "进行中", startedAt: nowValue, actualHours, feedbackNote: "", requiresExistingMatch: true };
      match = value.match(/(.+?)(?:现在|已经)?(?:开始处理|开始做|开始了|启动了|开始)$/);
      if (match?.[1]) return { matchText: cleanExecutionStep(removeActualHoursText(match[1])), text: cleanExecutionStep(removeActualHoursText(match[1])), status: "进行中", startedAt: nowValue, actualHours, feedbackNote: "", requiresExistingMatch: true };
      match = value.match(/(.+?)(?:等|等待|待)(?:老板|领导|客户|供应商)?反馈/);
      if (match?.[1]) return { matchText: cleanExecutionStep(removeActualHoursText(match[1])), text: cleanExecutionStep(removeActualHoursText(match[1])), status: "等待反馈", actualHours, feedbackNote: "等待反馈" };
      match = value.match(/(?:老板|领导|客户|供应商)?反馈(?:说)?(.+?)要调整/);
      if (match?.[1]) {
        const feedbackTarget = match[1].includes("价格段") && !match[1].includes("分析") ? `${match[1]}分析` : match[1];
        const core = cleanExecutionStep(`${feedbackTarget}调整`);
        return { matchText: cleanExecutionStep(match[1]), text: core, status: "需调整", actualHours, feedbackNote: `老板反馈：${match[1]}要调整` };
      }
      return null;
    }

    function executionCommandFields(text) {
      const value = String(text || "");
      const completionValue = value.replace(/未完成|没完成|还没完成|尚未完成/g, "");
      const nowValue = localDateTimeValue();
      const actualHours = extractActualHours(value);
      if (/处理完|做完|完成|已完成|结束/.test(completionValue)) return { status: "已完成", endedAt: nowValue, actualHours, feedbackNote: "" };
      if (/等待反馈|等反馈|待反馈/.test(value)) return { status: "等待反馈", actualHours, feedbackNote: "等待反馈" };
      if (/调整|修改|重做|返工/.test(value)) return { status: "需调整", actualHours, feedbackNote: value.trim() };
      if (/开始|启动|着手|进行/.test(value)) return { status: "进行中", startedAt: nowValue, actualHours, feedbackNote: "" };
      if (/未开始|还没开始|暂不处理|先不做/.test(value)) return { status: "未开始", actualHours, feedbackNote: "" };
      return null;
    }

    function ordinalUpdate(index, commandText, fields) {
      return {
        targetIndex: index,
        matchText: `序号${index + 1}`,
        text: `序号${index + 1}`,
        ...fields,
        commandText,
        requiresExistingMatch: true
      };
    }

    function inferExecutionUpdates(text, existingItems = []) {
      const value = String(text || "").trim();
      if (!value) return [];
      const items = normalizeExecutionItems(existingItems, {}, true);
      const allIndices = items.map((_, index) => index);
      const overallFields = executionCommandFields(value);
      const updates = [];

      if (overallFields && /除了/.test(value) && /其他|其余|剩下/.test(value)) {
        const excludedPart = value.match(/除了(.+?)(?:之外|以外|，|,|其他|其余|剩下)/)?.[1] || "";
        const excluded = new Set(executionOrdinalIndices(excludedPart));
        allIndices.filter(index => !excluded.has(index)).forEach(index => updates.push(ordinalUpdate(index, value, overallFields)));
      } else if (overallFields) {
        const frontMatch = value.match(/前\s*(\d+|[一二两三四五六七八九十]+)\s*(?:个|项|条)/);
        const lastMatch = value.match(/(?:后|最后)\s*(\d+|[一二两三四五六七八九十]+)\s*(?:个|项|条)/);
        if (frontMatch) {
          const count = chineseNumberValue(frontMatch[1]);
          allIndices.slice(0, count).forEach(index => updates.push(ordinalUpdate(index, value, overallFields)));
        } else if (lastMatch) {
          const count = chineseNumberValue(lastMatch[1]);
          allIndices.slice(Math.max(0, allIndices.length - count)).forEach(index => updates.push(ordinalUpdate(index, value, overallFields)));
        } else if (/剩下|其余|未完成的|还没完成的/.test(value) && /全部|都|所有/.test(value)) {
          allIndices.filter(index => items[index]?.status !== "已完成").forEach(index => updates.push(ordinalUpdate(index, value, overallFields)));
        } else if (/(?:全部|所有)(?:事项|事件|步骤|执行项|子任务)?|(?:事项|事件|步骤|执行项|子任务)全部/.test(value)) {
          allIndices.forEach(index => updates.push(ordinalUpdate(index, value, overallFields)));
        }
      }

      if (!updates.length) {
        const clauses = value.split(/[，,。；;\n]+/).map(clause => clause.trim()).filter(Boolean);
        clauses.forEach(clause => {
          const fields = executionCommandFields(clause);
          const indices = executionOrdinalIndices(clause);
          if (fields && indices.length) {
            indices.forEach(index => updates.push(ordinalUpdate(index, clause, fields)));
            return;
          }
          const inferred = inferExecutionUpdate(clause);
          if (inferred) updates.push(inferred);
        });
      }

      if (!updates.length) {
        const inferred = inferExecutionUpdate(value);
        if (inferred) updates.push(inferred);
      }

      const unique = [];
      updates.forEach(update => {
        const key = Number.isInteger(update.targetIndex)
          ? `index:${update.targetIndex}:${update.status}`
          : `text:${comparableExecutionText(update.matchText || update.text)}:${update.status}`;
        if (!unique.some(item => item.key === key)) unique.push({ key, update });
      });
      return unique.map(item => item.update);
    }

    function parseSmartUpdate(text, existingExecutionItems = []) {
      const compact = String(text || "").trim();
      const attachments = parseAttachmentLinks(compact);
      const contentText = removeAttachmentLines(compact);
      const result = { status: inferTaskStatusFromText(compact), startDate: extractStartDate(compact), dueDate: extractCompletionDate(compact), reminder: normalizeReminder(compact), actualHours: /(?:这个|整个)?任务/.test(compact) ? extractActualHours(compact) : "", executionUpdates: [], executionItems: [], feedbackItems: [], nextActions: [], processItems: [], finalResults: [], reviewItems: [], attachments };
      if (!compact) return result;
      inferExecutionUpdates(contentText, existingExecutionItems).forEach(executionUpdate => {
        result.executionUpdates.push({ ...executionUpdate, attachments });
      });

      const hasFeedback = /反馈|老板反馈|客户反馈|供应商反馈|领导反馈/.test(contentText);
      const hasExplicitNextAction = /下一步|接下来/.test(contentText);
      const hasProcess = /今天|已经|处理了|整理了|进展|发现|沟通了|花了|耗时|用了|用时/.test(contentText);
      const hasFinal = /最终|结果|已提交|已经提交|已完成交付|完成交付/.test(contentText);
      const hasReview = /复盘|总结|经验|下次|建议|最好|可优先|教训|这次发现/.test(contentText);
      const timeText = todayTimeText();

      const addFeedback = (textValue, rowAttachments = []) => {
        if (textValue.trim() || rowAttachments.length) {
          result.feedbackItems.push({ id: makeRowId("feedback"), text: textValue.trim(), createdAt: timeText, attachments: rowAttachments, status: "新反馈" });
          result.executionItems.push({ id: makeRowId("exec"), text: textValue.trim() || "反馈调整", status: "需调整", dueText: "", reminderAt: "", actualHours: extractActualHours(textValue), feedbackNote: textValue.trim(), attachments: rowAttachments });
        }
      };
      const addNextAction = (textValue, dueText = "") => {
        if (textValue.trim()) {
          result.nextActions.push({ id: makeRowId("next"), text: textValue.trim(), dueText: dueText.trim(), status: "未开始" });
          const timing = extractStepTiming(`${dueText} ${textValue}`);
          result.executionItems.push({ id: makeRowId("exec"), text: removeActualHoursText(textValue.trim()), status: "未开始", dueText: timing.dueText || dueText.trim(), reminderAt: timing.reminderAt, actualHours: extractActualHours(textValue), feedbackNote: "", attachments: [] });
        }
      };
      const addProcess = (textValue, rowAttachments = []) => {
        if (textValue.trim() || rowAttachments.length) {
          const stepText = inferExecutionStepText(textValue.trim()) || "执行记录";
          result.processItems.push({ id: makeRowId("process"), text: textValue.trim(), createdAt: timeText, attachments: rowAttachments });
          const timing = extractStepTiming(textValue);
          result.executionItems.push({ id: makeRowId("exec"), text: stepText, status: inferExecutionStatus(textValue), dueText: timing.dueText || timeText, reminderAt: timing.reminderAt, actualHours: extractActualHours(textValue), feedbackNote: "", attachments: rowAttachments });
        }
      };
      const addFinal = (textValue, rowAttachments = []) => {
        if (textValue.trim() || rowAttachments.length) {
          result.finalResults.push({ id: makeRowId("final"), text: textValue.trim(), createdAt: timeText, attachments: rowAttachments });
        }
      };
      const addReview = (textValue, rowAttachments = []) => {
        if (textValue.trim() || rowAttachments.length) {
          result.reviewItems.push({ id: makeRowId("review"), text: textValue.trim(), createdAt: timeText, attachments: rowAttachments });
        }
      };

      if (hasReview) addReview(contentText, attachments);
      else if (hasFeedback) addFeedback(contentText, attachments);
      if (hasFinal) addFinal(contentText, attachments);
      extractActualHourStepItems(contentText).forEach(item => {
        if (!result.executionItems.some(existing => existing.text === item.text)) result.executionItems.push({ ...item, attachments });
      });

      if (hasExplicitNextAction) {
        let nextText = contentText
          .replace(/^(?:下一步|接下来)(?:是|要|先)?/, "")
          .replace(/^先/, "")
          .trim();
        const items = splitStructuredItems(nextText).filter(item => !/^(?:下一步|接下来)$/.test(item));
        (items.length ? items : [nextText]).forEach(item => {
          const dueText = extractDueText(item);
          addNextAction(removeDuePrefix(item, dueText), dueText);
        });
      } else {
        const futureMatch = contentText.match(/(明天|后天|本周|下周|周[一二三四五六日天]|星期[一二三四五六日天])([^，。；;\n]+)/);
        if (futureMatch && (hasFeedback || hasProcess)) {
          addNextAction(removeDuePrefix(futureMatch[2], futureMatch[1]), futureMatch[1]);
        }
      }

      if (!hasReview && !hasFeedback && !hasFinal) {
        if (hasProcess && !result.executionItems.length && !result.executionUpdates.length) {
          const processText = contentText.replace(/(?:，|,)?(?:明天|后天|本周|下周|周[一二三四五六日天]|星期[一二三四五六日天])[^，。；;\n]+/, "").trim();
          addProcess(processText || contentText, attachments);
        } else if (!result.nextActions.length && contentText && !result.executionUpdates.length) {
          addProcess(contentText, attachments);
        }
      }

      if (!contentText && attachments.length) {
        if (/反馈/.test(compact)) addFeedback("", attachments);
        else if (/最终|结果|提交|交付/.test(compact)) addFinal("", attachments);
        else addProcess("", attachments);
      }

      return result;
    }

    // 老板让我明天跟进俄罗斯水槽说明书修改，项目是俄罗斯水槽，优先级高，目前进行中，下一步整理俄文问题清单
    // 客户要求后天确认俄罗斯标签内容，项目是包装标签，优先级高，当前待办

    function extractJsonObjectText(value) {
      let text = typeof value === "object" ? JSON.stringify(value) : String(value || "");
      text = text.replace(/^```(?:json)?\s*/i, "").replace(/\s*```$/i, "").trim();
      if (!text) return "";
      try {
        JSON.parse(text);
        return text;
      } catch {
        const start = text.indexOf("{");
        if (start === -1) return text;
        let depth = 0;
        let inString = false;
        let escaped = false;
        for (let index = start; index < text.length; index += 1) {
          const char = text[index];
          if (escaped) {
            escaped = false;
          } else if (char === "\\") {
            escaped = true;
          } else if (char === '"') {
            inString = !inString;
          } else if (!inString && char === "{") {
            depth += 1;
          } else if (!inString && char === "}") {
            depth -= 1;
            if (depth === 0) return text.slice(start, index + 1);
          }
        }
        return text.slice(start);
      }
    }

      const parseSmartUpdateText = (text = smartUpdateText) => {

        const unresolved = preview.executionUpdates.find(update => update.requiresExistingMatch && update.resolvedIndex < 0);

      const applySmartUpdate = () => {
        if (!smartUpdatePreview) return;

        if (smartUpdatePreview.executionItems?.length) {
          next.executionItems = mergeExecutionItems(next.executionItems, smartUpdatePreview.executionItems, next);

        if (smartUpdatePreview.executionUpdates?.length) {
          const existingExecutionItems = normalizeExecutionItems(next.executionItems, next, true);
          smartUpdatePreview.executionUpdates.forEach(update => {
            const targetIndex = Number.isInteger(update.resolvedIndex)
              ? update.resolvedIndex
              : (Number.isInteger(update.targetIndex) && existingExecutionItems[update.targetIndex]
                ? update.targetIndex
                : findExecutionItemIndex(existingExecutionItems, update.matchText || update.text));
            if (targetIndex >= 0) {
              const updatedItem = {
                ...existingExecutionItems[targetIndex],
                status: update.status,
                startedAt: update.startedAt || existingExecutionItems[targetIndex].startedAt || "",
                endedAt: update.endedAt || existingExecutionItems[targetIndex].endedAt || "",
                actualHours: update.actualHours || existingExecutionItems[targetIndex].actualHours || "",
                feedbackNote: appendLongText(existingExecutionItems[targetIndex].feedbackNote, update.feedbackNote),
                attachments: [...(existingExecutionItems[targetIndex].attachments || []), ...(update.attachments || [])]
              };
              existingExecutionItems[targetIndex] = executionItemWithAutomaticTiming(updatedItem);
            } else if (!update.requiresExistingMatch) {
              existingExecutionItems.push(executionItemWithAutomaticTiming({
                id: makeRowId("exec"),
                text: update.text || update.matchText || "执行记录",
                status: update.status,
                dueText: "",
                reminderAt: "",
                startedAt: update.startedAt || "",
                endedAt: update.endedAt || "",
                actualHours: update.actualHours || "",
                feedbackNote: update.feedbackNote || "",
                attachments: update.attachments || []
              }));
            }
          });
          next.executionItems = existingExecutionItems;
        }
        if (smartUpdatePreview.nextActions.length) {
          next.nextActions = [
            ...normalizeNextActions(next.nextActions),
            ...smartUpdatePreview.nextActions
          ];
          next.nextAction = nextActionsToText(next.nextActions);
        }
        if (smartUpdatePreview.feedbackItems.length) {
          next.feedbackItems = [
            ...normalizeFeedbackItems(next.feedbackItems),
            ...smartUpdatePreview.feedbackItems
          ];
          next.feedbackRecords = feedbackItemsToText(next.feedbackItems);
        }
        if (smartUpdatePreview.processItems.length) {
          next.processItems = [...normalizeProcessItems(next.processItems), ...smartUpdatePreview.processItems];
          next.processNotes = processItemsToText(next.processItems);

      const fillParsedResult = (result, mode = "规则解析模式", message = "", applyNow = true) => {

          ...result,
          project: result.project || inferProjectCategory(quickText, result.title) || extractRuleProject(quickText),
          executionItems: normalizeExecutionItems(result.executionItems || [], {}, true).map(item => executionItemWithAutomaticTiming(item))
        };
        setPreviousForm(form);
        setParsedResult(enrichedResult);
        setParseMode(mode);
        if (!applyNow) {
          setParseMessage(message || "已生成解析预览。确认后点击“应用解析结果”。");
          return;

        const next = { ...form };
        result = enrichedResult;
        const mapping = {
          source: "source", project: "project",
          receivedDate: "receivedDate", startDate: "startDate", dueDate: "deadline", priority: "priority"
        };

        Object.entries(mapping).forEach(([parsedKey, formKey]) => {
          if (!result[parsedKey]) return;

        if (result.reminder && result.reminder !== NO_REMINDER) {

      const addLocalAttachments = async (section = "task", index = -1) => {
