<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Work Tracker</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --bg: #f5f6f8;
      --surface: #ffffff;
      --surface-soft: #f8fafc;
      --border: #dfe3e8;
      --text: #1f2937;
      --muted: #667085;
      --primary: #4f46e5;
      --primary-dark: #4338ca;
      --danger: #c62828;
      --shadow: 0 12px 36px rgba(15, 23, 42, .14);
      --radius: 10px;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, "Segoe UI", system-ui, -apple-system, sans-serif;
      min-height: 100vh;

    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }

      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem 1.5rem;
      background: rgba(255, 255, 255, .96);
      border-bottom: 1px solid var(--border);

    .brand h1 { margin: 0; font-size: 1.25rem; }
    .brand p { margin: .2rem 0 0; color: var(--muted); font-size: .8rem; }

    .stats strong { color: var(--text); }

      border: 1px solid transparent;
      border-radius: 8px;
      padding: .55rem .9rem;
      font-weight: 650;
      font-size: .82rem;

      min-width: 285px;

    .quick-entry-intro { margin: 0 0 .7rem; color: var(--muted); font-size: .75rem; line-height: 1.45; }

    .attachment-message { margin: .65rem 0 0; color: #475467; font-size: .75rem; line-height: 1.4; }
    .attachment-link-box { margin-bottom: .8rem; padding: .8rem; border: 1px solid #d9dff0; border-radius: 8px; background: #fff; }
    .attachment-link-box textarea { min-height: 105px; margin-top: .45rem; }
    .attachments-table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 9px; background: #fff; }
    .attachments-table { width: 100%; min-width: 520px; border-collapse: collapse; }
    .attachments-table th { padding: .6rem .65rem; border-bottom: 1px solid var(--border); background: #f8fafc; color: #475467; font-size: .68rem; text-align: left; white-space: nowrap; }

    .section-toggle { width: 100%; display: flex; align-items: center; justify-content: space-between; gap: .75rem; border: 0; padding: .85rem 1rem; background: var(--surface-soft); color: var(--text); font-weight: 750; text-align: left; }

    .section-summary { overflow: hidden; max-width: 560px; color: var(--muted); font-size: .72rem; font-weight: 600; text-overflow: ellipsis; white-space: nowrap; }

<body>
  <div id="root"></div>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import {
      browserLocalPersistence,
      getAuth,
      GoogleAuthProvider,
      onAuthStateChanged,
      setPersistence,
      signInWithPopup,
      signOut
    } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    import {
      collection,
      deleteDoc,
      doc,
      getFirestore,
      onSnapshot,
      serverTimestamp,
      setDoc,
      writeBatch
    } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";
    const firebaseConfig = {
      apiKey: "AIzaSyCKGbvtSSJxp_0xLFc_gVXnnCDcFYPCYS8",
      authDomain: "daily-work-tracker-rayson.firebaseapp.com",
      projectId: "daily-work-tracker-rayson",
      storageBucket: "daily-work-tracker-rayson.firebasestorage.app",
      messagingSenderId: "270547399087",
      appId: "1:270547399087:web:9b2b9fd72bc9c71abe3f5a"
    };

    const configured = !Object.values(firebaseConfig).some(
      value => typeof value === "string" && value.includes("YOUR_")
    );

    try {
      if (!configured) {
        window.firebaseServices = { configured: false };
      } else {
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        await setPersistence(auth, browserLocalPersistence);
        const db = getFirestore(app);
        window.firebaseServices = {
          configured: true,
          auth,
          db,
          GoogleAuthProvider,
          onAuthStateChanged,
          signInWithPopup,
          signOut,
          collection,
          doc,
          setDoc,
          deleteDoc,
          onSnapshot,
          serverTimestamp,
          writeBatch
        };
      }
    } catch (error) {
      console.error("Firebase could not start", error);
      window.firebaseServices = { configured: false, error };
    }

    window.dispatchEvent(new CustomEvent("firebase-ready"));
  </script>
  <script type="text/babel">
    const { useEffect, useMemo, useRef, useState } = React;

    const STORAGE_KEY = "dailyWorkTrackerTasks";
    const LEGACY_KEY = "kanban";
    const CACHE_PREFIX = "dailyWorkTrackerCache:";
    const COLUMNS = [
      { id: "new", title: "收集箱", description: "刚收集，还没有完全整理", color: "#64748b" },
      { id: "todo", title: "待办事项", description: "已确认，还没开始", color: "#8b5cf6" },
      { id: "inprogress", title: "进行中", description: "已经开始处理", color: "#f59e0b" },
      { id: "feedback", title: "等待反馈", description: "等待他人回复或确认", color: "#0ea5e9" },
      { id: "done", title: "完毕", description: "任务已经完成", color: "#22c55e" },
      { id: "archived", title: "归档", description: "旧任务，保留记录", color: "#94a3b8" }
    ];
    const PRIORITIES = ["优先级1", "优先级2", "优先级3"];
    const ADD_PRIORITY_OPTION = "__add_priority__";

    const today = () => new Date().toISOString().slice(0, 10);
    const makeId = () => `task-${Date.now()}-${Math.random().toString(16).slice(2)}`;
    const makeAttachmentId = () => `file-${Date.now()}-${Math.random().toString(16).slice(2)}`;
    const makeRowId = prefix => `${prefix}-${Date.now()}-${Math.random().toString(16).slice(2)}`;
    const safeFileName = name => String(name || "file").replace(/[\\/#?%*:|"<>]/g, "-");
    const blankTask = status => ({
      id: makeId(),
      status: status || "new",
      title: "",
      source: "",
      receivedDate: today(),
      project: "",
      background: "",
      priority: "优先级3",
      deadline: "",
      nextAction: "",
      nextActions: [],
      processNotes: "",
      processItems: [],
      feedbackRecords: "",
      feedbackItems: [],
      finalResult: "",
      finalResults: [],
      links: "",
      attachments: [],
      order: 0,
      createdAt: null,
      updatedAt: null
    });

    function normalizeAttachment(attachment) {
      return {
        id: attachment.id || makeAttachmentId(),
        fileName: attachment.fileName || attachment.name || "Untitled file",
        fileUrl: attachment.fileUrl || attachment.url || "",
        uploadedAt: attachment.uploadedAt || attachment.addedAt || null
      };
    }

    function attachmentCount(task) {
      return Array.isArray(task.attachments) ? task.attachments.length : 0;
    }

    function formatFileSize(bytes) {
      if (!Number.isFinite(bytes) || bytes <= 0) return "—";
      const units = ["B", "KB", "MB", "GB"];
      let size = bytes;
      let unitIndex = 0;
      while (size >= 1024 && unitIndex < units.length - 1) {
        size /= 1024;
        unitIndex += 1;
      }
      return `${size >= 10 || unitIndex === 0 ? Math.round(size) : size.toFixed(1)} ${units[unitIndex]}`;
    }

    function defaultAttachmentName(url) {
      if (/kdocs\.cn|wps\.cn/i.test(url)) return "WPS附件";
      if (/feishu\.cn|larksuite\.com/i.test(url)) return "飞书附件";
      return "云端附件";
    }

    function cleanAttachmentFileName(name) {
      return String(name || "")
        .replace(/【(?:金山文档|WPS|飞书|飞书文档|云文档)】/g, "")
        .trim();
    }

    function parseAttachmentLinks(text) {
      const lines = String(text || "").split(/\r?\n/);
      let lastTextLine = "";
      const attachments = [];

      lines.forEach(line => {
        const urls = line.match(/https?:\/\/[^\s，,。；;]+/g) || [];
        const lineWithoutUrls = urls.reduce((value, url) => value.replace(url, ""), line);
        const nearbyText = cleanAttachmentFileName(lineWithoutUrls.replace(/^[：:\-\s]+|[：:\-\s]+$/g, ""));

        if (urls.length) {
          urls.forEach(url => {
            const previousText = cleanAttachmentFileName(lastTextLine);
            attachments.push({
              id: makeAttachmentId(),
              fileName: nearbyText || previousText || defaultAttachmentName(url),
              fileUrl: url,
              uploadedAt: new Date().toISOString()
            });
          });
        } else {
          const cleanLine = cleanAttachmentFileName(line);
          if (cleanLine) lastTextLine = cleanLine;
        }
      });

      return attachments;
    }

    function removeAttachmentLines(text) {
      return String(text || "")
        .split(/\r?\n/)
        .filter(line => !/https?:\/\//.test(line) && !/^【(?:金山文档|WPS|飞书|飞书文档|云文档)】/.test(line.trim()))
        .join("\n")
        .trim();
    }

    function todayTimeText() {
      return new Date().toLocaleString([], { year: "numeric", month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
    }

    function extractDueText(text) {
      const match = String(text || "").match(/今天|明天|后天|本周|下周|周[一二三四五六日天]|星期[一二三四五六日天]|\d{1,2}月\d{1,2}日?|20\d{2}[-\/]\d{1,2}[-\/]\d{1,2}/);
      return match?.[0] || "";
    }

    function removeDuePrefix(text, dueText) {
      return String(text || "").replace(dueText || "", "").replace(/^(?:要|先|再|然后|接着|继续|完成|把|将)+/, "").trim();
    }

    function normalizeNextActions(items, legacyText = "", keepEmpty = false) {
      if (Array.isArray(items) && items.length) {
        const prepared = items
          .map(item => ({
            id: typeof item === "object" && item?.id ? item.id : makeRowId("next"),
            text: typeof item === "string" ? item : (item?.text || ""),
            dueText: typeof item === "object" ? (item?.dueText || "") : "",
            status: ["未开始", "进行中", "已完成"].includes(item?.status) ? item.status : "未开始"
          }));
        return (keepEmpty ? prepared : prepared.filter(item => item.text.trim())).map(item => ({ ...item, text: item.text.trim(), dueText: item.dueText.trim() }));
      }
      return legacyText?.trim() ? [{ id: makeRowId("next"), text: legacyText.trim(), dueText: "", status: "未开始" }] : [];
    }

    function normalizeFeedbackItems(items, legacyText = "", keepEmpty = false) {
      if (Array.isArray(items) && items.length) {
        const prepared = items
          .map(item => ({
            id: typeof item === "object" && item?.id ? item.id : makeRowId("feedback"),
            text: typeof item === "string" ? item : (item?.text || ""),
            createdAt: typeof item === "object" ? (item?.createdAt || "") : "",
            attachments: typeof item === "object" && Array.isArray(item?.attachments) ? item.attachments.map(normalizeAttachment) : [],
            status: ["新反馈", "处理中", "已解决"].includes(item?.status) ? item.status : "新反馈"
          }));
        return (keepEmpty ? prepared : prepared.filter(item => item.text.trim() || item.attachments.length)).map(item => ({ ...item, text: item.text.trim(), createdAt: item.createdAt.trim() }));
      }
      return legacyText?.trim() ? [{ id: makeRowId("feedback"), text: legacyText.trim(), createdAt: "", attachments: [], status: "新反馈" }] : [];
    }

    function normalizeProcessItems(items, legacyText = "", keepEmpty = false) {
      if (Array.isArray(items) && items.length) {
        const prepared = items.map(item => ({
          id: typeof item === "object" && item?.id ? item.id : makeRowId("process"),
          text: typeof item === "string" ? item : (item?.text || ""),
          createdAt: typeof item === "object" ? (item?.createdAt || "") : "",
          attachments: typeof item === "object" && Array.isArray(item?.attachments) ? item.attachments.map(normalizeAttachment) : []
        }));
        return (keepEmpty ? prepared : prepared.filter(item => item.text.trim() || item.attachments.length)).map(item => ({ ...item, text: item.text.trim(), createdAt: item.createdAt.trim() }));
      }
      return legacyText?.trim() ? [{ id: makeRowId("process"), text: legacyText.trim(), createdAt: "", attachments: [] }] : [];
    }

    function normalizeFinalResults(items, legacyText = "", keepEmpty = false) {
      if (Array.isArray(items) && items.length) {
        const prepared = items.map(item => ({
          id: typeof item === "object" && item?.id ? item.id : makeRowId("final"),
          text: typeof item === "string" ? item : (item?.text || ""),
          createdAt: typeof item === "object" ? (item?.createdAt || "") : "",
          attachments: typeof item === "object" && Array.isArray(item?.attachments) ? item.attachments.map(normalizeAttachment) : []
        }));
        return (keepEmpty ? prepared : prepared.filter(item => item.text.trim() || item.attachments.length)).map(item => ({ ...item, text: item.text.trim(), createdAt: item.createdAt.trim() }));
      }
      return legacyText?.trim() ? [{ id: makeRowId("final"), text: legacyText.trim(), createdAt: "", attachments: [] }] : [];
    }

    function nextActionsToText(items) {
      return normalizeNextActions(items).map(item => item.text).join("\n");
    }

    function feedbackItemsToText(items) {
      return normalizeFeedbackItems(items).map(item => item.text).join("\n");
    }

    function processItemsToText(items) {
      return normalizeProcessItems(items).map(item => item.text).join("\n");
    }

    function finalResultsToText(items) {
      return normalizeFinalResults(items).map(item => item.text).join("\n");
    }

    function splitStructuredItems(text) {
      return String(text || "")
        .replace(/(?:下一步|接下来)(?:第一|第1|一、|1[.、])?/g, "")
        .split(/(?:\n|；|;|，|,|。|第一|第二|第三|第四|第五|第六|第七|第八|第九|第十|1[.、]|2[.、]|3[.、]|4[.、]|5[.、]|6[.、]|7[.、]|8[.、]|9[.、]|并且|然后|再)/)
        .map(item => item.trim().replace(/^(?:是|要|先|再|和|及|、)+/, ""))
        .filter(Boolean);
    }

    function normalizeTask(task) {
      const oldStatus = task.status || task.col || "new";
      const status = oldStatus === "review" ? "feedback" : oldStatus;
      return {
        ...blankTask(status),
        ...task,
        id: task.id || makeId(),
        status,
        title: task.title || task.text || "Untitled task",
        project: task.project || task.tag || "",
        background: task.background || "",
        source: task.source || "",
        receivedDate: task.receivedDate || "",
        priority: normalizePriority(task.priority) || "优先级3",
        deadline: task.deadline || "",
        nextAction: task.nextAction || "",
        nextActions: normalizeNextActions(task.nextActions, task.nextAction),
        processNotes: task.processNotes || "",
        processItems: normalizeProcessItems(task.processItems, task.processNotes),
        feedbackRecords: task.feedbackRecords || "",
        feedbackItems: normalizeFeedbackItems(task.feedbackItems, task.feedbackRecords),
        finalResult: task.finalResult || "",
        finalResults: normalizeFinalResults(task.finalResults, task.finalResult),
        links: task.links || "",
        attachments: Array.isArray(task.attachments) ? task.attachments.map(normalizeAttachment) : [],
        order: Number.isFinite(task.order) ? task.order : 0,
        createdAt: task.createdAt || null,
        updatedAt: task.updatedAt || null
      };
    }

    function loadLocalTasks() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) return JSON.parse(saved).map(normalizeTask);
        const legacy = localStorage.getItem(LEGACY_KEY);
        if (legacy) return JSON.parse(legacy).map(normalizeTask);
      } catch (error) {
        console.warn("Could not load saved tasks", error);
      }
      return [];
    }

    function loadCache(uid) {
      try {
        const saved = localStorage.getItem(`${CACHE_PREFIX}${uid}`);
        return saved ? JSON.parse(saved).map(normalizeTask) : [];
      } catch {
        return [];
      }
    }

    function saveCache(uid, tasks) {
      try {
        localStorage.setItem(`${CACHE_PREFIX}${uid}`, JSON.stringify(tasks));
      } catch (error) {
        console.warn("Could not update the local task cache", error);
      }
    }

    function taskForFirestore(task, timestamp, isNewRecord = false) {
      const data = {
        title: task.title || "",
        source: task.source || "",
        receivedDate: task.receivedDate || "",
        project: task.project || "",
        background: task.background || "",
        priority: normalizePriority(task.priority) || "优先级3",
        deadline: task.deadline || "",
        nextAction: task.nextAction || "",
        nextActions: normalizeNextActions(task.nextActions, task.nextAction),
        processNotes: task.processNotes || "",
        processItems: normalizeProcessItems(task.processItems, task.processNotes),
        feedbackRecords: task.feedbackRecords || "",
        feedbackItems: normalizeFeedbackItems(task.feedbackItems, task.feedbackRecords),
        finalResult: task.finalResult || "",
        finalResults: normalizeFinalResults(task.finalResults, task.finalResult),
        links: task.links || "",
        attachments: Array.isArray(task.attachments) ? task.attachments.map(normalizeAttachment) : [],
        status: task.status || "new",
        order: Number.isFinite(task.order) ? task.order : 0,
        updatedAt: timestamp
      };
      if (task.createdAt) data.createdAt = task.createdAt;
      else if (isNewRecord) data.createdAt = timestamp;
      return data;
    }

    function toDate(value) {
      if (!value) return null;
      if (typeof value.toDate === "function") return value.toDate();
      if (typeof value === "object" && Number.isFinite(value.seconds)) return new Date(value.seconds * 1000);
      if (typeof value === "string" && /^\d{4}-\d{2}-\d{2}$/.test(value)) {
        const [year, month, day] = value.split("-").map(Number);
        return new Date(year, month - 1, day);
      }
      const parsed = new Date(value);
      return Number.isNaN(parsed.getTime()) ? null : parsed;
    }

    function createdDate(task) {
      return toDate(task.createdAt) || toDate(task.receivedDate);
    }

    function formatDate(value, includeTime = false) {
      const date = toDate(value);
      if (!date) return "—";
      return includeTime
        ? date.toLocaleString([], { year: "numeric", month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" })
        : date.toLocaleDateString([], { year: "numeric", month: "short", day: "numeric" });
    }

    function dateKey(value) {
      const date = toDate(value);
      if (!date) return "";
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function statusTitle(status) {
      return COLUMNS.find(column => column.id === status)?.title || status;
    }

    function statusFromVoiceCommand(command) {
      const text = String(command || "").toLowerCase().replace(/\s+/g, " ").trim();
      if (!text) return "";
      if (/收集箱|新的|inbox|\bnew\b/.test(text)) return "new";
      if (/待办事项|待办|未开始|to do|todo/.test(text)) return "todo";
      if (/进行中|开始处理|正在处理|in progress/.test(text)) return "inprogress";
      if (/等待反馈|等反馈|waiting for feedback/.test(text)) return "feedback";
      if (/完毕|已完成|已经完成|标记完成|mark as done|\bdone\b/.test(text)) return "done";
      if (/归档|archived|archive/.test(text)) return "archived";
      return "";
    }

    function clearlyMeansDone(text) {
      return /已完成|已经完成|做完了|任务完成|completed|mark as done|\bdone\b/i.test(String(text || ""));
    }

    const AI_SETTINGS_KEY = "dailyWorkTrackerAISettings";
    const PARSED_FIELDS = [
      ["title", "Title"], ["source", "Source"], ["project", "Project"],
      ["background", "Background"], ["receivedDate", "Received date"],
      ["dueDate", "Due date"], ["priority", "优先级"], ["status", "Status"],
      ["nextAction", "Next action"], ["workflowNotes", "Workflow notes"],
      ["feedback", "Feedback"], ["finalResult", "Final result"]
    ];

    const emptyParsedResult = () => Object.fromEntries(PARSED_FIELDS.map(([key]) => [key, ""]));

    function loadAISettings() {
      const defaults = { provider: "OpenAI-compatible", endpoint: "", apiKey: "", model: "" };
      try {
        return { ...defaults, ...JSON.parse(localStorage.getItem(AI_SETTINGS_KEY) || "{}") };
      } catch {
        return defaults;
      }
    }

    function normalizePriority(value) {
      const original = String(value || "").trim();
      const text = original.toLowerCase();
      if (/^\d+$/.test(original)) return `优先级${Number(original)}`;
      const explicit = original.match(/^优先级\s*(\d+)$/);
      if (explicit) return `优先级${Number(explicit[1])}`;
      if (["high", "高", "高的", "urgent", "紧急", "最高", "高优先级", "重要"].includes(text)) return "优先级1";
      if (["medium", "中", "中等", "中等的", "normal", "一般"].includes(text)) return "优先级2";
      if (["low", "低", "低的", "普通", "不急", "低优先级"].includes(text)) return "优先级3";
      return original;
    }

    function priorityRank(priority) {
      const normalized = normalizePriority(priority);
      const match = normalized.match(/^优先级(\d+)$/);
      return match ? Number(match[1]) : 1000;
    }

    function comparePriority(a, b) {
      return priorityRank(a) - priorityRank(b) || String(a || "").localeCompare(String(b || ""));
    }

    function priorityClass(priority) {
      const normalized = normalizePriority(priority);
      if (normalized === "优先级1") return "priority-p1";
      if (normalized === "优先级2") return "priority-p2";
      if (normalized === "优先级3") return "priority-p3";
      return "priority-custom";
    }

    function uniquePriorityOptions(values = []) {
      return [...new Set([...PRIORITIES, ...values.map(normalizePriority).filter(Boolean)])].sort(comparePriority);
    }

    function normalizeStatus(value) {
      const text = String(value || "").trim().toLowerCase();
      const map = {
        "new": "new", "new task": "new", "新任务": "new", "新的": "new",
        "to do": "todo", "todo": "todo", "待办": "todo", "还没开始": "todo", "未开始": "todo",
        "in progress": "inprogress", "inprogress": "inprogress", "进行中": "inprogress", "正在处理": "inprogress", "处理中": "inprogress",
        "waiting for feedback": "feedback", "feedback": "feedback", "等反馈": "feedback", "等待反馈": "feedback", "待反馈": "feedback",
        "done": "done", "completed": "done", "mark as done": "done", "完毕": "done", "已完成": "done", "已经完成": "done", "做完了": "done", "任务完成": "done",
        "archived": "archived", "归档": "archived", "已归档": "archived"
      };
      return map[text] || "";
    }

    function normalizeParsedResult(raw) {
      const result = emptyParsedResult();
      PARSED_FIELDS.forEach(([key]) => {
        const value = raw?.[key];
        result[key] = typeof value === "string" ? value.trim() : "";
      });
      result.priority = normalizePriority(result.priority);
      result.status = normalizeStatus(result.status);
      if (result.receivedDate && !/^\d{4}-\d{2}-\d{2}$/.test(result.receivedDate)) result.receivedDate = "";
      if (result.dueDate && !/^\d{4}-\d{2}-\d{2}$/.test(result.dueDate)) result.dueDate = "";
      return result;
    }

    function addDays(date, days) {
      const result = new Date(date);
      result.setDate(result.getDate() + days);
      return dateKey(result);
    }

    function parseDateExpression(text) {
      const now = new Date();
      let match = text.match(/(20\d{2})[-\/]([01]?\d)[-\/]([0-3]?\d)/);
      if (match) return `${match[1]}-${String(Number(match[2])).padStart(2, "0")}-${String(Number(match[3])).padStart(2, "0")}`;
      match = text.match(/([01]?\d)月([0-3]?\d)日?/);
      if (match) return `${now.getFullYear()}-${String(Number(match[1])).padStart(2, "0")}-${String(Number(match[2])).padStart(2, "0")}`;
      match = text.match(/(?:这个|本|下)?(?:星期|周)([一二三四五六日天])/);
      if (match) {
        const weekdayMap = { "日": 0, "天": 0, "一": 1, "二": 2, "三": 3, "四": 4, "五": 5, "六": 6 };
        const target = weekdayMap[match[1]];
        let days = target - now.getDay();
        if (days < 0 || /下(?:星期|周)/.test(match[0])) days += 7;
        return addDays(now, days);
      }
      match = text.match(/day after tomorrow|后天|tomorrow|明天|today|今天/i);
      if (/day after tomorrow|后天/i.test(match?.[0] || "")) return addDays(now, 2);
      if (/tomorrow|明天/i.test(match?.[0] || "")) return addDays(now, 1);
      if (/today|今天/i.test(match?.[0] || "")) return dateKey(now);
      return "";
    }

    function firstMatch(text, patterns) {
      for (const pattern of patterns) {
        const match = text.match(pattern);
        if (match?.[1]?.trim()) return match[1].trim().replace(/[，。；;,.]+$/, "");
      }
      return "";
    }

    function extractRuleSource(text) {
      const sourceRules = [
        [/(?:^|[，,。；;\s])老板\s*让我/, "老板"],
        [/(?:^|[，,。；;\s])领导\s*让我/, "领导"],
        [/(?:^|[，,。；;\s])客户\s*(?:让我|要求)/, "客户"],
        [/(?:^|[，,。；;\s])海尔\s*(?:让我|要求)/, "海尔"],
        [/(?:^|[，,。；;\s])供应商\s*反馈/, "供应商"],
        [/(?:^|[，,。；;\s])物流\s*反馈/, "物流"]
      ];
      return sourceRules.find(([pattern]) => pattern.test(text))?.[1] || "";
    }

    function extractRuleProject(text) {
      const match = text.match(
        /(?:项目\s*(?:是|为|[:：])|类别\s*(?:是|为|[:：])|属于)\s*(.+?)(?=[，,。；;\n]|优先级|目前|当前|状态|进行中|待办|等待反馈|等反馈|待反馈|下一步|接下来|截止|最后期限|今天|明天|后天|反馈|结果|结论|$)/i
      );
      return match?.[1]?.trim().replace(/[，,。；;]+$/, "") || "";
    }

    function extractRuleTitle(text) {
      const actionPattern = /跟进|确认|整理|修改|检查|核对|输出|提交|做|准备|处理|对接|反馈|翻译|优化/;
      let working = text
        .replace(/^.*?(?:老板|领导)\s*让我\s*/, "")
        .replace(/^.*?(?:客户|海尔)\s*(?:让我|要求)\s*/, "")
        .replace(/^.*?(?:供应商|物流)\s*反馈(?:是|说|为)?\s*/, "")
        .replace(/^.*?\b(?:asked|told) me to\b\s*/i, "");

      const clauses = working.split(/[，,。；;\n]/).map(item => item.trim()).filter(Boolean);
      const candidates = [];
      clauses.forEach(clause => {
        if (/^(?:项目\s*(?:是|为|[:：])|类别\s*(?:是|为|[:：])|属于|优先级|目前|当前|状态|下一步|接下来|截止|最后期限|反馈|结果|结论)/.test(clause)) return;
        let cleaned = clause
          .split(/(?=项目\s*(?:是|为|[:：])|类别\s*(?:是|为|[:：])|优先级|目前|当前|状态|下一步|接下来|截止|最后期限|反馈|结果|结论)/)[0]
          .replace(/需要在\s*(?:今天|明天|后天|本周|下周)?(?:上午|下午|晚上)?(?:前完成)?/g, "")
          .replace(/截止到\s*(?:今天|明天|后天|本周|下周)?(?:上午|下午|晚上)?/g, "")
          .replace(/(?:今天|明天|后天|本周|下周|上午|下午|晚上)/g, "")
          .replace(/最后期限/g, "")
          .trim();
        const action = cleaned.match(actionPattern);
        if (!action) return;
        const title = cleaned.slice(action.index).replace(/前完成$/, "").trim();
        if (title) candidates.push(title);
      });

      return candidates.find(title => title !== "提交") || candidates[0] || "";
    }

    function extractRuleDueDate(text) {
      const explicit = text.match(
        /(?:截止(?:到|日期)?|最后期限(?:是|为)?|需要在)[：:\s]*(day after tomorrow|后天|tomorrow|明天|today|今天|20\d{2}[-\/]\d{1,2}[-\/]\d{1,2}|\d{1,2}月\d{1,2}日?)/i
      );
      if (explicit) return parseDateExpression(explicit[1]);
      const delivery = text.match(/(day after tomorrow|后天|tomorrow|明天|today|今天)(?:前)?\s*(?:提交|完成|交付)/i);
      if (delivery) return parseDateExpression(delivery[1]);
      return parseDateExpression(text);
    }

    function ruleParse(text) {
      const result = emptyParsedResult();
      const compact = text.trim();

      const explicitPriority = compact.match(/(?:优先级|priority)\s*(?:是|为|[:：])?\s*(\d+|高|中|低|high|medium|normal|low|urgent|紧急|最高|高优先级|重要|中等|普通|一般|不急|低优先级)/i);
      if (explicitPriority) result.priority = normalizePriority(explicitPriority[1]);
      else if (/(?:最高|紧急|高优先级|重要|urgent|\bhigh\b)/i.test(compact)) result.priority = "优先级1";
      else if (/(?:中等|一般|\bnormal\b|\bmedium\b)/i.test(compact)) result.priority = "优先级2";
      else if (/(?:普通|不急|低优先级|\blow\b)/i.test(compact)) result.priority = "优先级3";

      const statusChecks = [
        [/(等待反馈|等反馈|待反馈|waiting for feedback)/i, "feedback"],
        [/(进行中|正在处理|处理中|in progress)/i, "inprogress"],
        [/(待办|还没开始|未开始|to do|todo)/i, "todo"],
        [/(新任务|新的|new task)/i, "new"],
        [/(已完成|已经完成|做完了|任务完成|completed|mark as done|\bdone\b)/i, "done"],
        [/(已归档|归档|archived)/i, "archived"]
      ];
      result.status = statusChecks.find(([pattern]) => pattern.test(compact))?.[1] || "";

      result.dueDate = extractRuleDueDate(compact);

      const nextBlock = compact.match(/(?:下一步(?:是|为)?|接下来(?:要|是)?)[：:\s]*(.+?)(?=反馈|结果|结论|$)/i);
      result.nextAction = nextBlock?.[1]?.trim().replace(/[，。；;,.]+$/, "") || firstMatch(compact, [
        /next step(?: is|:)?\s*([^,.;\n]+)/i
      ]);
      if (!result.nextAction && /交接|sop|SOP|提交/.test(compact)) {
        const actions = [];
        if (/完成.*?交接/.test(compact)) actions.push("完成现有工作的交接");
        if (/整理.*?SOP/i.test(compact)) actions.push("整理工作SOP");
        const submitMatch = compact.match(/提交给([^，,。；;\n]+)/);
        if (submitMatch) actions.push(`提交给${submitMatch[1].trim()}`);
        if (actions.length) result.nextAction = actions.join("\n");
      }
      result.feedback = firstMatch(compact, [
        /(?:客户|供应商)?反馈(?:是|说|为)?[：:\s]*([^，。；;\n]+)/i,
        /(?:customer|supplier) feedback(?: is| says|:)?\s*([^,.;\n]+)/i
      ]);
      const feedbackClauses = compact.split(/[，,。；;\n]/).map(item => item.trim()).filter(item => /反馈/.test(item));
      if (feedbackClauses.length > 1) result.feedback = feedbackClauses.join("\n");
      result.finalResult = firstMatch(compact, [
        /(?:最终结果|结论)(?:是|为)?[：:\s]*([^，。；;\n]+)/i,
        /result(?: is|:)?\s*([^,.;\n]+)/i
      ]);
      result.source = extractRuleSource(compact) || firstMatch(compact, [
        /接收到([^，。；;\n]{1,20}?)(?:的)?任务/,
        /([^，。；;\n]{1,30}?)(?:让我|叫我|要求我|安排我)/,
        /(?:assigned by|from)\s+([^,.;\n]+)/i,
        /([^,.;\n]{1,30}?)\s+(?:asked|told) me to/i
      ]);
      result.background = firstMatch(compact, [
        /(?:背景|原因)(?:是|为)?[：:\s]*([^，。；;\n]+)/i,
        /(?:background|because)(?: is|:)?\s*([^,.;\n]+)/i
      ]);
      result.receivedDate = /(?:今天收到|今天接到|received today)/i.test(compact) ? dateKey(new Date()) : "";

      result.title = /交接/i.test(compact) && /SOP/i.test(compact) && !/^.*反馈/.test(compact) ? "整理工作交接SOP" : extractRuleTitle(compact);
      result.project = extractRuleProject(compact) || firstMatch(compact, [
        /(?:project|category)(?: is|:)?\s*([^,.;\n]+)/i
      ]);

      const workflowSentences = compact.split(/[。;；\n]/).filter(sentence => /(?:进展(?:是|为|：|:)|处理记录|已做|沟通记录|workflow notes?|progress notes?)/i.test(sentence));
      result.workflowNotes = workflowSentences.join("；");
      return normalizeParsedResult(result);
    }

    function compactSummary(text, fallback = "空") {
      const cleaned = String(text || "").replace(/\s+/g, " ").trim();
      return cleaned ? (cleaned.length > 52 ? `${cleaned.slice(0, 52)}…` : cleaned) : fallback;
    }

    function appendLongText(existing, addition) {
      const oldText = String(existing || "").trim();
      const newText = String(addition || "").trim();
      if (!newText) return oldText;
      return oldText ? `${oldText}\n${newText}` : newText;
    }

    function parseSmartUpdate(text) {
      const compact = String(text || "").trim();
      const attachments = parseAttachmentLinks(compact);
      const contentText = removeAttachmentLines(compact);
      const result = { feedbackItems: [], nextActions: [], processItems: [], finalResults: [], attachments };
      if (!compact) return result;

      const hasFeedback = /反馈|老板反馈|客户反馈|供应商反馈|领导反馈/.test(contentText);
      const hasExplicitNextAction = /下一步|接下来/.test(contentText);
      const hasProcess = /今天|已经|处理了|整理了|进展|发现|沟通了/.test(contentText);
      const hasFinal = /最终|结果|已提交|已经提交|已完成交付|完成交付/.test(contentText);
      const timeText = todayTimeText();

      const addFeedback = (textValue, rowAttachments = []) => {
        if (textValue.trim() || rowAttachments.length) {
          result.feedbackItems.push({ id: makeRowId("feedback"), text: textValue.trim(), createdAt: timeText, attachments: rowAttachments, status: "新反馈" });
        }
      };
      const addNextAction = (textValue, dueText = "") => {
        if (textValue.trim()) {
          result.nextActions.push({ id: makeRowId("next"), text: textValue.trim(), dueText: dueText.trim(), status: "未开始" });
        }
      };
      const addProcess = (textValue, rowAttachments = []) => {
        if (textValue.trim() || rowAttachments.length) {
          result.processItems.push({ id: makeRowId("process"), text: textValue.trim(), createdAt: timeText, attachments: rowAttachments });
        }
      };
      const addFinal = (textValue, rowAttachments = []) => {
        if (textValue.trim() || rowAttachments.length) {
          result.finalResults.push({ id: makeRowId("final"), text: textValue.trim(), createdAt: timeText, attachments: rowAttachments });
        }
      };

      if (hasFeedback) addFeedback(contentText, attachments);
      if (hasFinal) addFinal(contentText, attachments);

      if (hasExplicitNextAction) {
        let nextText = contentText
          .replace(/^(?:下一步|接下来)(?:是|要|先)?/, "")
          .replace(/^先/, "")
          .trim();
        const items = splitStructuredItems(nextText).filter(item => !/^(?:下一步|接下来)$/.test(item));
        (items.length ? items : [nextText]).forEach(item => {
          const dueText = extractDueText(item);
          addNextAction(removeDuePrefix(item, dueText), dueText);
        });
      } else {
        const futureMatch = contentText.match(/(明天|后天|本周|下周|周[一二三四五六日天]|星期[一二三四五六日天])([^，。；;\n]+)/);
        if (futureMatch && (hasFeedback || hasProcess)) {
          addNextAction(removeDuePrefix(futureMatch[2], futureMatch[1]), futureMatch[1]);
        }
      }

      if (!hasFeedback && !hasFinal) {
        if (hasProcess) {
          const processText = contentText.replace(/(?:，|,)?(?:明天|后天|本周|下周|周[一二三四五六日天]|星期[一二三四五六日天])[^，。；;\n]+/, "").trim();
          addProcess(processText || contentText, attachments);
        } else if (!result.nextActions.length && contentText) {
          addProcess(contentText, attachments);
        }
      }

      if (!contentText && attachments.length) {
        if (/反馈/.test(compact)) addFeedback("", attachments);
        else if (/最终|结果|提交|交付/.test(compact)) addFinal("", attachments);
        else addProcess("", attachments);
      }

      return result;
    }

    // Rule Parse regression examples:
    // 老板让我明天跟进俄罗斯水槽说明书修改，项目是俄罗斯水槽，优先级高，目前进行中，下一步整理俄文问题清单
    // 客户要求后天确认俄罗斯标签内容，项目是包装标签，优先级高，当前待办
    // 海尔要求今天核对水槽说明书俄文，项目是俄罗斯水槽说明书，目前进行中，下一步输出问题清单

    function AISettingsModal({ settings, onSave, onClose }) {
      const [form, setForm] = useState(settings);
      const change = event => setForm({ ...form, [event.target.name]: event.target.value });
      const save = event => {
        event.preventDefault();
        const next = { provider: form.provider.trim() || "OpenAI-compatible", endpoint: form.endpoint.trim(), apiKey: form.apiKey.trim(), model: form.model.trim() };
        localStorage.setItem(AI_SETTINGS_KEY, JSON.stringify(next));
        onSave(next);
        onClose();
      };

      return (
        <div className="modal-backdrop" onMouseDown={event => event.target === event.currentTarget && onClose()}>
          <form className="modal settings-modal" onSubmit={save}>
            <div className="modal-header">
              <div><h2>AI settings</h2><p>Configure the service used by Smart Quick Entry.</p></div>
              <button type="button" className="close-button" aria-label="Close" onClick={onClose}>×</button>
            </div>
            <div className="form-body">
              <p className="settings-warning">Do not use a shared or public API key. The key is stored only in this browser.</p>
              <div className="form-grid">
                <div className="field full"><label htmlFor="aiProvider">AI Provider</label><input id="aiProvider" name="provider" value={form.provider} onChange={change} placeholder="OpenAI-compatible" /></div>
                <div className="field full"><label htmlFor="aiEndpoint">API endpoint</label><input id="aiEndpoint" name="endpoint" value={form.endpoint} onChange={change} placeholder="https://api.example.com/v1/chat/completions" /></div>
                <div className="field full"><label htmlFor="aiKey">API key</label><input id="aiKey" type="password" name="apiKey" value={form.apiKey} onChange={change} autoComplete="off" /></div>
                <div className="field full"><label htmlFor="aiModel">Model name</label><input id="aiModel" name="model" value={form.model} onChange={change} placeholder="Your provider's model name" /></div>
              </div>
            </div>
            <div className="modal-actions"><div></div><div className="settings-actions"><button type="button" className="btn btn-secondary" onClick={onClose}>Cancel</button><button className="btn btn-primary">Save settings</button></div></div>
          </form>
        </div>
      );
    }

    function TaskModal({ task, isNew, onSave, onDelete, onClose, onSaveAttachmentRecord, aiSettings, onOpenAISettings, quickEntryStart, availablePriorityOptions }) {
      const [form, setForm] = useState(task);
      const [quickText, setQuickText] = useState("");
      const [parsedResult, setParsedResult] = useState(null);
      const [previousForm, setPreviousForm] = useState(null);
      const [parseMessage, setParseMessage] = useState("");
      const [parsing, setParsing] = useState(false);
      const [listening, setListening] = useState(false);
      const [attachmentMessage, setAttachmentMessage] = useState("");
      const [showAttachmentInput, setShowAttachmentInput] = useState(false);
      const [attachmentText, setAttachmentText] = useState("");
      const [pendingAttachments, setPendingAttachments] = useState([]);
      const [statusMessage, setStatusMessage] = useState("");
      const [statusListening, setStatusListening] = useState(false);
      const [smartUpdateText, setSmartUpdateText] = useState("");
      const [smartUpdatePreview, setSmartUpdatePreview] = useState(null);
      const [smartUpdateMessage, setSmartUpdateMessage] = useState("");
      const [smartUpdateListening, setSmartUpdateListening] = useState(false);
      const [priorityOptions, setPriorityOptions] = useState(() => uniquePriorityOptions([...(availablePriorityOptions || []), task.priority]));
      const [openSections, setOpenSections] = useState({ background: false, attachments: false, next: false, feedback: false, process: false, final: false, legacy: false });
      const quickEntryRef = useRef(null);
      useEffect(() => {
        const closeOnEscape = event => event.key === "Escape" && onClose();
        window.addEventListener("keydown", closeOnEscape);
        return () => window.removeEventListener("keydown", closeOnEscape);
      }, [onClose]);

      useEffect(() => {
        if (quickEntryStart) setTimeout(() => quickEntryRef.current?.focus(), 0);
      }, [quickEntryStart]);

      const change = event => setForm({ ...form, [event.target.name]: event.target.value });
      const changePriority = event => {
        const value = event.target.value;
        if (value === ADD_PRIORITY_OPTION) {
          const customPriority = window.prompt("请输入新的优先级名称，例如：优先级4、老板优先");
          const normalized = normalizePriority(customPriority);
          if (!normalized) return;
          setPriorityOptions(current => uniquePriorityOptions([...current, normalized]));
          setForm(current => ({ ...current, priority: normalized }));
          return;
        }
        setForm(current => ({ ...current, priority: normalizePriority(value) || "优先级3" }));
      };
      const backgroundSummary = compactSummary(form.background);
      const nextActionItems = normalizeNextActions(form.nextActions, "", true);
      const feedbackRecordsItems = normalizeFeedbackItems(form.feedbackItems, "", true);
      const processRecordItems = normalizeProcessItems(form.processItems, "", true);
      const finalResultItems = normalizeFinalResults(form.finalResults, "", true);
      const processSummary = compactSummary(processRecordItems[0]?.text);
      const finalSummary = compactSummary(finalResultItems[0]?.text);
      const submit = event => {
        event.preventDefault();
        if (!form.title.trim()) return;
        const prepared = {
          ...form,
          title: form.title.trim(),
          priority: normalizePriority(form.priority) || "优先级3",
          nextActions: normalizeNextActions(form.nextActions),
          feedbackItems: normalizeFeedbackItems(form.feedbackItems),
          processItems: normalizeProcessItems(form.processItems),
          finalResults: normalizeFinalResults(form.finalResults)
        };
        prepared.nextAction = nextActionsToText(prepared.nextActions);
        prepared.feedbackRecords = feedbackItemsToText(prepared.feedbackItems);
        prepared.processNotes = processItemsToText(prepared.processItems);
        prepared.finalResult = finalResultsToText(prepared.finalResults);
        onSave(prepared);
      };

      const toggleSection = section => setOpenSections(current => ({ ...current, [section]: !current[section] }));

      const parseSmartUpdateText = (text = smartUpdateText) => {
        if (!String(text || "").trim()) {
          setSmartUpdateMessage("请先输入或语音补充一段更新内容。");
          return;
        }
        const preview = parseSmartUpdate(text);
        setSmartUpdatePreview(preview);
        setSmartUpdateMessage("已生成补充预览，确认后点击“应用补充内容”。");
      };

      const applySmartUpdate = () => {
        if (!smartUpdatePreview) return;
        const next = { ...form };
        if (smartUpdatePreview.nextActions.length) {
          next.nextActions = [
            ...normalizeNextActions(next.nextActions),
            ...smartUpdatePreview.nextActions
          ];
          next.nextAction = nextActionsToText(next.nextActions);
        }
        if (smartUpdatePreview.feedbackItems.length) {
          next.feedbackItems = [
            ...normalizeFeedbackItems(next.feedbackItems),
            ...smartUpdatePreview.feedbackItems
          ];
          next.feedbackRecords = feedbackItemsToText(next.feedbackItems);
        }
        if (smartUpdatePreview.processItems.length) {
          next.processItems = [...normalizeProcessItems(next.processItems), ...smartUpdatePreview.processItems];
          next.processNotes = processItemsToText(next.processItems);
        }
        if (smartUpdatePreview.finalResults.length) {
          next.finalResults = [...normalizeFinalResults(next.finalResults), ...smartUpdatePreview.finalResults];
          next.finalResult = finalResultsToText(next.finalResults);
        }
        setForm(next);
        setOpenSections(current => ({
          ...current,
          next: current.next || smartUpdatePreview.nextActions.length > 0,
          feedback: current.feedback || smartUpdatePreview.feedbackItems.length > 0,
          process: current.process || smartUpdatePreview.processItems.length > 0,
          final: current.final || smartUpdatePreview.finalResults.length > 0
        }));
        setSmartUpdateText("");
        setSmartUpdatePreview(null);
        setSmartUpdateMessage("补充内容已加入表单。请点击 Save task 保存同步。");
      };

      const fillParsedResult = result => {
        setPreviousForm(form);
        setParsedResult(result);
        const next = { ...form };
        const mapping = {
          title: "title", source: "source", project: "project", background: "background",
          receivedDate: "receivedDate", dueDate: "deadline", priority: "priority",
          workflowNotes: "processNotes", finalResult: "finalResult"
        };
        Object.entries(mapping).forEach(([parsedKey, formKey]) => {
          if (result[parsedKey]) next[formKey] = result[parsedKey];
        });
        if (result.status && (result.status !== "done" || clearlyMeansDone(quickText))) next.status = result.status;
        if (result.nextAction) {
          const items = splitStructuredItems(result.nextAction);
          next.nextActions = items.length ? items.map(text => ({ text, status: "未开始" })) : [{ text: result.nextAction, status: "未开始" }];
          next.nextAction = nextActionsToText(next.nextActions);
          setOpenSections(current => ({ ...current, next: true }));
        }
        if (result.feedback) {
          const items = splitStructuredItems(result.feedback);
          next.feedbackItems = items.length ? items.map(text => ({ text, status: "新反馈" })) : [{ text: result.feedback, status: "新反馈" }];
          next.feedbackRecords = feedbackItemsToText(next.feedbackItems);
          setOpenSections(current => ({ ...current, feedback: true }));
        }
        setForm(next);
        setParseMessage("Parsed values have been filled. You can edit them before saving.");
      };

      const undoParsedFill = () => {
        if (!previousForm) return;
        setForm(previousForm);
        setPreviousForm(null);
        setParseMessage("Parsed fill was undone.");
      };

      const prepareAttachmentLinks = () => {
        const parsed = parseAttachmentLinks(attachmentText);
        if (!parsed.length) {
          setAttachmentMessage("没有识别到链接。请粘贴包含 http:// 或 https:// 的文件链接。");
          return;
        }
        setPendingAttachments(parsed);
        setAttachmentMessage("已识别附件链接。你可以先修改文件名，再保存记录。");
      };

      const updatePendingAttachmentName = (index, value) => {
        setPendingAttachments(current => current.map((item, itemIndex) => itemIndex === index ? { ...item, fileName: value } : item));
      };

      const saveAttachmentLinks = async () => {
        const preparedLinks = pendingAttachments.length ? pendingAttachments : parseAttachmentLinks(attachmentText);
        const validLinks = preparedLinks.map(normalizeAttachment).filter(item => item.fileUrl);
        if (!validLinks.length) {
          setAttachmentMessage("没有可保存的附件链接。");
          return;
        }
        if (!form.title.trim()) {
          setAttachmentMessage("请先填写任务标题，再保存附件记录。");
          return;
        }
        try {
          const updatedTask = await onSaveAttachmentRecord(
            { ...form, title: form.title.trim(), attachments: [...(form.attachments || []), ...validLinks] },
            isNew
          );
          setForm(updatedTask);
          setAttachmentText("");
          setPendingAttachments([]);
          setShowAttachmentInput(false);
          setAttachmentMessage("附件链接记录已保存。");
        } catch (error) {
          console.error("Attachment link save failed", error);
          setAttachmentMessage(`保存失败：${error.message}`);
        }
      };

      const deleteAttachment = async attachment => {
        if (!window.confirm("只会删除这个任务里的附件记录，不会删除云端原文件。确定删除吗？")) return;
        try {
          const updatedTask = await onSaveAttachmentRecord(
            { ...form, attachments: (form.attachments || []).filter(item => item.id !== attachment.id) },
            false
          );
          setForm(updatedTask);
          setAttachmentMessage("附件记录已删除，云端原文件不会被删除。");
        } catch (error) {
          console.error("Attachment record delete failed", error);
          setAttachmentMessage(`删除记录失败：${error.message}`);
        }
      };

      const parseWithRules = () => {
        if (!quickText.trim()) {
          setParseMessage("Enter or dictate a task description first.");
          return;
        }
        fillParsedResult(ruleParse(quickText));
      };

      const parseWithAI = async () => {
        if (!aiSettings.endpoint || !aiSettings.apiKey || !aiSettings.model) {
          setParseMessage("AI is not configured yet. Please add your API endpoint and API key in settings.");
          return;
        }
        if (!quickText.trim()) {
          setParseMessage("Enter or dictate a task description first.");
          return;
        }

        setParsing(true);
        setParseMessage("");
        const schema = Object.fromEntries(PARSED_FIELDS.map(([key]) => [key, ""]));
        const systemPrompt = `You extract task fields from Chinese or English text. Return one JSON object only, with exactly this schema: ${JSON.stringify(schema)}. If information is not explicitly stated, use an empty string. Never invent information. Dates must be YYYY-MM-DD. Today is ${dateKey(new Date())}. Priority must be 优先级1, 优先级2, 优先级3, an explicit custom priority such as 优先级4, or empty. Status must be New, To Do, In Progress, Waiting for Feedback, Done, Archived, or empty.`;
        try {
          const response = await fetch(aiSettings.endpoint, {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": `Bearer ${aiSettings.apiKey}` },
            body: JSON.stringify({
              model: aiSettings.model,
              messages: [
                { role: "system", content: systemPrompt },
                { role: "user", content: quickText }
              ],
              temperature: 0,
              response_format: { type: "json_object" }
            })
          });
          if (!response.ok) throw new Error(`API request failed (${response.status})`);
          const data = await response.json();
          let content = data.choices?.[0]?.message?.content ?? data.output_text;
          if (!content && Array.isArray(data.output)) {
            content = data.output.flatMap(item => item.content || []).map(item => item.text || item.content || "").join("");
          }
          if (typeof content === "object") content = JSON.stringify(content);
          content = String(content || "").replace(/^```(?:json)?\s*/i, "").replace(/\s*```$/, "").trim();
          fillParsedResult(normalizeParsedResult(JSON.parse(content)));
        } catch (error) {
          console.error("AI parsing failed", error);
          setParseMessage(`AI Parse failed: ${error.message}. Check the endpoint, model, key, and browser CORS support.`);
        } finally {
          setParsing(false);
        }
      };

      const clearQuickEntry = () => {
        setQuickText("");
        setParsedResult(null);
        setPreviousForm(null);
        setParseMessage("");
        quickEntryRef.current?.focus();
      };

      const startDictation = () => {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
          setParseMessage("Speech dictation is not supported in this browser. You can type or paste the paragraph instead.");
          return;
        }
        const recognition = new SpeechRecognition();
        recognition.lang = navigator.language || "zh-CN";
        recognition.interimResults = false;
        recognition.continuous = false;
        recognition.onstart = () => setListening(true);
        recognition.onend = () => setListening(false);
        recognition.onerror = event => { setListening(false); setParseMessage(`Dictation failed: ${event.error}`); };
        recognition.onresult = event => {
          const transcript = Array.from(event.results).map(result => result[0].transcript).join(" ");
          setQuickText(current => `${current}${current ? " " : ""}${transcript}`);
        };
        recognition.start();
      };

      const startSmartUpdateVoice = () => {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
          setSmartUpdateMessage("当前浏览器不支持语音补充，你可以手动输入。");
          return;
        }
        const recognition = new SpeechRecognition();
        recognition.lang = navigator.language || "zh-CN";
        recognition.interimResults = false;
        recognition.continuous = false;
        recognition.onstart = () => {
          setSmartUpdateListening(true);
          setSmartUpdateMessage("正在听，请说出要补充到任务里的更新。");
        };
        recognition.onend = () => setSmartUpdateListening(false);
        recognition.onerror = event => {
          setSmartUpdateListening(false);
          setSmartUpdateMessage(`语音补充失败：${event.error}`);
        };
        recognition.onresult = event => {
          const transcript = Array.from(event.results).map(result => result[0].transcript).join(" ");
          const nextText = `${smartUpdateText}${smartUpdateText ? " " : ""}${transcript}`;
          setSmartUpdateText(nextText);
          setSmartUpdatePreview(parseSmartUpdate(nextText));
          setSmartUpdateMessage("已识别语音补充，并生成预览。确认后点击“应用补充内容”。");
        };
        recognition.start();
      };

      const startStatusVoice = () => {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
          setStatusMessage("当前浏览器不支持语音改状态，你仍然可以手动修改状态。");
          return;
        }
        const recognition = new SpeechRecognition();
        recognition.lang = navigator.language || "zh-CN";
        recognition.interimResults = false;
        recognition.continuous = false;
        recognition.onstart = () => { setStatusListening(true); setStatusMessage("正在听，请说：移动到进行中 / 移动到待办 / 标记完成…"); };
        recognition.onend = () => setStatusListening(false);
        recognition.onerror = event => { setStatusListening(false); setStatusMessage(`语音识别失败：${event.error}`); };
        recognition.onresult = event => {
          const transcript = Array.from(event.results).map(result => result[0].transcript).join(" ");
          const nextStatus = statusFromVoiceCommand(transcript);
          if (!nextStatus) {
            setStatusMessage("未识别目标状态。你可以说：移动到进行中 / 移动到待办 / 移动到等待反馈 / 标记完成。");
            return;
          }
          setForm(current => ({ ...current, status: nextStatus }));
          setStatusMessage(`状态已改为：${statusTitle(nextStatus)}。保存任务后会同步。`);
        };
        recognition.start();
      };

      const updateNextAction = (index, field, value) => {
        const nextActions = normalizeNextActions(form.nextActions, "", true);
        nextActions[index] = { ...nextActions[index], [field]: value };
        setForm({ ...form, nextActions, nextAction: nextActionsToText(nextActions) });
      };
      const addNextAction = () => setForm(current => ({ ...current, nextActions: [...normalizeNextActions(current.nextActions), { id: makeRowId("next"), text: "", dueText: "", status: "未开始" }] }));
      const deleteNextAction = index => {
        const nextActions = normalizeNextActions(form.nextActions, "", true).filter((_, itemIndex) => itemIndex !== index);
        setForm({ ...form, nextActions, nextAction: nextActionsToText(nextActions) });
      };

      const updateFeedbackItem = (index, field, value) => {
        const feedbackItems = normalizeFeedbackItems(form.feedbackItems, "", true);
        feedbackItems[index] = { ...feedbackItems[index], [field]: value };
        setForm({ ...form, feedbackItems, feedbackRecords: feedbackItemsToText(feedbackItems) });
      };
      const addFeedbackItem = () => setForm(current => ({ ...current, feedbackItems: [...normalizeFeedbackItems(current.feedbackItems), { id: makeRowId("feedback"), text: "", createdAt: todayTimeText(), attachments: [], status: "新反馈" }] }));
      const deleteFeedbackItem = index => {
        const feedbackItems = normalizeFeedbackItems(form.feedbackItems, "", true).filter((_, itemIndex) => itemIndex !== index);
        setForm({ ...form, feedbackItems, feedbackRecords: feedbackItemsToText(feedbackItems) });
      };

      const updateProcessItem = (index, field, value) => {
        const processItems = normalizeProcessItems(form.processItems, "", true);
        processItems[index] = { ...processItems[index], [field]: value };
        setForm({ ...form, processItems, processNotes: processItemsToText(processItems) });
      };
      const addProcessItem = () => setForm(current => ({ ...current, processItems: [...normalizeProcessItems(current.processItems), { id: makeRowId("process"), text: "", createdAt: todayTimeText(), attachments: [] }] }));
      const deleteProcessItem = index => {
        const processItems = normalizeProcessItems(form.processItems, "", true).filter((_, itemIndex) => itemIndex !== index);
        setForm({ ...form, processItems, processNotes: processItemsToText(processItems) });
      };

      const updateFinalResultItem = (index, field, value) => {
        const finalResults = normalizeFinalResults(form.finalResults, "", true);
        finalResults[index] = { ...finalResults[index], [field]: value };
        setForm({ ...form, finalResults, finalResult: finalResultsToText(finalResults) });
      };
      const addFinalResultItem = () => setForm(current => ({ ...current, finalResults: [...normalizeFinalResults(current.finalResults), { id: makeRowId("final"), text: "", createdAt: todayTimeText(), attachments: [] }] }));
      const deleteFinalResultItem = index => {
        const finalResults = normalizeFinalResults(form.finalResults, "", true).filter((_, itemIndex) => itemIndex !== index);
        setForm({ ...form, finalResults, finalResult: finalResultsToText(finalResults) });
      };

      const addRowAttachments = (section, index) => {
        const pasted = window.prompt("粘贴文件链接或包含文件名的整段文字");
        const links = parseAttachmentLinks(pasted || "");
        if (!links.length) {
          setAttachmentMessage("没有识别到附件链接。");
          return;
        }
        if (section === "feedback") {
          const feedbackItems = normalizeFeedbackItems(form.feedbackItems, "", true);
          feedbackItems[index] = { ...feedbackItems[index], attachments: [...(feedbackItems[index]?.attachments || []), ...links] };
          setForm({ ...form, feedbackItems, feedbackRecords: feedbackItemsToText(feedbackItems) });
        }
        if (section === "process") {
          const processItems = normalizeProcessItems(form.processItems, "", true);
          processItems[index] = { ...processItems[index], attachments: [...(processItems[index]?.attachments || []), ...links] };
          setForm({ ...form, processItems, processNotes: processItemsToText(processItems) });
        }
        if (section === "final") {
          const finalResults = normalizeFinalResults(form.finalResults, "", true);
          finalResults[index] = { ...finalResults[index], attachments: [...(finalResults[index]?.attachments || []), ...links] };
          setForm({ ...form, finalResults, finalResult: finalResultsToText(finalResults) });
        }
      };

      const deleteRowAttachment = (section, rowIndex, attachmentId) => {
        if (!window.confirm("只会删除这个记录里的附件链接，不会删除云端原文件。确定删除吗？")) return;
        if (section === "feedback") {
          const feedbackItems = normalizeFeedbackItems(form.feedbackItems, "", true);
          feedbackItems[rowIndex] = { ...feedbackItems[rowIndex], attachments: (feedbackItems[rowIndex]?.attachments || []).filter(item => item.id !== attachmentId) };
          setForm({ ...form, feedbackItems, feedbackRecords: feedbackItemsToText(feedbackItems) });
        }
        if (section === "process") {
          const processItems = normalizeProcessItems(form.processItems, "", true);
          processItems[rowIndex] = { ...processItems[rowIndex], attachments: (processItems[rowIndex]?.attachments || []).filter(item => item.id !== attachmentId) };
          setForm({ ...form, processItems, processNotes: processItemsToText(processItems) });
        }
        if (section === "final") {
          const finalResults = normalizeFinalResults(form.finalResults, "", true);
          finalResults[rowIndex] = { ...finalResults[rowIndex], attachments: (finalResults[rowIndex]?.attachments || []).filter(item => item.id !== attachmentId) };
          setForm({ ...form, finalResults, finalResult: finalResultsToText(finalResults) });
        }
      };

      const renderRowAttachments = (items, section, rowIndex) => (
        <div>
          {(items || []).map(attachment => (
            <span key={attachment.id} className="row-attachment-link">
              <a href={attachment.fileUrl} target="_blank" rel="noopener noreferrer">{attachment.fileName}</a>
              <button type="button" className="attachment-action danger" onClick={() => deleteRowAttachment(section, rowIndex, attachment.id)}>删除记录</button>
            </span>
          ))}
          <button type="button" className="attachment-action" onClick={() => addRowAttachments(section, rowIndex)}>添加附件链接</button>
        </div>
      );

      return (
        <div className="modal-backdrop" onMouseDown={event => event.target === event.currentTarget && onClose()}>
          <form className="modal" onSubmit={submit}>
            <div className="modal-header">
              <div>
                <h2>{isNew ? "Add a work task" : "Task details"}</h2>
                <p>Record only what is useful now. You can return and add more detail later.</p>
              </div>
              <button type="button" className="close-button" aria-label="Close" onClick={onClose}>×</button>
            </div>
            <div className="form-body">
              <div className="form-grid">
                {isNew && (
                  <section className="quick-entry">
                    <h3>Smart Quick Entry</h3>
                    <p className="quick-entry-intro">Type, paste, or dictate a natural-language task description. Parsing fills detected fields automatically, but nothing is saved until you click Save task.</p>
                    <textarea ref={quickEntryRef} value={quickText} onChange={event => setQuickText(event.target.value)} placeholder="Example: 老板让我今天跟进俄罗斯水槽说明书修改，优先级高，截止到7月10日，目前进行中，下一步整理问题清单，客户反馈说俄文用词需要再确认。" />
                    <div className="quick-actions">
                      <button type="button" className="btn btn-primary" onClick={parseWithAI} disabled={parsing}>{parsing ? "AI Parsing…" : "AI Parse"}</button>
                      <button type="button" className="btn btn-secondary" onClick={parseWithRules}>Rule Parse</button>
                      <button type="button" className={`btn btn-secondary${listening ? " mic-active" : ""}`} onClick={startDictation}>{listening ? "Listening…" : "Dictate"}</button>
                      <button type="button" className="btn btn-secondary" onClick={clearQuickEntry}>Clear</button>
                      <button type="button" className="btn btn-secondary" onClick={onOpenAISettings}>AI Settings</button>
                    </div>
                    {parseMessage && <p className="parse-message">{parseMessage}</p>}
                    {parsedResult && (
                      <div className="parsed-preview">
                        <h4>Parsed result preview</h4>
                        <div className="preview-grid">
                          {PARSED_FIELDS.filter(([key]) => parsedResult[key]).map(([key, label]) => (
                            <div className="preview-item" key={key}><strong>{label}:</strong> {key === "status" ? statusTitle(parsedResult[key]) : parsedResult[key]}</div>
                          ))}
                          {!PARSED_FIELDS.some(([key]) => parsedResult[key]) && <div className="preview-item">No task fields were detected.</div>}
                        </div>
                        {previousForm && <div className="quick-actions"><button type="button" className="btn btn-secondary" onClick={undoParsedFill}>Undo parsed fill</button></div>}
                      </div>
                    )}
                  </section>
                )}
                {!isNew && (
                  <section className="smart-update">
                    <h3>智能补充</h3>
                    <p className="smart-update-intro">输入或语音补充任务进展。系统会判断应该追加到反馈、下一步动作、工作流程说明或最终结果，不会覆盖已有内容。</p>
                    <textarea value={smartUpdateText} onChange={event => { setSmartUpdateText(event.target.value); setSmartUpdatePreview(null); }} placeholder="例如：老板反馈说 SOP 要加上负责人和截止时间 / 下一步先整理现有文件，再补充交接表格 / 今天已经整理完现有资料…" />
                    <div className="quick-actions">
                      <button type="button" className="btn btn-secondary" onClick={() => parseSmartUpdateText()}>解析补充</button>
                      <button type="button" className={`btn btn-secondary${smartUpdateListening ? " mic-active" : ""}`} onClick={startSmartUpdateVoice}>{smartUpdateListening ? "正在听…" : "语音补充"}</button>
                      <button type="button" className="btn btn-secondary" onClick={() => { setSmartUpdateText(""); setSmartUpdatePreview(null); setSmartUpdateMessage(""); }}>清空</button>
                    </div>
                    {smartUpdateMessage && <p className="status-message">{smartUpdateMessage}</p>}
                    {smartUpdatePreview && (
                      <div className="smart-preview">
                        <h4>将添加到：</h4>
                        <ul>
                          {smartUpdatePreview.feedbackItems.map((item, index) => <li key={`feedback-${index}`}>反馈记录：{item.text || "仅附件"}</li>)}
                          {smartUpdatePreview.nextActions.map((item, index) => <li key={`next-${index}`}>下一步动作：{item.dueText ? `${item.dueText} / ` : ""}{item.text}</li>)}
                          {smartUpdatePreview.processItems.map((item, index) => <li key={`process-${index}`}>工作流程说明：{item.text || "仅附件"}</li>)}
                          {smartUpdatePreview.finalResults.map((item, index) => <li key={`final-${index}`}>最终结果：{item.text || "仅附件"}</li>)}
                          {smartUpdatePreview.attachments.length > 0 && <li>相关附件：{smartUpdatePreview.attachments.map(item => item.fileName).join("、")}</li>}
                        </ul>
                        <div className="quick-actions"><button type="button" className="btn btn-primary" onClick={applySmartUpdate}>应用补充内容</button></div>
                      </div>
                    )}
                  </section>
                )}
                <div className="field full">
                  <label htmlFor="title">Task title <span className="required">*</span></label>
                  <input id="title" name="title" value={form.title} onChange={change} placeholder="What needs to be done?" autoFocus />
                </div>
                <div className="field">
                  <label htmlFor="source">Task source / who assigned it</label>
                  <input id="source" name="source" value={form.source} onChange={change} placeholder="e.g. Manager, client, self" />
                </div>
                <div className="field">
                  <label htmlFor="project">Project or category</label>
                  <input id="project" name="project" value={form.project} onChange={change} placeholder="e.g. Website launch" />
                </div>
                <section className="collapsible-section">
                  <button type="button" className="section-toggle" onClick={() => toggleSection("background")}>
                    <span className="section-title">任务背景 <span className="section-summary">{backgroundSummary}</span></span>
                    <span>{openSections.background ? "收起" : "展开"}</span>
                  </button>
                  {openSections.background && (
                    <div className="section-content">
                      <textarea id="background" name="background" value={form.background} onChange={change} placeholder="Why is this task needed? Add the request, context, or expected outcome…" />
                    </div>
                  )}
                </section>
                <div className="field">
                  <label htmlFor="receivedDate">Received date</label>
                  <input id="receivedDate" type="date" name="receivedDate" value={form.receivedDate} onChange={change} />
                </div>
                <div className="field">
                  <label htmlFor="deadline">Deadline</label>
                  <input id="deadline" type="date" name="deadline" value={form.deadline} onChange={change} />
                </div>
                <div className="field">
                  <label htmlFor="priority">优先级</label>
                  <select id="priority" name="priority" value={normalizePriority(form.priority) || "优先级3"} onChange={changePriority}>
                    {priorityOptions.map(priority => <option key={priority} value={priority}>{priority}</option>)}
                    <option value={ADD_PRIORITY_OPTION}>+ 新增优先级</option>
                  </select>
                </div>
                <div className="field">
                  <label htmlFor="status">Current progress</label>
                  <div className="status-control-row">
                    <select id="status" name="status" value={form.status} onChange={change}>
                      {COLUMNS.map(column => <option key={column.id} value={column.id}>{column.title}</option>)}
                    </select>
                    <button type="button" className={`btn btn-secondary${statusListening ? " mic-active" : ""}`} onClick={startStatusVoice}>{statusListening ? "正在听…" : "语音改状态"}</button>
                  </div>
                  {statusMessage && <p className="status-message">{statusMessage}</p>}
                </div>
                <section className="collapsible-section attachments-section">
                  <button type="button" className="section-toggle" onClick={() => toggleSection("attachments")}>
                    <span className="section-title">附件 <span className="section-summary">这里只保存云端文件链接记录，不保存文件本体。</span></span>
                    <span>{attachmentCount(form)}项</span>
                  </button>
                  {openSections.attachments && (
                    <div className="section-content">
                      <div className="attachments-header">
                        <div><p>点击文件名会打开云端链接。删除只会删除本任务里的记录，不会删除云端原文件。</p></div>
                        <div><button type="button" className="btn btn-secondary" onClick={() => setShowAttachmentInput(current => !current)}>添加附件链接</button></div>
                      </div>
                      {showAttachmentInput && (
                        <div className="attachment-link-box">
                          <label htmlFor="attachmentText">粘贴文件链接或包含文件名的整段文字</label>
                          <textarea id="attachmentText" value={attachmentText} onChange={event => { setAttachmentText(event.target.value); setPendingAttachments([]); }} placeholder={"俄罗斯水槽说明书修改清单.xlsx https://kdocs.cn/xxxx\n老板反馈截图.png https://feishu.cn/xxxx\nhttps://kdocs.cn/xxxx"} />
                          <div className="quick-actions">
                            <button type="button" className="btn btn-secondary" onClick={prepareAttachmentLinks}>识别链接</button>
                            <button type="button" className="btn btn-primary" onClick={saveAttachmentLinks}>保存附件记录</button>
                            <button type="button" className="btn btn-secondary" onClick={() => { setAttachmentText(""); setPendingAttachments([]); setShowAttachmentInput(false); }}>取消</button>
                          </div>
                          {pendingAttachments.length > 0 && (
                            <div className="structured-table-wrap">
                              <table className="structured-table">
                                <thead><tr><th>文件名</th><th>链接</th></tr></thead>
                                <tbody>
                                  {pendingAttachments.map((attachment, index) => (
                                    <tr key={attachment.id}>
                                      <td><input value={attachment.fileName} onChange={event => updatePendingAttachmentName(index, event.target.value)} /></td>
                                      <td><span className="table-summary">{attachment.fileUrl}</span></td>
                                    </tr>
                                  ))}
                                </tbody>
                              </table>
                            </div>
                          )}
                        </div>
                      )}
                      <div className="attachments-table-wrap">
                        <table className="attachments-table">
                          <thead>
                            <tr>
                              <th>文件名</th>
                              <th>添加时间</th>
                              <th>删除记录</th>
                            </tr>
                          </thead>
                          <tbody>
                            {attachmentCount(form) ? form.attachments.map(attachment => (
                              <tr key={attachment.id}>
                                <td className="attachment-name"><a href={attachment.fileUrl} target="_blank" rel="noopener noreferrer">{attachment.fileName}</a></td>
                                <td>{formatDate(attachment.uploadedAt, true)}</td>
                                <td><button type="button" className="attachment-action danger" onClick={() => deleteAttachment(attachment)}>删除记录</button></td>
                              </tr>
                            )) : (
                              <tr><td colSpan="3">还没有附件链接记录。</td></tr>
                            )}
                          </tbody>
                        </table>
                      </div>
                      {attachmentMessage && <p className="attachment-message">{attachmentMessage}</p>}
                    </div>
                  )}
                </section>
                <section className="collapsible-section">
                  <button type="button" className="section-toggle" onClick={() => toggleSection("next")}>
                    <span className="section-title">下一步动作 <span className="section-summary">{nextActionItems[0]?.text || "空"}</span></span>
                    <span>{nextActionItems.length} 项</span>
                  </button>
                  {openSections.next && (
                    <div className="section-content">
                      <div className="structured-table-wrap">
                        <table className="structured-table">
                          <thead><tr><th>序号</th><th>时间/期限</th><th>下一步动作</th><th>状态</th><th>删除</th></tr></thead>
                          <tbody>
                            {nextActionItems.map((item, index) => (
                              <tr key={index}>
                                <td className="structured-index">{index + 1}</td>
                                <td><input value={item.dueText} onChange={event => updateNextAction(index, "dueText", event.target.value)} placeholder="如：明天" /></td>
                                <td><input value={item.text} onChange={event => updateNextAction(index, "text", event.target.value)} placeholder="填写下一步动作" /></td>
                                <td>
                                  <select value={item.status} onChange={event => updateNextAction(index, "status", event.target.value)}>
                                    <option>未开始</option><option>进行中</option><option>已完成</option>
                                  </select>
                                </td>
                                <td><button type="button" className="attachment-action danger" onClick={() => deleteNextAction(index)}>Delete</button></td>
                              </tr>
                            ))}
                            {!nextActionItems.length && <tr><td colSpan="5">还没有下一步动作。</td></tr>}
                          </tbody>
                        </table>
                      </div>
                      <div className="quick-actions"><button type="button" className="btn btn-secondary" onClick={addNextAction}>Add action item</button></div>
                    </div>
                  )}
                </section>
                <section className="collapsible-section">
                  <button type="button" className="section-toggle" onClick={() => toggleSection("feedback")}>
                    <span className="section-title">反馈记录 <span className="section-summary">{feedbackRecordsItems[0]?.text || "空"}</span></span>
                    <span>{feedbackRecordsItems.length} 项</span>
                  </button>
                  {openSections.feedback && (
                    <div className="section-content">
                      <div className="structured-table-wrap">
                        <table className="structured-table">
                          <thead><tr><th>序号</th><th>时间</th><th>反馈内容</th><th>相关附件</th><th>状态</th><th>删除</th></tr></thead>
                          <tbody>
                            {feedbackRecordsItems.map((item, index) => (
                              <tr key={index}>
                                <td className="structured-index">{index + 1}</td>
                                <td><input value={item.createdAt} onChange={event => updateFeedbackItem(index, "createdAt", event.target.value)} placeholder="时间" /></td>
                                <td><textarea value={item.text} onChange={event => updateFeedbackItem(index, "text", event.target.value)} placeholder="填写反馈内容" /></td>
                                <td>{renderRowAttachments(item.attachments, "feedback", index)}</td>
                                <td>
                                  <select value={item.status} onChange={event => updateFeedbackItem(index, "status", event.target.value)}>
                                    <option>新反馈</option><option>处理中</option><option>已解决</option>
                                  </select>
                                </td>
                                <td><button type="button" className="attachment-action danger" onClick={() => deleteFeedbackItem(index)}>Delete</button></td>
                              </tr>
                            ))}
                            {!feedbackRecordsItems.length && <tr><td colSpan="6">还没有反馈记录。</td></tr>}
                          </tbody>
                        </table>
                      </div>
                      <div className="quick-actions"><button type="button" className="btn btn-secondary" onClick={addFeedbackItem}>Add feedback item</button></div>
                    </div>
                  )}
                </section>
                <section className="collapsible-section">
                  <button type="button" className="section-toggle" onClick={() => toggleSection("process")}>
                    <span className="section-title">工作流程说明 <span className="section-summary">{processSummary}</span></span>
                    <span>{processRecordItems.length}条</span>
                  </button>
                  {openSections.process && (
                    <div className="section-content">
                      <div className="structured-table-wrap">
                        <table className="structured-table">
                          <thead><tr><th>序号</th><th>时间</th><th>过程记录</th><th>相关附件</th><th>删除</th></tr></thead>
                          <tbody>
                            {processRecordItems.map((item, index) => (
                              <tr key={index}>
                                <td className="structured-index">{index + 1}</td>
                                <td><input value={item.createdAt} onChange={event => updateProcessItem(index, "createdAt", event.target.value)} placeholder="时间" /></td>
                                <td><textarea value={item.text} onChange={event => updateProcessItem(index, "text", event.target.value)} placeholder="填写过程记录" /></td>
                                <td>{renderRowAttachments(item.attachments, "process", index)}</td>
                                <td><button type="button" className="attachment-action danger" onClick={() => deleteProcessItem(index)}>Delete</button></td>
                              </tr>
                            ))}
                            {!processRecordItems.length && <tr><td colSpan="5">还没有工作流程说明。</td></tr>}
                          </tbody>
