<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>React Kanban</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0f1117;--surface:#1a1f2e;--card:#242938;--border:#2e3448;
      --accent:#7c3aed;--accent2:#06b6d4;--success:#22c55e;--danger:#ef4444;
      --warning:#f59e0b;--text:#e2e8f0;--muted:#64748b;--radius:10px;
    }
    body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;}
    header{background:var(--surface);border-bottom:1px solid var(--border);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
    header h1{font-size:1.25rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .board{display:flex;gap:1.25rem;padding:1.5rem 2rem 2rem;overflow-x:auto;min-height:calc(100vh - 65px);align-items:flex-start;}
    .column{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);width:300px;min-width:300px;display:flex;flex-direction:column;max-height:calc(100vh - 100px);}
    .column.drag-over{border-color:var(--accent);background:#1e1735;}
    .col-header{display:flex;align-items:center;justify-content:space-between;padding:.85rem 1rem;border-bottom:1px solid var(--border);}
    .col-title{display:flex;align-items:center;gap:.5rem;font-size:.85rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase;}
    .col-dot{width:8px;height:8px;border-radius:50%;}
    .col-count{font-size:.72rem;font-weight:600;padding:.15rem .45rem;border-radius:99px;background:var(--card);color:var(--muted);}
    .cards-list{flex:1;overflow-y:auto;padding:.75rem;display:flex;flex-direction:column;gap:.6rem;min-height:60px;}
    .card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.75rem;cursor:grab;user-select:none;transition:transform .15s,box-shadow .15s,border-color .15s;position:relative;}
    .card:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.4);}
    .card.dragging{opacity:.4;cursor:grabbing;}
    .card-title{font-size:.875rem;font-weight:500;line-height:1.4;margin-bottom:.4rem;word-break:break-word;}
    .card-meta{display:flex;align-items:center;justify-content:space-between;margin-top:.5rem;}
    .card-tag{font-size:.65rem;font-weight:600;padding:.15rem .45rem;border-radius:99px;letter-spacing:.3px;}
    .card-delete{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.8rem;padding:.15rem .3rem;border-radius:4px;opacity:0;transition:opacity .15s,color .15s;}
    .card:hover .card-delete{opacity:1;}
    .card-delete:hover{color:var(--danger);}
    .add-card-area{padding:.75rem;border-top:1px solid var(--border);}
    .add-card-input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:.55rem .75rem;color:var(--text);font-size:.82rem;resize:none;outline:none;transition:border-color .2s;font-family:inherit;min-height:60px;}
    .add-card-input:focus{border-color:var(--accent);}
    .add-card-actions{display:flex;gap:.5rem;margin-top:.5rem;}
    .btn{padding:.4rem .9rem;border-radius:6px;font-size:.78rem;font-weight:600;cursor:pointer;border:none;transition:all .15s;}
    .btn-primary{background:var(--accent);color:#fff;}
    .btn-primary:hover{background:#6d28d9;}
    .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);}
    .btn-ghost:hover{color:var(--text);border-color:var(--muted);}
    .btn-add-card{width:100%;background:none;border:1px dashed var(--border);color:var(--muted);border-radius:6px;padding:.45rem;font-size:.78rem;cursor:pointer;transition:all .15s;}
    .btn-add-card:hover{border-color:var(--accent);color:var(--text);}
    .tag-row{display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.4rem;}
    .tag-chip{font-size:.65rem;font-weight:600;padding:.15rem .45rem;border-radius:99px;cursor:pointer;border:2px solid transparent;opacity:.6;transition:opacity .15s,border-color .15s;}
    .tag-chip.selected{opacity:1;border-color:rgba(255,255,255,.4);}
    .stats-bar{display:flex;gap:1.5rem;font-size:.75rem;color:var(--muted);}
    .stat-val{font-weight:700;color:var(--text);}
    .empty{text-align:center;color:var(--muted);font-size:.78rem;padding:1rem 0;}
    ::-webkit-scrollbar{width:4px;height:4px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}
    @media(max-width:640px){.board{padding:1rem;gap:1rem;}.column{width:270px;min-width:270px;}}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const{useState,useRef}=React;
    const TAGS=[{label:"Feature",color:"#7c3aed",bg:"#3b1a7a22"},{label:"Bug",color:"#ef4444",bg:"#7f1d1d22"},{label:"Docs",color:"#06b6d4",bg:"#0c4a6e22"},{label:"Design",color:"#f59e0b",bg:"#78350f22"},{label:"Research",color:"#22c55e",bg:"#14532d22"}];
    const COL_COLORS={todo:{dot:"#64748b",label:"#94a3b8"},inprogress:{dot:"#f59e0b",label:"#fbbf24"},review:{dot:"#06b6d4",label:"#22d3ee"},done:{dot:"#22c55e",label:"#4ade80"}};
    const COLS=[{id:"todo",title:"To Do"},{id:"inprogress",title:"In Progress"},{id:"review",title:"In Review"},{id:"done",title:"Done"}];
    const SAMPLE=[{id:"c1",col:"todo",text:"Set up project structure and configure TypeScript",tag:"Feature"},{id:"c2",col:"todo",text:"Design database schema for user accounts",tag:"Design"},{id:"c3",col:"todo",text:"Write unit tests for auth module",tag:"Docs"},{id:"c4",col:"inprogress",text:"Implement drag-and-drop card movement",tag:"Feature"},{id:"c5",col:"inprogress",text:"Fix layout shift on mobile viewport",tag:"Bug"},{id:"c6",col:"review",text:"Kanban board component peer review",tag:"Feature"},{id:"c7",col:"done",text:"Initial project scaffolding",tag:"Feature"},{id:"c8",col:"done",text:"Dark theme design system",tag:"Design"}];
    function load(){try{const s=localStorage.getItem("kanban");return s?JSON.parse(s):SAMPLE;}catch{return SAMPLE;}}
    function save(c){try{localStorage.setItem("kanban",JSON.stringify(c));}catch{}}
    let _n=Date.now();const uid=()=>`c${++_n}`;
    function Tag({tag}){const t=TAGS.find(x=>x.label===tag);return t?<span className="card-tag" style={{color:t.color,background:t.bg}}>{tag}</span>:null;}
    function CardForm({colId,onAdd,onCancel}){const[text,setText]=useState("");const[tag,setTag]=useState("Feature");const go=()=>{if(!text.trim())return;onAdd(colId,text.trim(),tag);setText("");};return(<div><textarea className="add-card-input" placeholder="Card title..." value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();go();}}} autoFocus/><div className="tag-row">{TAGS.map(t=><span key={t.label} className={`tag-chip${tag===t.label?" selected":""}`} style={{color:t.color,background:t.bg}} onClick={()=>setTag(t.label)}>{t.label}</span>)}</div><div className="add-card-actions"><button className="btn btn-primary" onClick={go}>Add card</button><button className="btn btn-ghost" onClick={onCancel}>Cancel</button></div></div>);}
    function Card({card,onDel,onDS,onDE}){return(<div className="card" draggable onDragStart={e=>onDS(e,card.id)} onDragEnd={onDE}><div className="card-title">{card.text}</div><div className="card-meta"><Tag tag={card.tag}/><button className="card-delete" onClick={()=>onDel(card.id)}>&#x2715;</button></div></div>);}
    function Col({col,cards,onAdd,onDel,onDS,onDE,onDO,onDrop,over}){const[adding,setAdding]=useState(false);const c=COL_COLORS[col.id]||{dot:"#64748b",label:"#94a3b8"};return(<div className={`column${over?" drag-over":""}`} onDragOver={e=>onDO(e,col.id)} onDrop={e=>onDrop(e,col.id)}><div className="col-header"><div className="col-title"><span className="col-dot" style={{background:c.dot}}/><span style={{color:c.label}}>{col.title}</span></div><span className="col-count">{cards.length}</span></div><div className="cards-list">{cards.length===0&&<div className="empty">Drop cards here</div>}{cards.map(card=><Card key={card.id} card={card} onDel={onDel} onDS={onDS} onDE={onDE}/>)}</div><div className="add-card-area">{adding?<CardForm colId={col.id} onAdd={(ci,t,tg)=>{onAdd(ci,t,tg);setAdding(false);}} onCancel={()=>setAdding(false)}/>:<button className="btn-add-card" onClick={()=>setAdding(true)}>+ Add card</button>}</div></div>);}
    function App(){const[cards,setCards]=useState(load);const drag=useRef(null);const[over,setOver]=useState(null);const persist=n=>{setCards(n);save(n);};return(<><header><h1>&#x26A1; React Kanban</h1><div className="stats-bar"><span><span className="stat-val">{cards.length}</span> cards</span><span><span className="stat-val">{cards.filter(c=>c.col==="done").length}</span> done</span><span><span className="stat-val">{cards.length?Math.round(cards.filter(c=>c.col==="done").length/cards.length*100):0}%</span> complete</span></div></header><div className="board">{COLS.map(col=><Col key={col.id} col={col} cards={cards.filter(c=>c.col===col.id)} onAdd={(ci,t,tg)=>persist([...cards,{id:uid(),col:ci,text:t,tag:tg}])} onDel={id=>persist(cards.filter(c=>c.id!==id))} onDS={(e,id)=>{drag.current=id;e.currentTarget.classList.add("dragging");e.dataTransfer.effectAllowed="move";}} onDE={e=>{e.currentTarget.classList.remove("dragging");drag.current=null;setOver(null);}} onDO={(e,ci)=>{e.preventDefault();setOver(ci);}} onDrop={(e,ci)=>{e.preventDefault();if(drag.current)persist(cards.map(c=>c.id===drag.current?{...c,col:ci}:c));setOver(null);}} over={over===col.id}/>)}</div></>);}
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
