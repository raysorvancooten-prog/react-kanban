                        </table>
                      </div>
                      <div className="quick-actions"><button type="button" className="btn btn-secondary" onClick={addProcessItem}>Add process record</button></div>
                    </div>
                  )}
                </section>
                <section className="collapsible-section">
                  <button type="button" className="section-toggle" onClick={() => toggleSection("final")}>
                    <span className="section-title">最终结果 <span className="section-summary">{finalSummary}</span></span>
                    <span>{finalResultItems.length}条</span>
                  </button>
                  {openSections.final && (
                    <div className="section-content">
                      <div className="structured-table-wrap">
                        <table className="structured-table">
                          <thead><tr><th>序号</th><th>时间</th><th>结果内容</th><th>相关附件</th><th>删除</th></tr></thead>
                          <tbody>
                            {finalResultItems.map((item, index) => (
                              <tr key={index}>
                                <td className="structured-index">{index + 1}</td>
                                <td><input value={item.createdAt} onChange={event => updateFinalResultItem(index, "createdAt", event.target.value)} placeholder="时间" /></td>
                                <td><textarea value={item.text} onChange={event => updateFinalResultItem(index, "text", event.target.value)} placeholder="填写结果内容" /></td>
                                <td>{renderRowAttachments(item.attachments, "final", index)}</td>
                                <td><button type="button" className="attachment-action danger" onClick={() => deleteFinalResultItem(index)}>Delete</button></td>
                              </tr>
                            ))}
                            {!finalResultItems.length && <tr><td colSpan="5">还没有最终结果。</td></tr>}
                          </tbody>
                        </table>
                      </div>
                      <div className="quick-actions"><button type="button" className="btn btn-secondary" onClick={addFinalResultItem}>Add result record</button></div>
                    </div>
                  )}
                </section>
                {form.links && (
                  <section className="collapsible-section">
                    <button type="button" className="section-toggle" onClick={() => toggleSection("legacy")}>旧链接记录 <span>已隐藏</span></button>
                    {openSections.legacy && <div className="section-content"><div className="legacy-links">{form.links}</div></div>}
                  </section>
                )}
              </div>
            </div>
            <div className="modal-actions">
              <div>{!isNew && <button type="button" className="btn btn-danger" onClick={() => onDelete(form.id)}>Delete task</button>}</div>
              <div className="action-group">
                <button type="button" className="btn btn-secondary" onClick={onClose}>Cancel</button>
                <button type="submit" className="btn btn-primary">Save task</button>
              </div>
            </div>
          </form>
        </div>
      );
    }

    function TaskCard({ task, onOpen, onDelete, onDragStart, onDragEnd }) {
      return (
        <article className="task-card" draggable onClick={() => onOpen(task)} onDragStart={event => onDragStart(event, task.id)} onDragEnd={onDragEnd}>
          <button className="card-delete" aria-label={`Delete ${task.title}`} onClick={event => { event.stopPropagation(); onDelete(task.id); }}>×</button>
          <h3 className="card-title">{task.title}</h3>
          <div className="card-meta">
            <span className={`pill ${priorityClass(task.priority)}`}>{normalizePriority(task.priority) || "优先级3"}</span>
            {task.project && <span className="pill">{task.project}</span>}
            {attachmentCount(task) > 0 && <span className="pill">{attachmentCount(task)} file{attachmentCount(task) === 1 ? "" : "s"}</span>}
          </div>
          {task.source && <p className="card-line"><strong>From:</strong> {task.source}</p>}
          {task.deadline && <p className="card-line"><strong>Due:</strong> {task.deadline}</p>}
          {normalizeNextActions(task.nextActions, task.nextAction).length > 0 && <p className="card-line"><strong>Next actions:</strong> {normalizeNextActions(task.nextActions, task.nextAction).length}</p>}
        </article>
      );
    }

    function Column({ column, tasks, onAdd, onOpen, onDelete, onDragStart, onDragEnd, onDragOver, onDrop, isOver }) {
      return (
        <section className={`column${isOver ? " drag-over" : ""}`} onDragOver={event => onDragOver(event, column.id)} onDrop={event => onDrop(event, column.id)}>
          <div className="column-header">
            <div className="column-heading">
              <div className="column-title"><span className="column-dot" style={{ background: column.color }}></span>{column.title}</div>
              <div className="column-description">{column.description}</div>
            </div>
            <span className="column-count">{tasks.length}</span>
          </div>
          <div className="card-list">
            {!tasks.length && <div className="empty">No tasks here</div>}
            {tasks.map(task => <TaskCard key={task.id} task={task} onOpen={onOpen} onDelete={onDelete} onDragStart={onDragStart} onDragEnd={onDragEnd} />)}
          </div>
          <button className="add-task" onClick={() => onAdd(column.id)}>+ Add task</button>
        </section>
      );
    }

    function TableView({ tasks, onOpen }) {
      const [search, setSearch] = useState("");
      const [status, setStatus] = useState("");
      const [project, setProject] = useState("");
      const [priority, setPriority] = useState("");
      const [dateFrom, setDateFrom] = useState("");
      const [dateTo, setDateTo] = useState("");
      const [unfinishedOnly, setUnfinishedOnly] = useState(false);
      const [feedbackOnly, setFeedbackOnly] = useState(false);
      const [attachmentFilter, setAttachmentFilter] = useState("");
      const [sortBy, setSortBy] = useState("updatedAt");
      const [sortDirection, setSortDirection] = useState("desc");

      const projects = useMemo(() => [...new Set(tasks.map(task => task.project.trim()).filter(Boolean))].sort((a, b) => a.localeCompare(b)), [tasks]);
      const priorityOptions = useMemo(() => uniquePriorityOptions(tasks.map(task => task.priority)), [tasks]);

      const filteredTasks = useMemo(() => {
        const keyword = search.trim().toLowerCase();
        const statusOrder = Object.fromEntries(COLUMNS.map((column, index) => [column.id, index]));
        const valueForSort = task => {
          if (sortBy === "createdAt") return createdDate(task)?.getTime() || 0;
          if (sortBy === "deadline") return toDate(task.deadline)?.getTime() || 0;
          if (sortBy === "updatedAt") return toDate(task.updatedAt)?.getTime() || 0;
          if (sortBy === "status") return statusOrder[task.status] ?? 99;
          if (sortBy === "priority") return priorityRank(task.priority);
          return 0;
        };

        return tasks
          .filter(task => {
            const searchable = [task.title, task.project, task.source, task.background, task.nextAction, task.processNotes, task.feedbackRecords, task.finalResult, task.links].join(" ").toLowerCase();
            const created = dateKey(createdDate(task));
            if (keyword && !searchable.includes(keyword)) return false;
            if (status && task.status !== status) return false;
            if (project && task.project !== project) return false;
            if (priority && task.priority !== priority) return false;
            if (dateFrom && (!created || created < dateFrom)) return false;
            if (dateTo && (!created || created > dateTo)) return false;
            if (unfinishedOnly && ["done", "archived"].includes(task.status)) return false;
            if (feedbackOnly && task.status !== "feedback") return false;
            if (attachmentFilter === "has" && attachmentCount(task) === 0) return false;
            if (attachmentFilter === "none" && attachmentCount(task) > 0) return false;
            return true;
          })
          .sort((a, b) => {
            const first = valueForSort(a);
            const second = valueForSort(b);
            const difference = typeof first === "string" ? first.localeCompare(second) : first - second;
            if (sortBy === "priority") return difference || a.title.localeCompare(b.title);
            return (sortDirection === "asc" ? difference : -difference) || a.title.localeCompare(b.title);
          });
      }, [tasks, search, status, project, priority, dateFrom, dateTo, unfinishedOnly, feedbackOnly, attachmentFilter, sortBy, sortDirection]);

      const openFromKeyboard = (event, task) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          onOpen(task);
        }
      };

      return (
        <main className="table-view">
          <div className="filters">
            <div className="filter-field">
              <label htmlFor="tableSearch">Search keyword</label>
              <input id="tableSearch" value={search} onChange={event => setSearch(event.target.value)} placeholder="Search titles, notes, feedback, results…" />
            </div>
            <div className="filter-field">
              <label htmlFor="statusFilter">Status</label>
              <select id="statusFilter" value={status} onChange={event => setStatus(event.target.value)}>
                <option value="">All statuses</option>
                {COLUMNS.map(column => <option key={column.id} value={column.id}>{column.title}</option>)}
              </select>
            </div>
            <div className="filter-field">
              <label htmlFor="projectFilter">Project / Category</label>
              <select id="projectFilter" value={project} onChange={event => setProject(event.target.value)}>
                <option value="">All projects</option>
                {projects.map(item => <option key={item} value={item}>{item}</option>)}
              </select>
            </div>
            <div className="filter-field">
              <label htmlFor="priorityFilter">优先级</label>
              <select id="priorityFilter" value={priority} onChange={event => setPriority(event.target.value)}>
                <option value="">全部优先级</option>
                {priorityOptions.map(item => <option key={item} value={item}>{item}</option>)}
              </select>
            </div>
            <div className="date-filters">
              <div className="filter-field">
                <label htmlFor="dateFrom">Created from</label>
                <input id="dateFrom" type="date" value={dateFrom} onChange={event => setDateFrom(event.target.value)} />
              </div>
              <div className="filter-field">
                <label htmlFor="dateTo">Created to</label>
                <input id="dateTo" type="date" value={dateTo} onChange={event => setDateTo(event.target.value)} />
              </div>
            </div>
            <div className="filter-checks">
              <label className="check-label"><input type="checkbox" checked={unfinishedOnly} onChange={event => setUnfinishedOnly(event.target.checked)} /> Show only unfinished tasks</label>
              <label className="check-label"><input type="checkbox" checked={feedbackOnly} onChange={event => setFeedbackOnly(event.target.checked)} /> Show only tasks waiting for feedback</label>
              <label className="check-label"><input type="radio" name="attachmentFilter" checked={attachmentFilter === "has"} onChange={() => setAttachmentFilter("has")} /> Has attachments</label>
              <label className="check-label"><input type="radio" name="attachmentFilter" checked={attachmentFilter === "none"} onChange={() => setAttachmentFilter("none")} /> No attachments</label>
              {attachmentFilter && <button type="button" className="btn btn-secondary" onClick={() => setAttachmentFilter("")}>Clear file filter</button>}
            </div>
            <div className="sort-controls">
              <div className="filter-field">
                <label htmlFor="sortBy">Sort by</label>
                <select id="sortBy" value={sortBy} onChange={event => setSortBy(event.target.value)}>
                  <option value="createdAt">Created date</option>
                  <option value="deadline">Due date</option>
                  <option value="updatedAt">Last updated</option>
                  <option value="status">Status</option>
                  <option value="priority">优先级</option>
                </select>
              </div>
              <button className="btn btn-secondary sort-direction" onClick={() => setSortDirection(current => current === "asc" ? "desc" : "asc")}>{sortDirection === "asc" ? "Ascending" : "Descending"}</button>
            </div>
          </div>

          <p className="results-summary">Showing {filteredTasks.length} of {tasks.length} tasks</p>

          <div className="task-table-wrap">
            <table className="task-table">
              <thead><tr><th>Title</th><th>Status</th><th>Project / Category</th><th>Task source</th><th>优先级</th><th>Files</th><th>Next</th><th>Feedback</th><th>Created date</th><th>Due date</th><th>Last updated</th><th>Final result / summary</th></tr></thead>
              <tbody>
                {filteredTasks.map(task => (
                  <tr key={task.id} tabIndex="0" onClick={() => onOpen(task)} onKeyDown={event => openFromKeyboard(event, task)}>
                    <td className="table-title">{task.title}</td>
                    <td>{statusTitle(task.status)}</td>
                    <td>{task.project || "—"}</td>
                    <td>{task.source || "—"}</td>
                    <td><span className={`pill ${priorityClass(task.priority)}`}>{normalizePriority(task.priority) || "优先级3"}</span></td>
                    <td>{attachmentCount(task)}</td>
                    <td>{normalizeNextActions(task.nextActions, task.nextAction).length}</td>
                    <td>{normalizeFeedbackItems(task.feedbackItems, task.feedbackRecords).length}</td>
                    <td>{formatDate(createdDate(task))}</td>
                    <td>{formatDate(task.deadline)}</td>
                    <td>{formatDate(task.updatedAt, true)}</td>
                    <td><span className="table-summary">{task.finalResult || "—"}</span></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          <div className="mobile-task-list">
            {filteredTasks.map(task => (
              <article key={task.id} className="mobile-task-card" tabIndex="0" onClick={() => onOpen(task)} onKeyDown={event => openFromKeyboard(event, task)}>
                <h3>{task.title}</h3>
                <div className="mobile-task-meta">
                  <span className="pill">{statusTitle(task.status)}</span>
                  <span className={`pill ${priorityClass(task.priority)}`}>{normalizePriority(task.priority) || "优先级3"}</span>
                  {task.project && <span className="pill">{task.project}</span>}
                  {attachmentCount(task) > 0 && <span className="pill">{attachmentCount(task)} file{attachmentCount(task) === 1 ? "" : "s"}</span>}
                  {normalizeNextActions(task.nextActions, task.nextAction).length > 0 && <span className="pill">{normalizeNextActions(task.nextActions, task.nextAction).length} next</span>}
                </div>
                {task.source && <p><strong>From:</strong> {task.source}</p>}
                <p><strong>Created:</strong> {formatDate(createdDate(task))} · <strong>Due:</strong> {formatDate(task.deadline)}</p>
                <p><strong>Updated:</strong> {formatDate(task.updatedAt, true)}</p>
                {task.finalResult && <p><strong>Result:</strong> {task.finalResult}</p>}
              </article>
            ))}
          </div>
        </main>
      );
    }

    function App() {
      const [tasks, setTasks] = useState([]);
      const [editing, setEditing] = useState(null);
      const [isNew, setIsNew] = useState(false);
      const [dragOver, setDragOver] = useState(null);
      const [services, setServices] = useState(window.firebaseServices || null);
      const [user, setUser] = useState(null);
      const [authReady, setAuthReady] = useState(false);
      const [remoteReady, setRemoteReady] = useState(false);
      const [syncStatus, setSyncStatus] = useState("Not signed in");
      const [message, setMessage] = useState("");
      const [localTasks, setLocalTasks] = useState(loadLocalTasks);
      const [view, setView] = useState("kanban");
      const [aiSettings, setAISettings] = useState(loadAISettings);
      const [showAISettings, setShowAISettings] = useState(false);
      const [quickEntryStart, setQuickEntryStart] = useState(false);
      const draggedId = useRef(null);

      useEffect(() => {
        if (window.firebaseServices) {
          setServices(window.firebaseServices);
          return;
        }
        const ready = () => setServices(window.firebaseServices);
        window.addEventListener("firebase-ready", ready);
        return () => window.removeEventListener("firebase-ready", ready);
      }, []);

      useEffect(() => {
        if (!services) return;
        if (!services.configured) {
          setAuthReady(true);
          setSyncStatus("Not signed in");
          return;
        }
        return services.onAuthStateChanged(
          services.auth,
          nextUser => {
            setUser(nextUser);
            setAuthReady(true);
            setMessage("");
          },
          error => {
            console.error("Authentication listener failed", error);
            setAuthReady(true);
            setSyncStatus("Sync failed");
            setMessage("Could not check your sign-in. Please refresh and try again.");
          }
        );
      }, [services]);

      useEffect(() => {
        setRemoteReady(false);
        if (!services?.configured || !user) {
          setTasks([]);
          setSyncStatus("Not signed in");
          return;
        }

        const cached = loadCache(user.uid);
        if (cached.length) setTasks(cached);
        setSyncStatus("Syncing");
        const tasksCollection = services.collection(services.db, "users", user.uid, "tasks");
        const unsubscribe = services.onSnapshot(
          tasksCollection,
          { includeMetadataChanges: true },
          snapshot => {
            const nextTasks = snapshot.docs
              .map(item => normalizeTask({ ...item.data(), id: item.id }))
              .sort((a, b) => {
                const columnDifference = COLUMNS.findIndex(column => column.id === a.status) - COLUMNS.findIndex(column => column.id === b.status);
                return columnDifference || a.order - b.order || a.title.localeCompare(b.title);
              });
            setTasks(nextTasks);
            saveCache(user.uid, nextTasks);
            setRemoteReady(true);
            setSyncStatus(snapshot.metadata.hasPendingWrites ? "Syncing" : "Synced");
          },
          error => {
            console.error("Task sync failed", error);
            setRemoteReady(true);
            setSyncStatus("Sync failed");
            setMessage("Tasks could not sync. Check your connection and Firebase setup.");
          }
        );
        return unsubscribe;
      }, [services, user]);

      const tasksCollection = () => services.collection(services.db, "users", user.uid, "tasks");

      const writeTask = async (task, isNewRecord = false) => {
        if (!services?.configured || !user) return false;
        setSyncStatus("Syncing");
        setMessage("");
        try {
          await services.setDoc(
            services.doc(tasksCollection(), task.id),
            taskForFirestore(task, services.serverTimestamp(), isNewRecord),
            { merge: true }
          );
          return true;
        } catch (error) {
          console.error("Could not save task", error);
          setSyncStatus("Sync failed");
          setMessage("This task could not be saved. Check your connection and try again.");
          return false;
        }
      };

      const saveAttachmentRecord = async (task, isNewRecord = false) => {
        if (!services?.configured || !user) throw new Error("Please sign in before saving attachment links.");
        const updatedTask = normalizeTask({
          ...task,
          attachments: Array.isArray(task.attachments) ? task.attachments.map(normalizeAttachment) : []
        });
        const saved = await writeTask(updatedTask, isNewRecord);
        if (!saved) throw new Error("The attachment record could not be saved. Please check your connection and try again.");
        setEditing(updatedTask);
        if (isNewRecord) setIsNew(false);
        return updatedTask;
      };

      const signIn = async () => {
        if (!services?.configured) return;
        setMessage("");
        try {
          const provider = new services.GoogleAuthProvider();
          provider.setCustomParameters({ prompt: "select_account" });
          await services.signInWithPopup(services.auth, provider);
        } catch (error) {
          console.error("Google sign-in failed", error);
          setMessage(error.code === "auth/popup-blocked"
            ? "The sign-in window was blocked. Allow pop-ups for this page and try again."
            : "Google sign-in failed. Check the Firebase authorized domains and try again.");
        }
      };

      const logOut = async () => {
        setSyncStatus("Syncing");
        try {
          await services.signOut(services.auth);
        } catch (error) {
          console.error("Sign out failed", error);
          setSyncStatus("Sync failed");
          setMessage("Could not sign out. Please try again.");
        }
      };

      const openNew = (status, smart = false) => { setEditing(blankTask(status)); setIsNew(true); setQuickEntryStart(smart); };
      const openExisting = task => { setEditing({ ...task }); setIsNew(false); setQuickEntryStart(false); };
      const saveTask = async task => {
        const previous = tasks.find(item => item.id === task.id);
        if (isNew || (previous && previous.status !== task.status)) {
          const columnOrders = tasks.filter(item => item.status === task.status).map(item => item.order || 0);
          task.order = (columnOrders.length ? Math.max(...columnOrders) : 0) + 1;
        }
        if (await writeTask(task, isNew)) setEditing(null);
      };
      const deleteTask = async id => {
        if (!window.confirm("Delete this task? This cannot be undone.")) return;
        setSyncStatus("Syncing");
        setMessage("");
        try {
          await services.deleteDoc(services.doc(tasksCollection(), id));
          setEditing(null);
        } catch (error) {
          console.error("Could not delete task", error);
          setSyncStatus("Sync failed");
          setMessage("This task could not be deleted. Check your connection and try again.");
        }
      };
      const startDrag = (event, id) => {
        draggedId.current = id;
        event.currentTarget.classList.add("dragging");
        event.dataTransfer.effectAllowed = "move";
      };
      const endDrag = event => {
        event.currentTarget.classList.remove("dragging");
        draggedId.current = null;
        setDragOver(null);
      };
      const drop = async (event, status) => {
        event.preventDefault();
        const task = tasks.find(item => item.id === draggedId.current);
        if (task && task.status !== status) {
          const columnOrders = tasks.filter(item => item.status === status).map(item => item.order || 0);
          const movedTask = { ...task, status, order: (columnOrders.length ? Math.max(...columnOrders) : 0) + 1 };
          setTasks(current => current.map(item => item.id === movedTask.id ? movedTask : item));
          await writeTask(movedTask);
        }
        setDragOver(null);
      };

      const importLocalTasks = async () => {
        if (!localTasks.length || !user) return;
        setSyncStatus("Syncing");
        setMessage("");
        try {
          for (let start = 0; start < localTasks.length; start += 400) {
            const batch = services.writeBatch(services.db);
            localTasks.slice(start, start + 400).forEach((task, index) => {
              const prepared = { ...normalizeTask(task), order: task.order || start + index + 1 };
              batch.set(
                services.doc(tasksCollection(), prepared.id),
                taskForFirestore(prepared, services.serverTimestamp(), true),
                { merge: true }
              );
            });
            await batch.commit();
          }
          localStorage.removeItem(STORAGE_KEY);
          localStorage.removeItem(LEGACY_KEY);
          setLocalTasks([]);
        } catch (error) {
          console.error("Local task import failed", error);
          setSyncStatus("Sync failed");
          setMessage("Local tasks could not be imported. Nothing was removed; please try again.");
        }
      };

      const activeCount = tasks.filter(task => !["done", "archived"].includes(task.status)).length;
      const doneCount = tasks.filter(task => task.status === "done").length;
      const availablePriorityOptions = uniquePriorityOptions(tasks.map(task => task.priority));

      const statusClass = syncStatus === "Synced" ? "synced" : syncStatus === "Syncing" ? "syncing" : syncStatus === "Sync failed" ? "failed" : "";

      if (!services || !authReady) {
        return <div className="loading-board">Starting Daily Work Tracker…</div>;
      }

      return (
        <>
          <header>
            <div className="brand">
              <h1>Daily Work Tracker</h1>
              <p>Keep the background, progress, feedback, and result of your work in one place.</p>
            </div>
            <div className="header-actions">
              {user && <div className="stats"><span><strong>{activeCount}</strong> active</span><span><strong>{doneCount}</strong> done</span></div>}
              <span className={`sync-status ${statusClass}`}>{syncStatus}</span>
              {user ? (
                <div className="account-area">
                  <span className="account-email" title={user.email}>{user.email}</span>
                  <button className="btn btn-secondary" onClick={logOut}>Sign out</button>
                  <button className="btn btn-secondary" onClick={() => setShowAISettings(true)}>AI Settings</button>
                  <button className="btn btn-secondary" onClick={() => openNew("new", true)}>Smart Quick Entry</button>
                  <button className="btn btn-primary" onClick={() => openNew("new")}>+ New task</button>
                </div>
              ) : (
                <button className="btn btn-primary" onClick={signIn} disabled={!services.configured}>Sign in with Google</button>
              )}
            </div>
          </header>

          {!user ? (
            <main className="welcome-wrap">
              <div className="welcome-card">
                <h2>Your work, available on every device</h2>
                <p>Sign in with the same Google account on your computer and phone. Your tasks will stay private to your account and sync automatically.</p>
                <button className="btn btn-primary" onClick={signIn} disabled={!services.configured}>Sign in with Google</button>
                {!services.configured && <div className="setup-note">Firebase is not configured yet. Replace the placeholder values in <strong>firebaseConfig</strong>, then publish the page again.</div>}
                {message && <div className="error-note">{message}</div>}
              </div>
            </main>
          ) : (
            <>
              {localTasks.length > 0 && (
                <div className="import-banner">
                  <span>{localTasks.length} task{localTasks.length === 1 ? "" : "s"} from the old local-only app were found on this device.</span>
                  <button className="btn btn-secondary" onClick={importLocalTasks}>Import into my account</button>
                </div>
              )}
              {message && <div className="import-banner error-note">{message}</div>}
              {!remoteReady && !tasks.length ? <div className="loading-board">Syncing your tasks…</div> : (
                <>
                  <div className="view-toolbar">
                    <div className="view-switcher" aria-label="Choose task view">
                      <button className={`view-button${view === "kanban" ? " active" : ""}`} onClick={() => setView("kanban")}>Kanban View</button>
                      <button className={`view-button${view === "table" ? " active" : ""}`} onClick={() => setView("table")}>Table View</button>
                    </div>
                  </div>
                  {view === "kanban" ? (
                    <main className="board">
                      {COLUMNS.map(column => (
                        <Column key={column.id} column={column} tasks={tasks.filter(task => task.status === column.id)} onAdd={openNew} onOpen={openExisting} onDelete={deleteTask} onDragStart={startDrag} onDragEnd={endDrag} onDragOver={(event, status) => { event.preventDefault(); setDragOver(status); }} onDrop={drop} isOver={dragOver === column.id} />
                      ))}
                    </main>
                  ) : <TableView tasks={tasks} onOpen={openExisting} />}
                </>
              )}
            </>
          )}
          {editing && <TaskModal task={editing} isNew={isNew} onSave={saveTask} onDelete={deleteTask} onClose={() => setEditing(null)} onSaveAttachmentRecord={saveAttachmentRecord} aiSettings={aiSettings} onOpenAISettings={() => setShowAISettings(true)} quickEntryStart={quickEntryStart} availablePriorityOptions={availablePriorityOptions} />}
          {showAISettings && <AISettingsModal settings={aiSettings} onSave={setAISettings} onClose={() => setShowAISettings(false)} />}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
