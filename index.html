                                <td className="attachment-name">{attachment.type === "local" ? <button type="button" className="attachment-action" onClick={() => openAttachment(attachment)}>{attachment.fileName}</button> : <a href={attachment.fileUrl} target="_blank" rel="noopener noreferrer">{attachment.fileName}</a>}</td>
                                <td>{attachment.type === "local" ? "本机文件" : "云端链接"}</td>
                                <td>{attachment.type === "local" ? (localAvailability[attachment.id] ? "原设备可读取" : "仅原电脑可读取｜当前设备无法下载") : "电脑和手机都可打开"}</td>
                                <td>{attachment.type === "local" ? (localAvailability[attachment.id] ? <button type="button" className="attachment-action" onClick={() => exportLocalAttachmentCopy(attachment)}>导出临时副本</button> : "当前设备无法下载") : <button type="button" className="attachment-action" onClick={() => openAttachment(attachment)}>打开</button>}</td>
                                <td>{attachment.type === "local" ? <button type="button" className="attachment-action" onClick={() => relinkAttachment(attachment)}>重新定位</button> : "—"}</td>
                                <td><button type="button" className="attachment-action danger" onClick={() => deleteAttachment(attachment)}>删除记录</button></td>
                              </tr>
                            )) : (
                              <tr><td colSpan="6">还没有附件记录。</td></tr>
                            )}
                          </tbody>
                        </table>
                      </div>
                      {attachmentMessage && <p className="attachment-message">{attachmentMessage}</p>}
                    </div>
                  )}
                </section>
                <section className="collapsible-section">
                  <button type="button" className="section-toggle" onClick={() => toggleSection("execution")}>
                    <span className="section-title">执行清单 <span className="section-summary">{executionChecklistItems[0]?.text || "把计划、进展、反馈调整合在这里执行"}</span></span>
                    <span>{executionChecklistItems.length} 项</span>
                  </button>
                  {openSections.execution && (
                    <div className="section-content">
                      <div className="structured-table-wrap">
                        <table className="structured-table">
                          <thead><tr><th>序号</th><th>事项/步骤</th><th>状态</th><th>时间/提醒</th><th>耗时</th><th>反馈/调整记录</th><th>相关附件</th><th>删除</th></tr></thead>
                          <tbody>
                            {executionChecklistItems.map((item, index) => (
                              <tr key={item.id || index}>
                                <td data-label="序号" className="structured-index">{index + 1}</td>
                                <td data-label="事项/步骤"><textarea value={item.text} onChange={event => updateExecutionItem(index, "text", event.target.value)} placeholder="填写要执行的事项或步骤" /></td>
                                <td data-label="状态">
                                  <select value={item.status} onChange={event => updateExecutionItem(index, "status", event.target.value)}>
                                    <option>未开始</option><option>进行中</option><option>已完成</option><option>等待反馈</option><option>需调整</option>
                                  </select>
                                </td>
                                <td data-label="时间/提醒">
                                  <div className="time-reminder-cell">
                                    <label>目标时间</label>
                                    <input type="date" value={parseDateExpression(item.dueText) || ""} onChange={event => updateExecutionItem(index, "dueText", event.target.value)} />
                                    <label>提醒时间</label>
                                    <select value={item.reminderAt ? "custom" : "none"} onChange={event => updateExecutionReminderMode(index, event.target.value)}>
                                      <option value="none">不提醒</option>
                                      <option value="custom">选择提醒时间</option>
                                    </select>
                                    {item.reminderAt !== "" && (
                                      <input type="datetime-local" value={datetimeLocalFromReminder(item.reminderAt) || ""} onChange={event => updateExecutionItem(index, "reminderAt", event.target.value)} />
                                    )}
                                    <span className="reminder-display">提醒：{displayReminder(item.reminderAt)}</span>
                                  </div>
                                </td>
                                <td data-label="耗时"><input type="number" min="0" step="0.25" value={item.actualHours || ""} onChange={event => updateExecutionItem(index, "actualHours", event.target.value)} placeholder="未填写" /></td>
                                <td data-label="反馈/调整记录"><textarea value={item.feedbackNote} onChange={event => updateExecutionItem(index, "feedbackNote", event.target.value)} placeholder="记录反馈、调整原因或注意点" /></td>
                                <td data-label="相关附件">{renderRowAttachments(item.attachments, "execution", index)}</td>
                                <td data-label="删除"><button type="button" className="attachment-action danger" onClick={() => deleteExecutionItem(index)}>Delete</button></td>
                              </tr>
                            ))}
                            {!executionChecklistItems.length && <tr><td colSpan="8">还没有执行清单。可以点击添加，或用智能入口拆解任务。</td></tr>}
                          </tbody>
                        </table>
                      </div>
                      <div className="quick-actions"><button type="button" className="btn btn-secondary" onClick={addExecutionItem}>Add checklist row</button></div>
                    </div>
                  )}
                </section>
                <section className="collapsible-section">
                  <button type="button" className="section-toggle" onClick={() => toggleSection("final")}>
                    <span className="section-title">交付结果 <span className="section-summary">{finalSummary}</span></span>
                    <span>{finalResultItems.length}条</span>
                  </button>
                  {openSections.final && (
                    <div className="section-content">
                      <div className="structured-table-wrap">
                        <table className="structured-table">
                          <thead><tr><th>序号</th><th>时间</th><th>结果内容</th><th>相关附件</th><th>删除</th></tr></thead>
                          <tbody>
                            {finalResultItems.map((item, index) => (
                              <tr key={index}>
                                <td className="structured-index">{index + 1}</td>
                                <td><input value={item.createdAt} onChange={event => updateFinalResultItem(index, "createdAt", event.target.value)} placeholder="时间" /></td>
                                <td><textarea value={item.text} onChange={event => updateFinalResultItem(index, "text", event.target.value)} placeholder="填写结果内容" /></td>
                                <td>{renderRowAttachments(item.attachments, "final", index)}</td>
                                <td><button type="button" className="attachment-action danger" onClick={() => deleteFinalResultItem(index)}>Delete</button></td>
                              </tr>
                            ))}
                            {!finalResultItems.length && <tr><td colSpan="5">还没有交付结果。</td></tr>}
                          </tbody>
                        </table>
                      </div>
                      <div className="quick-actions"><button type="button" className="btn btn-secondary" onClick={addFinalResultItem}>Add delivery result</button></div>
                    </div>
                  )}
                </section>
                <section className="collapsible-section">
                  <button type="button" className="section-toggle" onClick={() => toggleSection("review")}>
                    <span className="section-title">复盘小结 <span className="section-summary">{compactSummary(reviewSummaryItems[0]?.text)}</span></span>
                    <span>{reviewSummaryItems.length}条</span>
                  </button>
                  {openSections.review && (
                    <div className="section-content">
                      <div className="structured-table-wrap">
                        <table className="structured-table">
                          <thead><tr><th>序号</th><th>时间</th><th>小结内容</th><th>相关附件</th><th>删除</th></tr></thead>
                          <tbody>
                            {reviewSummaryItems.map((item, index) => (
                              <tr key={index}>
                                <td className="structured-index">{index + 1}</td>
                                <td><input value={item.createdAt} onChange={event => updateReviewItem(index, "createdAt", event.target.value)} placeholder="时间" /></td>
                                <td><textarea value={item.text} onChange={event => updateReviewItem(index, "text", event.target.value)} placeholder="记录经验、复盘、下次改进方式" /></td>
                                <td>{renderRowAttachments(item.attachments, "review", index)}</td>
                                <td><button type="button" className="attachment-action danger" onClick={() => deleteReviewItem(index)}>Delete</button></td>
                              </tr>
                            ))}
                            {!reviewSummaryItems.length && <tr><td colSpan="5">还没有复盘小结。</td></tr>}
                          </tbody>
                        </table>
                      </div>
                      <div className="quick-actions"><button type="button" className="btn btn-secondary" onClick={addReviewItem}>Add review summary</button></div>
                    </div>
                  )}
                </section>
                {form.links && (
                  <section className="collapsible-section">
                    <button type="button" className="section-toggle" onClick={() => toggleSection("legacy")}>旧链接记录 <span>已隐藏</span></button>
                    {openSections.legacy && <div className="section-content"><div className="legacy-links">{form.links}</div></div>}
                  </section>
                )}
                {attachmentDialog && (
                  <div className="attachment-dialog">
                    <div className="attachment-dialog-card">
                      <h3>添加附件</h3>
                      <p className="hint">粘贴 WPS / 飞书 / 网盘链接会保存为云端附件；选择电脑文件会保存为本机附件，不会上传。</p>
                      <label htmlFor="attachmentText">粘贴云端链接或包含文件名的整段文字</label>
                      <textarea id="attachmentText" value={attachmentText} onChange={event => { setAttachmentText(event.target.value); setPendingAttachments([]); }} placeholder={"【金山文档】俄罗斯水槽说明书问题清单\nhttps://www.kdocs.cn/xxxx\n老板反馈截图.png https://feishu.cn/xxxx\nhttps://kdocs.cn/xxxx"} />
                      <div className="quick-actions">
                        <button type="button" className="btn btn-secondary" onClick={prepareAttachmentLinks}>识别链接</button>
                        <button type="button" className="btn btn-secondary" onClick={chooseDialogLocalFiles}>选择本机文件</button>
                        <button type="button" className="btn btn-primary" onClick={saveAttachmentLinks}>添加</button>
                        <button type="button" className="btn btn-secondary" onClick={() => { setAttachmentDialog(null); setAttachmentText(""); setPendingAttachments([]); setSelectedLocalAttachments([]); }}>取消</button>
                      </div>
                      {(pendingAttachments.length > 0 || selectedLocalAttachments.length > 0) && (
                        <div className="structured-table-wrap">
                          <table className="structured-table">
                            <thead><tr><th>文件名</th><th>类型</th><th>说明</th></tr></thead>
                            <tbody>
                              {pendingAttachments.map((attachment, index) => (
                                <tr key={attachment.id}>
                                  <td><input value={attachment.fileName} onChange={event => updatePendingAttachmentName(index, event.target.value)} /></td>
                                  <td>云端链接</td>
                                  <td><span className="table-summary">{attachment.fileUrl}</span></td>
                                </tr>
                              ))}
                              {selectedLocalAttachments.map(attachment => (
                                <tr key={attachment.id}>
                                  <td>{attachment.fileName}</td>
                                  <td>本机文件</td>
                                  <td>只保存记录，不上传文件本体</td>
                                </tr>
                              ))}
                            </tbody>
                          </table>
                        </div>
                      )}
                    </div>
                  </div>
                )}
              </div>
            </div>
            <div className="modal-actions">
              <div>{!isNew && <button type="button" className="btn btn-danger" onClick={() => onDelete(form.id)}>Delete task</button>}</div>
              <div className="action-group">
                <button type="button" className="btn btn-secondary" onClick={onClose}>Cancel</button>
                <button type="submit" className="btn btn-primary">Save task</button>
              </div>
            </div>
          </form>
        </div>
      );
    }

    function TaskCard({ task, onOpen, onDelete, onDragStart, onDragEnd }) {
      return (
        <article className="task-card" draggable onClick={() => onOpen(task)} onDragStart={event => onDragStart(event, task.id)} onDragEnd={onDragEnd}>
          <button className="card-delete" aria-label={`Delete ${task.title}`} onClick={event => { event.stopPropagation(); onDelete(task.id); }}>×</button>
          <h3 className="card-title">{task.title}</h3>
          <div className="card-meta">
            <span className={`pill ${priorityClass(task.priority)}`}>{normalizePriority(task.priority) || "优先级3"}</span>
            {task.project && <span className="pill">{task.project}</span>}
            {attachmentCount(task) > 0 && <span className="pill">{attachmentCount(task)} file{attachmentCount(task) === 1 ? "" : "s"}</span>}
          </div>
          {task.source && <p className="card-line"><strong>From:</strong> {task.source}</p>}
          {task.deadline && <p className="card-line"><strong>Due:</strong> {task.deadline}</p>}
          {normalizeExecutionItems(task.executionItems, task).length > 0 && <p className="card-line"><strong>执行清单:</strong> {normalizeExecutionItems(task.executionItems, task).length}</p>}
        </article>
      );
    }

    function Column({ column, tasks, onAdd, onOpen, onDelete, onDragStart, onDragEnd, onDragOver, onDrop, isOver }) {
      return (
        <section className={`column${isOver ? " drag-over" : ""}`} onDragOver={event => onDragOver(event, column.id)} onDrop={event => onDrop(event, column.id)}>
          <div className="column-header">
            <div className="column-heading">
              <div className="column-title"><span className="column-dot" style={{ background: column.color }}></span>{column.title}</div>
              <div className="column-description">{column.description}</div>
            </div>
            <span className="column-count">{tasks.length}</span>
          </div>
          <div className="card-list">
            {!tasks.length && <div className="empty">No tasks here</div>}
            {tasks.map(task => <TaskCard key={task.id} task={task} onOpen={onOpen} onDelete={onDelete} onDragStart={onDragStart} onDragEnd={onDragEnd} />)}
          </div>
          <button className="add-task" onClick={() => onAdd(column.id)}>+ Add task</button>
        </section>
      );
    }

    function openTaskFromKeyboard(event, task, onOpen) {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        onOpen(task);
      }
    }

    function TableView({ tasks, onOpen }) {
      const [search, setSearch] = useState("");
      const [status, setStatus] = useState("");
      const [project, setProject] = useState("");
      const [priority, setPriority] = useState("");
      const [dateFrom, setDateFrom] = useState("");
      const [dateTo, setDateTo] = useState("");
      const [unfinishedOnly, setUnfinishedOnly] = useState(false);
      const [feedbackOnly, setFeedbackOnly] = useState(false);
      const [attachmentFilter, setAttachmentFilter] = useState("");
      const [sortBy, setSortBy] = useState("updatedAt");
      const [sortDirection, setSortDirection] = useState("desc");

      const projects = useMemo(() => [...new Set(tasks.map(task => task.project.trim()).filter(Boolean))].sort((a, b) => a.localeCompare(b)), [tasks]);
      const priorityOptions = useMemo(() => uniquePriorityOptions(tasks.map(task => task.priority)), [tasks]);

      const filteredTasks = useMemo(() => {
        const keyword = search.trim().toLowerCase();
        const statusOrder = { ...Object.fromEntries(COLUMNS.map((column, index) => [column.id, index])), archived: 99 };
        const valueForSort = task => {
          if (sortBy === "createdAt") return createdDate(task)?.getTime() || 0;
          if (sortBy === "deadline") return toDate(task.deadline)?.getTime() || 0;
          if (sortBy === "updatedAt") return toDate(task.updatedAt)?.getTime() || 0;
          if (sortBy === "status") return statusOrder[task.status] ?? 99;
          if (sortBy === "priority") return priorityRank(task.priority);
          return 0;
        };

        return tasks
          .filter(task => {
            const searchable = [task.title, task.project, task.source, task.background, task.nextAction, task.processNotes, task.feedbackRecords, task.finalResult, task.links].join(" ").toLowerCase();
            const created = dateKey(createdDate(task));
            if (keyword && !searchable.includes(keyword)) return false;
            if (status && task.status !== status) return false;
            if (project && task.project !== project) return false;
            if (priority && task.priority !== priority) return false;
            if (dateFrom && (!created || created < dateFrom)) return false;
            if (dateTo && (!created || created > dateTo)) return false;
            if (unfinishedOnly && ["done", "archived"].includes(task.status)) return false;
            if (feedbackOnly && task.status !== "feedback") return false;
            if (attachmentFilter === "has" && attachmentCount(task) === 0) return false;
            if (attachmentFilter === "none" && attachmentCount(task) > 0) return false;
            return true;
          })
          .sort((a, b) => {
            const first = valueForSort(a);
            const second = valueForSort(b);
            const difference = typeof first === "string" ? first.localeCompare(second) : first - second;
            if (sortBy === "priority") return difference || a.title.localeCompare(b.title);
            return (sortDirection === "asc" ? difference : -difference) || a.title.localeCompare(b.title);
          });
      }, [tasks, search, status, project, priority, dateFrom, dateTo, unfinishedOnly, feedbackOnly, attachmentFilter, sortBy, sortDirection]);

      const openFromKeyboard = (event, task) => openTaskFromKeyboard(event, task, onOpen);

      return (
        <main className="table-view">
          <div className="filters">
            <div className="filter-field">
              <label htmlFor="tableSearch">Search keyword</label>
              <input id="tableSearch" value={search} onChange={event => setSearch(event.target.value)} placeholder="Search titles, notes, feedback, results…" />
            </div>
            <div className="filter-field">
              <label htmlFor="statusFilter">Status</label>
              <select id="statusFilter" value={status} onChange={event => setStatus(event.target.value)}>
                <option value="">All statuses</option>
                {COLUMNS.map(column => <option key={column.id} value={column.id}>{column.title}</option>)}
                <option value="archived">归档</option>
              </select>
            </div>
            <div className="filter-field">
              <label htmlFor="projectFilter">Project / Category</label>
              <select id="projectFilter" value={project} onChange={event => setProject(event.target.value)}>
                <option value="">All projects</option>
                {projects.map(item => <option key={item} value={item}>{item}</option>)}
              </select>
            </div>
            <div className="filter-field">
              <label htmlFor="priorityFilter">优先级</label>
              <select id="priorityFilter" value={priority} onChange={event => setPriority(event.target.value)}>
                <option value="">全部优先级</option>
                {priorityOptions.map(item => <option key={item} value={item}>{item}</option>)}
              </select>
            </div>
            <div className="date-filters">
              <div className="filter-field">
                <label htmlFor="dateFrom">Created from</label>
                <input id="dateFrom" type="date" value={dateFrom} onChange={event => setDateFrom(event.target.value)} />
              </div>
              <div className="filter-field">
                <label htmlFor="dateTo">Created to</label>
                <input id="dateTo" type="date" value={dateTo} onChange={event => setDateTo(event.target.value)} />
              </div>
            </div>
            <div className="filter-checks">
              <label className="check-label"><input type="checkbox" checked={unfinishedOnly} onChange={event => setUnfinishedOnly(event.target.checked)} /> Show only unfinished tasks</label>
              <label className="check-label"><input type="checkbox" checked={feedbackOnly} onChange={event => setFeedbackOnly(event.target.checked)} /> Show only tasks waiting for feedback</label>
              <label className="check-label"><input type="radio" name="attachmentFilter" checked={attachmentFilter === "has"} onChange={() => setAttachmentFilter("has")} /> Has attachments</label>
              <label className="check-label"><input type="radio" name="attachmentFilter" checked={attachmentFilter === "none"} onChange={() => setAttachmentFilter("none")} /> No attachments</label>
              {attachmentFilter && <button type="button" className="btn btn-secondary" onClick={() => setAttachmentFilter("")}>Clear file filter</button>}
            </div>
            <div className="sort-controls">
              <div className="filter-field">
                <label htmlFor="sortBy">Sort by</label>
                <select id="sortBy" value={sortBy} onChange={event => setSortBy(event.target.value)}>
                  <option value="createdAt">Created date</option>
                  <option value="deadline">Due date</option>
                  <option value="updatedAt">Last updated</option>
                  <option value="status">Status</option>
                  <option value="priority">优先级</option>
                </select>
              </div>
              <button className="btn btn-secondary sort-direction" onClick={() => setSortDirection(current => current === "asc" ? "desc" : "asc")}>{sortDirection === "asc" ? "Ascending" : "Descending"}</button>
            </div>
          </div>

          <p className="results-summary">Showing {filteredTasks.length} of {tasks.length} tasks</p>

          <div className="task-table-wrap">
            <table className="task-table">
              <thead><tr><th>Title</th><th>Status</th><th>Project / Category</th><th>Task source</th><th>优先级</th><th>Files</th><th>执行清单</th><th>Created date</th><th>Due date</th><th>Last updated</th><th>交付结果 / Summary</th></tr></thead>
              <tbody>
                {filteredTasks.map(task => (
                  <tr key={task.id} tabIndex="0" onClick={() => onOpen(task)} onKeyDown={event => openFromKeyboard(event, task)}>
                    <td className="table-title">{task.title}</td>
                    <td>{statusTitle(task.status)}</td>
                    <td>{task.project || "—"}</td>
                    <td>{task.source || "—"}</td>
                    <td><span className={`pill ${priorityClass(task.priority)}`}>{normalizePriority(task.priority) || "优先级3"}</span></td>
                    <td>{attachmentCount(task)}</td>
                    <td>{normalizeExecutionItems(task.executionItems, task).length}</td>
                    <td>{formatDate(createdDate(task))}</td>
                    <td>{formatDate(task.deadline)}</td>
                    <td>{formatDate(task.updatedAt, true)}</td>
                    <td><span className="table-summary">{task.finalResult || "—"}</span></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          <div className="mobile-task-list">
            {filteredTasks.map(task => (
              <article key={task.id} className="mobile-task-card" tabIndex="0" onClick={() => onOpen(task)} onKeyDown={event => openFromKeyboard(event, task)}>
                <h3>{task.title}</h3>
                <div className="mobile-task-meta">
                  <span className="pill">{statusTitle(task.status)}</span>
                  <span className={`pill ${priorityClass(task.priority)}`}>{normalizePriority(task.priority) || "优先级3"}</span>
                  {task.project && <span className="pill">{task.project}</span>}
                  {attachmentCount(task) > 0 && <span className="pill">{attachmentCount(task)} file{attachmentCount(task) === 1 ? "" : "s"}</span>}
                  {normalizeExecutionItems(task.executionItems, task).length > 0 && <span className="pill">{normalizeExecutionItems(task.executionItems, task).length} checklist</span>}
                </div>
                {task.source && <p><strong>From:</strong> {task.source}</p>}
                <p><strong>Created:</strong> {formatDate(createdDate(task))} · <strong>Due:</strong> {formatDate(task.deadline)}</p>
                <p><strong>Updated:</strong> {formatDate(task.updatedAt, true)}</p>
                {task.finalResult && <p><strong>Result:</strong> {task.finalResult}</p>}
              </article>
            ))}
          </div>
        </main>
      );
    }

    const EXPORT_FIELDS = [
      ["title", "任务标题"], ["project", "项目或类别"], ["source", "任务来源/指派人"],
      ["receivedDate", "收到日期"], ["startDate", "开始日期"], ["deadline", "完成日期 / 最后期限"],
      ["reminderAt", "提醒时间"], ["priority", "优先级"], ["status", "当前进展"],
      ["workCycle", "工作周期（天）"], ["actualHours", "实际耗时（小时）"],
      ["executionText", "执行清单"], ["executionStatus", "执行清单状态"],
      ["executionDue", "执行清单目标时间"], ["executionReminder", "执行清单提醒时间"],
      ["executionHours", "执行清单耗时"], ["feedbackNotes", "反馈/调整记录"],
      ["attachments", "附件"], ["finalResults", "交付成果"], ["reviewItems", "复盘小结"],
      ["createdAt", "创建时间"], ["updatedAt", "更新时间"]
    ];
    const DEFAULT_EXPORT_FIELDS = ["title", "project", "status", "startDate", "deadline", "actualHours", "executionText", "finalResults", "reviewItems"];

    function dateForBasis(task, basis) {
      if (basis === "receivedDate") return toDate(task.receivedDate);
      if (basis === "startDate") return toDate(task.startDate);
      if (basis === "deadline") return toDate(task.deadline);
      return toDate(task.updatedAt) || createdDate(task);
    }

    function currentRange(mode) {
      const now = new Date();
      const start = new Date(now);
      const end = new Date(now);
      if (mode === "week") {
        const day = now.getDay() || 7;
        start.setDate(now.getDate() - day + 1);
        end.setDate(start.getDate() + 6);
      } else if (mode === "month") {
        start.setDate(1);
        end.setMonth(now.getMonth() + 1, 0);
      } else if (mode === "year") {
        start.setMonth(0, 1);
        end.setMonth(11, 31);
      }
      return { from: dateKey(start), to: dateKey(end) };
    }

    function daysBetween(startValue, endValue) {
      const start = toDate(startValue);
      const end = toDate(endValue);
      if (!start || !end) return null;
      const diff = Math.round((dateKey(end) === dateKey(start) ? 0 : (end - start) / 86400000) + 1);
      return diff > 0 ? diff : null;
    }

    function taskWorkCycle(task) {
      return daysBetween(task.startDate, task.deadline);
    }

    function totalTaskHours(task) {
      const taskHours = hoursNumber(task.actualHours);
      if (taskHours !== null) return taskHours;
      const stepHours = normalizeExecutionItems(task.executionItems, task)
        .map(item => hoursNumber(item.actualHours))
        .filter(value => value !== null);
      return stepHours.length ? stepHours.reduce((sum, value) => sum + value, 0) : null;
    }

    function joinText(values) {
      return values.filter(Boolean).join("\n");
    }

    function exportValue(task, field) {
      const executionItems = normalizeExecutionItems(task.executionItems, task);
      const taskHours = totalTaskHours(task);
      const workCycle = taskWorkCycle(task);
      const describeAttachment = attachment => attachment.type === "local"
        ? `${attachment.fileName}｜本机文件，仅原电脑可用`
        : `${attachment.fileName}${attachment.fileUrl ? `｜${attachment.fileUrl}` : ""}`;
      const attachmentNames = [
        ...(task.attachments || []).map(describeAttachment),
        ...executionItems.flatMap(item => (item.attachments || []).map(file => `${item.text || "执行清单"}：${describeAttachment(file)}`)),
        ...normalizeFinalResults(task.finalResults, task.finalResult).flatMap(item => (item.attachments || []).map(file => `${item.text || "交付成果"}：${describeAttachment(file)}`)),
        ...normalizeReviewItems(task.reviewItems, task).flatMap(item => (item.attachments || []).map(file => `${item.text || "复盘小结"}：${describeAttachment(file)}`))
      ];
      const formattedExecution = executionItems.map((item, index) => {
        const parts = [
          `${index + 1}. ${item.text || "未命名步骤"}`,
          item.status,
          item.dueText && `目标：${formatDate(item.dueText) !== "—" ? dateKey(item.dueText).replace(/-/g, "/") : item.dueText}`,
          item.actualHours && `耗时：${item.actualHours}h`,
          item.feedbackNote && `反馈：${item.feedbackNote}`
        ].filter(Boolean);
        return parts.join("｜");
      });
      const map = {
        title: task.title || "",
        project: task.project || "",
        source: task.source || "",
        receivedDate: task.receivedDate || "",
        startDate: task.startDate || "",
        deadline: task.deadline || "",
        reminderAt: displayReminder(task.reminderAt || task.reminder),
        priority: normalizePriority(task.priority) || "优先级3",
        status: statusTitle(task.status),
        workCycle: workCycle === null ? "未填写" : String(workCycle),
        actualHours: taskHours === null ? "未填写" : String(taskHours),
        executionText: joinText(formattedExecution),
        executionStatus: joinText(executionItems.map(item => `${item.text || "未命名步骤"}：${item.status}`)),
        executionDue: joinText(executionItems.map(item => item.dueText ? `${item.text || "未命名步骤"}：${item.dueText}` : "")),
        executionReminder: joinText(executionItems.map(item => item.reminderAt ? `${item.text || "未命名步骤"}：${displayReminder(item.reminderAt)}` : "")),
        executionHours: joinText(executionItems.map(item => item.actualHours ? `${item.text || "未命名步骤"}：${item.actualHours}` : "")),
        feedbackNotes: joinText(executionItems.map(item => item.feedbackNote)),
        attachments: joinText(attachmentNames),
        finalResults: joinText(normalizeFinalResults(task.finalResults, task.finalResult).map(item => item.text)),
        reviewItems: joinText(normalizeReviewItems(task.reviewItems, task).map(item => item.text)),
        createdAt: formatDate(createdDate(task), true),
        updatedAt: formatDate(task.updatedAt, true)
      };
      return map[field] ?? "";
    }

    function csvCell(value) {
      return `"${String(value ?? "").replace(/"/g, '""')}"`;
    }

    function downloadTextFile(content, fileName, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(url), 30000);
    }

    function exportFileName(rangeMode) {
      const now = new Date();
      if (rangeMode === "week") {
        const firstDay = new Date(now.getFullYear(), 0, 1);
        const week = Math.ceil((((now - firstDay) / 86400000) + firstDay.getDay() + 1) / 7);
        return `工作追踪-周报-${now.getFullYear()}-W${String(week).padStart(2, "0")}`;
      }
      if (rangeMode === "month") return `工作追踪-月报-${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}`;
      if (rangeMode === "year") return `工作追踪-年报-${now.getFullYear()}`;
      return `工作追踪-自定义-${dateKey(now)}`;
    }

    function StatsExportView({ tasks, onOpen, priorityOptions }) {
      const [rangeMode, setRangeMode] = useState("week");
      const defaultRange = currentRange("week");
      const [customFrom, setCustomFrom] = useState(defaultRange.from);
      const [customTo, setCustomTo] = useState(defaultRange.to);
      const [dateBasis, setDateBasis] = useState("updatedAt");
      const [projectFilter, setProjectFilter] = useState("");
      const [statusFilter, setStatusFilter] = useState("");
      const [priorityFilter, setPriorityFilter] = useState("");
      const [search, setSearch] = useState("");
      const [selectedFields, setSelectedFields] = useState(DEFAULT_EXPORT_FIELDS);

      const projectOptions = useMemo(() => [...new Set(tasks.map(task => task.project).filter(Boolean))].sort((a, b) => a.localeCompare(b)), [tasks]);
      const range = rangeMode === "custom" ? { from: customFrom, to: customTo } : currentRange(rangeMode);
      const filteredTasks = useMemo(() => {
        const fromTime = range.from ? toDate(range.from)?.getTime() : null;
        const toTime = range.to ? toDate(range.to)?.getTime() + 86399999 : null;
        const keyword = search.trim().toLowerCase();
        return tasks.filter(task => {
          const basisDate = dateForBasis(task, dateBasis);
          if (fromTime && (!basisDate || basisDate.getTime() < fromTime)) return false;
          if (toTime && (!basisDate || basisDate.getTime() > toTime)) return false;
          if (projectFilter && task.project !== projectFilter) return false;
          if (statusFilter && task.status !== statusFilter) return false;
          if (priorityFilter && normalizePriority(task.priority) !== priorityFilter) return false;
          if (keyword) {
            const haystack = [
              task.title, task.project, task.source,
              ...normalizeExecutionItems(task.executionItems, task).map(item => `${item.text} ${item.feedbackNote}`),
              ...normalizeFinalResults(task.finalResults, task.finalResult).map(item => item.text),
              ...normalizeReviewItems(task.reviewItems, task).map(item => item.text)
            ].join(" ").toLowerCase();
            if (!haystack.includes(keyword)) return false;
          }
          return true;
        });
      }, [tasks, range.from, range.to, dateBasis, projectFilter, statusFilter, priorityFilter, search]);

      const summary = useMemo(() => {
        const completed = filteredTasks.filter(task => task.status === "done").length;
        const inProgress = filteredTasks.filter(task => task.status === "inprogress").length;
        const projects = new Set(filteredTasks.map(task => task.project).filter(Boolean)).size;
        const hourValues = filteredTasks.map(totalTaskHours).filter(value => value !== null);
        const cycleValues = filteredTasks.map(taskWorkCycle).filter(value => value !== null);
        const overdue = filteredTasks.filter(task => task.status !== "done" && task.deadline && dateKey(task.deadline) < today()).length;
        const totalHours = hourValues.reduce((sum, value) => sum + value, 0);
        const totalCycle = cycleValues.reduce((sum, value) => sum + value, 0);
        return {
          total: filteredTasks.length,
          completed,
          inProgress,
          projects,
          totalHours,
          averageHours: hourValues.length ? totalHours / hourValues.length : null,
          overdue,
          totalCycle,
          averageCycle: cycleValues.length ? totalCycle / cycleValues.length : null
        };
      }, [filteredTasks]);

      const projectSummary = useMemo(() => {
        const groups = new Map();
        filteredTasks.forEach(task => {
          const key = task.project || "未分类";
          if (!groups.has(key)) groups.set(key, { project: key, tasks: [], hours: [] });
          const group = groups.get(key);
          group.tasks.push(task);
          const hours = totalTaskHours(task);
          if (hours !== null) group.hours.push(hours);
        });
        return Array.from(groups.values()).map(group => {
          const totalHours = group.hours.reduce((sum, value) => sum + value, 0);
          return {
            project: group.project,
            count: group.tasks.length,
            done: group.tasks.filter(task => task.status === "done").length,
            inprogress: group.tasks.filter(task => task.status === "inprogress").length,
            newCount: group.tasks.filter(task => task.status === "new").length,
            totalHours,
            averageHours: group.hours.length ? totalHours / group.hours.length : null,
            updatedAt: group.tasks.map(task => toDate(task.updatedAt)).filter(Boolean).sort((a, b) => b - a)[0]
          };
        }).sort((a, b) => b.count - a.count || a.project.localeCompare(b.project));
      }, [filteredTasks]);

      const toggleField = key => {
        setSelectedFields(current => current.includes(key) ? current.filter(item => item !== key) : [...current, key]);
      };

      const exportRows = () => {
        const fields = selectedFields.length ? selectedFields : DEFAULT_EXPORT_FIELDS;
        const headers = fields.map(key => EXPORT_FIELDS.find(([field]) => field === key)?.[1] || key);
        return [headers, ...filteredTasks.map(task => fields.map(field => exportValue(task, field)))];
      };

      const exportCSV = () => {
        const csv = "\ufeff" + exportRows().map(row => row.map(csvCell).join(",")).join("\r\n");
        downloadTextFile(csv, `${exportFileName(rangeMode)}.csv`, "text/csv;charset=utf-8");
      };

      const exportExcel = () => {
        const rows = exportRows();
        const html = `\ufeff<html><head><meta charset="UTF-8"></head><body><table>${rows.map((row, index) => `<tr>${row.map(cell => `<${index ? "td" : "th"}>${String(cell ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\n/g, "<br>")}</${index ? "td" : "th"}>`).join("")}</tr>`).join("")}</table></body></html>`;
        downloadTextFile(html, `${exportFileName(rangeMode)}.xls`, "application/vnd.ms-excel;charset=utf-8");
      };

      return (
        <main className="stats-export-view">
          <section className="stats-panel">
            <div className="stats-filter-grid">
              <div className="filter-field">
                <label>时间范围</label>
                <select value={rangeMode} onChange={event => setRangeMode(event.target.value)}>
                  <option value="week">本周</option>
                  <option value="month">本月</option>
                  <option value="year">本年</option>
                  <option value="custom">自定义</option>
                </select>
              </div>
              <div className="filter-field">
                <label>日期依据</label>
                <select value={dateBasis} onChange={event => setDateBasis(event.target.value)}>
                  <option value="receivedDate">收到日期</option>
                  <option value="startDate">开始日期</option>
                  <option value="deadline">完成日期</option>
                  <option value="updatedAt">更新时间</option>
                </select>
              </div>
              {rangeMode === "custom" && (
                <>
                  <div className="filter-field"><label>开始</label><input type="date" value={customFrom} onChange={event => setCustomFrom(event.target.value)} /></div>
                  <div className="filter-field"><label>结束</label><input type="date" value={customTo} onChange={event => setCustomTo(event.target.value)} /></div>
                </>
              )}
              <div className="filter-field">
                <label>项目或类别</label>
                <select value={projectFilter} onChange={event => setProjectFilter(event.target.value)}>
                  <option value="">全部</option>
                  {projectOptions.map(project => <option key={project} value={project}>{project}</option>)}
                </select>
              </div>
              <div className="filter-field">
                <label>状态</label>
                <select value={statusFilter} onChange={event => setStatusFilter(event.target.value)}>
                  <option value="">全部</option>
                  {COLUMNS.map(column => <option key={column.id} value={column.id}>{column.title}</option>)}
                </select>
              </div>
              <div className="filter-field">
                <label>优先级</label>
                <select value={priorityFilter} onChange={event => setPriorityFilter(event.target.value)}>
                  <option value="">全部</option>
                  {priorityOptions.map(priority => <option key={priority} value={priority}>{priority}</option>)}
                </select>
              </div>
              <div className="filter-field full">
                <label>搜索关键词</label>
                <input value={search} onChange={event => setSearch(event.target.value)} placeholder="搜索任务标题、项目、执行清单、交付成果、复盘小结" />
              </div>
            </div>
          </section>

          <section className="summary-cards">
            <div className="summary-card"><span>任务总数</span><strong>{summary.total}</strong></div>
            <div className="summary-card"><span>已完成任务</span><strong>{summary.completed}</strong></div>
            <div className="summary-card"><span>进行中任务</span><strong>{summary.inProgress}</strong></div>
            <div className="summary-card"><span>项目数量</span><strong>{summary.projects}</strong></div>
            <div className="summary-card"><span>实际耗时合计</span><strong>{summary.totalHours ? summary.totalHours.toFixed(1) : "0"} 小时</strong></div>
            <div className="summary-card"><span>平均任务耗时</span><strong>{summary.averageHours === null ? "未填写" : `${summary.averageHours.toFixed(1)} 小时`}</strong></div>
            <div className="summary-card"><span>已逾期任务</span><strong>{summary.overdue}</strong></div>
            <div className="summary-card"><span>工作周期合计 / 平均</span><strong>{summary.totalCycle || 0} 天 / {summary.averageCycle === null ? "未填写" : `${summary.averageCycle.toFixed(1)} 天`}</strong></div>
          </section>

          <section className="stats-section">
            <h2>项目汇总</h2>
            <div className="task-table-wrap">
              <table className="task-table stats-table">
                <thead><tr><th>项目或类别</th><th>任务数</th><th>已完成</th><th>进行中</th><th>收集箱</th><th>实际耗时合计</th><th>平均耗时</th><th>最近更新时间</th></tr></thead>
                <tbody>
                  {projectSummary.map(row => (
                    <tr key={row.project} onClick={() => row.project !== "未分类" && setProjectFilter(row.project)}>
                      <td className="table-title">{row.project}</td>
                      <td>{row.count}</td>
                      <td>{row.done}</td>
                      <td>{row.inprogress}</td>
                      <td>{row.newCount}</td>
                      <td>{row.totalHours ? row.totalHours.toFixed(1) : "0"}</td>
                      <td>{row.averageHours === null ? "未填写" : row.averageHours.toFixed(1)}</td>
                      <td>{formatDate(row.updatedAt, true)}</td>
                    </tr>
                  ))}
                  {!projectSummary.length && <tr><td colSpan="8">当前筛选范围内没有任务。</td></tr>}
                </tbody>
              </table>
            </div>
          </section>

          <section className="stats-section">
            <div className="export-header">
              <div>
                <h2>导出字段</h2>
                <p>只导出当前筛选后的任务和已勾选字段。</p>
              </div>
              <div className="quick-actions">
                <button className="btn btn-secondary" onClick={() => setSelectedFields(DEFAULT_EXPORT_FIELDS)}>周/月报默认字段</button>
                <button className="btn btn-primary" onClick={exportCSV}>导出CSV</button>
                <button className="btn btn-secondary" onClick={exportExcel}>导出Excel</button>
              </div>
            </div>
            <div className="export-field-list">
              {EXPORT_FIELDS.map(([key, label]) => (
                <label key={key} className="check-label"><input type="checkbox" checked={selectedFields.includes(key)} onChange={() => toggleField(key)} /> {label}</label>
              ))}
            </div>
          </section>

          <section className="stats-section">
            <h2>任务导出预览</h2>
            <p className="results-summary">当前预览 {filteredTasks.length} 个任务</p>
            <div className="task-table-wrap">
              <table className="task-table export-preview-table">
                <thead><tr><th>任务标题</th><th>项目或类别</th><th>来源/指派人</th><th>收到日期</th><th>开始日期</th><th>完成日期 / 最后期限</th><th>优先级</th><th>当前进展</th><th>工作周期</th><th>实际耗时</th><th>执行清单摘要</th><th>交付成果摘要</th><th>复盘小结摘要</th></tr></thead>
                <tbody>
                  {filteredTasks.map(task => (
                    <tr key={task.id} tabIndex="0" onClick={() => onOpen(task)} onKeyDown={event => openTaskFromKeyboard(event, task, onOpen)}>
                      <td className="table-title">{task.title}</td>
                      <td>{task.project || "—"}</td>
                      <td>{task.source || "—"}</td>
                      <td>{formatDate(task.receivedDate)}</td>
                      <td>{formatDate(task.startDate)}</td>
                      <td>{formatDate(task.deadline)}</td>
                      <td>{normalizePriority(task.priority) || "优先级3"}</td>
                      <td>{statusTitle(task.status)}</td>
                      <td>{taskWorkCycle(task) === null ? "未填写" : `${taskWorkCycle(task)} 天`}</td>
                      <td>{formatHours(totalTaskHours(task))}</td>
                      <td><span className="table-summary">{joinText(normalizeExecutionItems(task.executionItems, task).map(item => `${item.text}${item.actualHours ? `（${item.actualHours}小时）` : ""}`)) || "—"}</span></td>
                      <td><span className="table-summary">{joinText(normalizeFinalResults(task.finalResults, task.finalResult).map(item => item.text)) || "—"}</span></td>
                      <td><span className="table-summary">{joinText(normalizeReviewItems(task.reviewItems, task).map(item => item.text)) || "—"}</span></td>
                    </tr>
                  ))}
                  {!filteredTasks.length && <tr><td colSpan="13">当前筛选范围内没有任务。</td></tr>}
                </tbody>
              </table>
            </div>
          </section>
        </main>
      );
    }

    function App() {
      const [tasks, setTasks] = useState([]);
      const [editing, setEditing] = useState(null);
      const [isNew, setIsNew] = useState(false);
      const [dragOver, setDragOver] = useState(null);
      const [services, setServices] = useState(window.firebaseServices || null);
      const [user, setUser] = useState(null);
      const [authReady, setAuthReady] = useState(false);
      const [remoteReady, setRemoteReady] = useState(false);
      const [syncStatus, setSyncStatus] = useState("Not signed in");
      const [message, setMessage] = useState("");
      const [emailForm, setEmailForm] = useState({ email: "", password: "" });
      const [emailBusy, setEmailBusy] = useState(false);
      const [localTasks, setLocalTasks] = useState(loadLocalTasks);
      const [view, setView] = useState("kanban");
      const [aiSettings, setAISettings] = useState(loadAISettings);
      const [showAISettings, setShowAISettings] = useState(false);
      const [quickEntryStart, setQuickEntryStart] = useState(false);
      const [installPrompt, setInstallPrompt] = useState(null);
      const [installDismissed, setInstallDismissed] = useState(() => localStorage.getItem("dailyWorkTrackerInstallDismissed") === "yes");
      const draggedId = useRef(null);

      useEffect(() => {
        if (window.firebaseServices) {
          setServices(window.firebaseServices);
          return;
        }
        const ready = () => setServices(window.firebaseServices);
        window.addEventListener("firebase-ready", ready);
        return () => window.removeEventListener("firebase-ready", ready);
      }, []);

      useEffect(() => {
        const handleBeforeInstallPrompt = event => {
          event.preventDefault();
          setInstallPrompt(event);
          setInstallDismissed(false);
        };
        const handleInstalled = () => {
          setInstallPrompt(null);
          setInstallDismissed(true);
          localStorage.setItem("dailyWorkTrackerInstallDismissed", "yes");
        };
        window.addEventListener("beforeinstallprompt", handleBeforeInstallPrompt);
        window.addEventListener("appinstalled", handleInstalled);
        return () => {
          window.removeEventListener("beforeinstallprompt", handleBeforeInstallPrompt);
          window.removeEventListener("appinstalled", handleInstalled);
        };
      }, []);

      useEffect(() => {
        if (!services) return;
        if (!services.configured) {
          setAuthReady(true);
          setSyncStatus("Not signed in");
          return;
        }
        return services.onAuthStateChanged(
          services.auth,
          nextUser => {
            setUser(nextUser);
            setAuthReady(true);
            setMessage("");
          },
          error => {
            console.error("Authentication listener failed", error);
            setAuthReady(true);
            setSyncStatus("Sync failed");
            setMessage("Could not check your sign-in. Please refresh and try again.");
          }
        );
      }, [services]);

      useEffect(() => {
        setRemoteReady(false);
        if (!services?.configured || !user) {
          setTasks([]);
          setSyncStatus("Not signed in");
          return;
        }

        const cached = loadCache(user.uid);
        if (cached.length) setTasks(cached);
        setSyncStatus("Syncing");
        const tasksCollection = services.collection(services.db, "users", user.uid, "tasks");
        const unsubscribe = services.onSnapshot(
          tasksCollection,
          { includeMetadataChanges: true },
          snapshot => {
            const nextTasks = snapshot.docs
              .map(item => normalizeTask({ ...item.data(), id: item.id }))
              .sort((a, b) => {
                const aColumn = COLUMNS.findIndex(column => column.id === a.status);
                const bColumn = COLUMNS.findIndex(column => column.id === b.status);
                const columnDifference = (aColumn === -1 ? 99 : aColumn) - (bColumn === -1 ? 99 : bColumn);
                return columnDifference || a.order - b.order || a.title.localeCompare(b.title);
              });
            setTasks(nextTasks);
            saveCache(user.uid, nextTasks);
            setRemoteReady(true);
            setSyncStatus(snapshot.metadata.hasPendingWrites ? "Syncing" : "Synced");
          },
          error => {
            console.error("Task sync failed", error);
            setRemoteReady(true);
            setSyncStatus("Sync failed");
            setMessage("Tasks could not sync. Check your connection and Firebase setup.");
          }
        );
        return unsubscribe;
      }, [services, user]);

      const tasksCollection = () => services.collection(services.db, "users", user.uid, "tasks");

      const writeTask = async (task, isNewRecord = false) => {
        if (!services?.configured || !user) return false;
        setSyncStatus("Syncing");
        setMessage("");
        try {
          await services.setDoc(
            services.doc(tasksCollection(), task.id),
            taskForFirestore(task, services.serverTimestamp(), isNewRecord),
            { merge: true }
          );
          return true;
        } catch (error) {
          console.error("Could not save task", error);
          setSyncStatus("Sync failed");
          setMessage("This task could not be saved. Check your connection and try again.");
          return false;
        }
      };

      const saveAttachmentRecord = async (task, isNewRecord = false) => {
        if (!services?.configured || !user) throw new Error("Please sign in before saving attachment links.");
        const updatedTask = normalizeTask({
          ...task,
          attachments: Array.isArray(task.attachments) ? task.attachments.map(normalizeAttachment) : []
        });
        const saved = await writeTask(updatedTask, isNewRecord);
        if (!saved) throw new Error("The attachment record could not be saved. Please check your connection and try again.");
        setEditing(updatedTask);
        if (isNewRecord) setIsNew(false);
        return updatedTask;
      };

      const signIn = async () => {
        if (!services?.configured) return;
        setMessage("");
        try {
          const provider = new services.GoogleAuthProvider();
          provider.setCustomParameters({ prompt: "select_account" });
          await services.signInWithPopup(services.auth, provider);
        } catch (error) {
          console.error("Google sign-in failed", error);
          setMessage(error.code === "auth/popup-blocked"
            ? "The sign-in window was blocked. Allow pop-ups for this page and try again."
            : "Google sign-in failed. Check the Firebase authorized domains and try again.");
        }
      };

      const updateEmailForm = event => {
        const { name, value } = event.target;
        setEmailForm(previous => ({ ...previous, [name]: value }));
      };

      const getEmailCredentials = () => {
        const email = emailForm.email.trim();
        const password = emailForm.password;
        if (!email) {
          setMessage("请先输入邮箱地址。");
          return null;
        }
        if (!password) {
          setMessage("请先输入密码。");
          return null;
        }
        if (password.length < 6) {
          setMessage("密码至少需要 6 位。");
          return null;
        }
        return { email, password };
      };

      const signInWithEmail = async event => {
        event?.preventDefault();
        if (!services?.configured || emailBusy) return;
        const credentials = getEmailCredentials();
        if (!credentials) return;
        setEmailBusy(true);
        setMessage("");
        try {
          await services.signInWithEmailAndPassword(services.auth, credentials.email, credentials.password);
        } catch (error) {
          console.error("Email sign-in failed", error);
          setMessage(error.code === "auth/invalid-credential" || error.code === "auth/user-not-found" || error.code === "auth/wrong-password"
            ? "邮箱或密码不正确。如果还没有账号，请先点“注册新账号”。"
            : "邮箱登录失败。请确认 Firebase 已启用“电子邮件/密码”登录方式。");
        } finally {
          setEmailBusy(false);
        }
      };

      const registerWithEmail = async () => {
        if (!services?.configured || emailBusy) return;
        const credentials = getEmailCredentials();
        if (!credentials) return;
        setEmailBusy(true);
        setMessage("");
        try {
          await services.createUserWithEmailAndPassword(services.auth, credentials.email, credentials.password);
        } catch (error) {
          console.error("Email registration failed", error);
          setMessage(error.code === "auth/email-already-in-use"
            ? "这个邮箱已经注册过了，请直接登录，或者使用“忘记密码”。"
            : "注册失败。请确认 Firebase 已启用“电子邮件/密码”登录方式，并检查邮箱格式。");
        } finally {
          setEmailBusy(false);
        }
      };

      const resetEmailPassword = async () => {
        if (!services?.configured || emailBusy) return;
        const email = emailForm.email.trim();
        if (!email) {
          setMessage("请输入邮箱地址后，再点击“忘记密码”。");
          return;
        }
        setEmailBusy(true);
        setMessage("");
        try {
          await services.sendPasswordResetEmail(services.auth, email);
          setMessage("重置密码邮件已发送，请到邮箱里查看。");
        } catch (error) {
          console.error("Password reset failed", error);
          setMessage("重置密码邮件发送失败，请检查邮箱地址，或确认 Firebase 邮箱登录方式已启用。");
        } finally {
          setEmailBusy(false);
        }
      };

      const logOut = async () => {
        setSyncStatus("Syncing");
        try {
          await services.signOut(services.auth);
        } catch (error) {
          console.error("Sign out failed", error);
          setSyncStatus("Sync failed");
          setMessage("Could not sign out. Please try again.");
        }
      };

      const openNew = (status, smart = false) => { setEditing(blankTask(status)); setIsNew(true); setQuickEntryStart(smart); };
      const openExisting = task => { setEditing({ ...task }); setIsNew(false); setQuickEntryStart(false); };
      const saveTask = async task => {
        const previous = tasks.find(item => item.id === task.id);
        if (isNew || (previous && previous.status !== task.status)) {
          const columnOrders = tasks.filter(item => item.status === task.status).map(item => item.order || 0);
          task.order = (columnOrders.length ? Math.max(...columnOrders) : 0) + 1;
        }
        if (await writeTask(task, isNew)) setEditing(null);
      };
      const deleteTask = async id => {
        if (!window.confirm("Delete this task? This cannot be undone.")) return;
        setSyncStatus("Syncing");
        setMessage("");
        try {
          await services.deleteDoc(services.doc(tasksCollection(), id));
          setEditing(null);
        } catch (error) {
          console.error("Could not delete task", error);
          setSyncStatus("Sync failed");
          setMessage("This task could not be deleted. Check your connection and try again.");
        }
      };
      const startDrag = (event, id) => {
        draggedId.current = id;
        event.currentTarget.classList.add("dragging");
        event.dataTransfer.effectAllowed = "move";
      };
      const endDrag = event => {
        event.currentTarget.classList.remove("dragging");
        draggedId.current = null;
        setDragOver(null);
      };
      const drop = async (event, status) => {
        event.preventDefault();
        const task = tasks.find(item => item.id === draggedId.current);
        if (task && task.status !== status) {
          const columnOrders = tasks.filter(item => item.status === status).map(item => item.order || 0);
          const movedTask = { ...task, status, order: (columnOrders.length ? Math.max(...columnOrders) : 0) + 1 };
          setTasks(current => current.map(item => item.id === movedTask.id ? movedTask : item));
          await writeTask(movedTask);
        }
        setDragOver(null);
      };

      const importLocalTasks = async () => {
        if (!localTasks.length || !user) return;
        setSyncStatus("Syncing");
        setMessage("");
        try {
          for (let start = 0; start < localTasks.length; start += 400) {
            const batch = services.writeBatch(services.db);
            localTasks.slice(start, start + 400).forEach((task, index) => {
              const prepared = { ...normalizeTask(task), order: task.order || start + index + 1 };
              batch.set(
                services.doc(tasksCollection(), prepared.id),
                taskForFirestore(prepared, services.serverTimestamp(), true),
                { merge: true }
              );
            });
            await batch.commit();
          }
          localStorage.removeItem(STORAGE_KEY);
          localStorage.removeItem(LEGACY_KEY);
          setLocalTasks([]);
        } catch (error) {
          console.error("Local task import failed", error);
          setSyncStatus("Sync failed");
          setMessage("Local tasks could not be imported. Nothing was removed; please try again.");
        }
      };

      const dismissInstallPrompt = () => {
        setInstallDismissed(true);
        localStorage.setItem("dailyWorkTrackerInstallDismissed", "yes");
      };

      const installApp = async () => {
        if (!installPrompt) return;
        try {
          await installPrompt.prompt();
          await installPrompt.userChoice;
        } catch (error) {
          console.warn("Install prompt failed", error);
        } finally {
          setInstallPrompt(null);
          dismissInstallPrompt();
        }
      };

      const activeCount = tasks.filter(task => !["done", "archived"].includes(task.status)).length;
      const doneCount = tasks.filter(task => task.status === "done").length;
      const availablePriorityOptions = uniquePriorityOptions(tasks.map(task => task.priority));

      const statusClass = syncStatus === "Synced" ? "synced" : syncStatus === "Syncing" ? "syncing" : syncStatus === "Sync failed" ? "failed" : "";
      const standalone = window.matchMedia?.("(display-mode: standalone)")?.matches || window.navigator.standalone === true;
      const isiOSSafari = /iphone|ipad|ipod/i.test(navigator.userAgent) && /safari/i.test(navigator.userAgent) && !/crios|fxios|edgios/i.test(navigator.userAgent);
      const showInstallBanner = !standalone && !installDismissed && (installPrompt || isiOSSafari);

      if (!services || !authReady) {
        return <div className="loading-board">Starting Daily Work Tracker…</div>;
      }

      return (
        <>
          <header>
            <div className="brand">
              <h1>Daily Work Tracker</h1>
              <p>Keep the background, progress, feedback, and result of your work in one place.</p>
            </div>
            <div className="header-actions">
              {user && <div className="stats"><span><strong>{activeCount}</strong> active</span><span><strong>{doneCount}</strong> done</span></div>}
              <span className={`sync-status ${statusClass}`}>{syncStatus}</span>
              {user ? (
                <div className="account-area">
                  <span className="account-email" title={user.email}>{user.email}</span>
                  <button className="btn btn-secondary" onClick={logOut}>Sign out</button>
                  <button className="btn btn-secondary" onClick={() => setShowAISettings(true)}>AI Settings</button>
                  <button className="btn btn-secondary" onClick={() => openNew("new", true)}>智能入口</button>
                  <button className="btn btn-primary" onClick={() => openNew("new")}>+ New task</button>
                </div>
              ) : (
                <button className="btn btn-primary" onClick={signIn} disabled={!services.configured}>Sign in with Google</button>
              )}
            </div>
          </header>

          {showInstallBanner && (
            <div className="install-banner">
              <div>
                <strong>安装为App</strong>
                <span>{installPrompt ? "把每日工作追踪器安装到桌面或手机主屏幕，之后可以像普通 App 一样打开。" : "在 Safari 中点击分享按钮，然后选择“添加到主屏幕”。"}</span>
              </div>
              <div className="install-actions">
                {installPrompt && <button className="btn btn-primary" onClick={installApp}>安装为App</button>}
                <button className="btn btn-secondary" onClick={dismissInstallPrompt}>稍后</button>
              </div>
            </div>
          )}

          {!user ? (
            <main className="welcome-wrap">
              <div className="welcome-card">
                <h2>登录每日工作追踪器</h2>
                <p>可以使用普通邮箱注册 / 登录，也可以继续使用 Google 登录。任务会同步到你自己的账号下。</p>
                <form className="email-auth-form" onSubmit={signInWithEmail}>
                  <div className="field">
                    <label htmlFor="loginEmail">邮箱</label>
                    <input
                      id="loginEmail"
                      name="email"
                      type="email"
                      value={emailForm.email}
                      onChange={updateEmailForm}
                      placeholder="例如：name@qq.com"
                      autoComplete="email"
                      disabled={!services.configured || emailBusy}
                    />
                  </div>
                  <div className="field">
                    <label htmlFor="loginPassword">密码</label>
                    <input
                      id="loginPassword"
                      name="password"
                      type="password"
                      value={emailForm.password}
                      onChange={updateEmailForm}
                      placeholder="至少 6 位"
                      autoComplete="current-password"
                      disabled={!services.configured || emailBusy}
                    />
                  </div>
                  <div className="email-auth-actions">
                    <button className="btn btn-primary" type="submit" disabled={!services.configured || emailBusy}>{emailBusy ? "处理中…" : "邮箱登录"}</button>
                    <button className="btn btn-secondary" type="button" onClick={registerWithEmail} disabled={!services.configured || emailBusy}>注册新账号</button>
                    <button className="btn btn-secondary" type="button" onClick={resetEmailPassword} disabled={!services.configured || emailBusy}>忘记密码</button>
                  </div>
                </form>
                <div className="auth-divider">或</div>
                <button className="btn btn-secondary" onClick={signIn} disabled={!services.configured || emailBusy}>使用 Google 登录</button>
                {!services.configured && <div className="setup-note">Firebase is not configured yet. Replace the placeholder values in <strong>firebaseConfig</strong>, then publish the page again.</div>}
                {message && <div className="error-note">{message}</div>}
              </div>
            </main>
          ) : (
            <>
              {localTasks.length > 0 && (
                <div className="import-banner">
                  <span>{localTasks.length} task{localTasks.length === 1 ? "" : "s"} from the old local-only app were found on this device.</span>
                  <button className="btn btn-secondary" onClick={importLocalTasks}>Import into my account</button>
                </div>
              )}
              {message && <div className="import-banner error-note">{message}</div>}
              {!remoteReady && !tasks.length ? <div className="loading-board">Syncing your tasks…</div> : (
                <>
                  <div className="view-toolbar">
                    <div className="view-switcher" aria-label="Choose task view">
                      <button className={`view-button${view === "kanban" ? " active" : ""}`} onClick={() => setView("kanban")}>看板视图</button>
                      <button className={`view-button${view === "table" ? " active" : ""}`} onClick={() => setView("table")}>表格视图</button>
                      <button className={`view-button${view === "stats" ? " active" : ""}`} onClick={() => setView("stats")}>统计导出</button>
                    </div>
                  </div>
                  {view === "kanban" ? (
                    <main className="board">
                      {COLUMNS.map(column => (
                        <Column key={column.id} column={column} tasks={tasks.filter(task => task.status === column.id)} onAdd={openNew} onOpen={openExisting} onDelete={deleteTask} onDragStart={startDrag} onDragEnd={endDrag} onDragOver={(event, status) => { event.preventDefault(); setDragOver(status); }} onDrop={drop} isOver={dragOver === column.id} />
                      ))}
                    </main>
                  ) : view === "table" ? <TableView tasks={tasks} onOpen={openExisting} /> : <StatsExportView tasks={tasks} onOpen={openExisting} priorityOptions={availablePriorityOptions} />}
                </>
              )}
            </>
          )}
          {editing && <TaskModal task={editing} isNew={isNew} onSave={saveTask} onDelete={deleteTask} onClose={() => setEditing(null)} onSaveAttachmentRecord={saveAttachmentRecord} aiSettings={aiSettings} onOpenAISettings={() => setShowAISettings(true)} quickEntryStart={quickEntryStart} availablePriorityOptions={availablePriorityOptions} />}
          {showAISettings && <AISettingsModal settings={aiSettings} onSave={setAISettings} onClose={() => setShowAISettings(false)} />}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
