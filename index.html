      const addReviewItem = () => setForm(current => ({ ...current, reviewItems: [...normalizeReviewItems(current.reviewItems, current), { id: makeRowId("review"), text: "", createdAt: todayTimeText(), attachments: [] }] }));
      const deleteReviewItem = index => {
        const reviewItems = normalizeReviewItems(form.reviewItems, form, true).filter((_, itemIndex) => itemIndex !== index);
        setForm({ ...form, reviewItems });
      };

      const setTaskReminderMode = value => {
        if (value === "none") setForm(current => ({ ...current, reminderAt: "", reminder: NO_REMINDER }));
        else setForm(current => {
          const nextReminderAt = current.reminderAt || `${today()}T09:00`;
          return { ...current, reminderAt: nextReminderAt, reminder: displayReminder(nextReminderAt) };
        });
      };

      const setTaskReminderAt = value => {
        setForm(current => ({ ...current, reminderAt: value, reminder: value ? displayReminder(value) : NO_REMINDER }));
      };

      const deleteRowAttachment = (section, rowIndex, attachmentId) => {
        if (!window.confirm("只会删除这个记录里的附件记录，不会删除云端或本地原文件。确定删除吗？")) return;
        if (section === "feedback") {
          const feedbackItems = normalizeFeedbackItems(form.feedbackItems, "", true);
          feedbackItems[rowIndex] = { ...feedbackItems[rowIndex], attachments: (feedbackItems[rowIndex]?.attachments || []).filter(item => item.id !== attachmentId) };
          setForm({ ...form, feedbackItems, feedbackRecords: feedbackItemsToText(feedbackItems) });
        }
        if (section === "execution") {
          const executionItems = normalizeExecutionItems(form.executionItems, form, true);
          executionItems[rowIndex] = { ...executionItems[rowIndex], attachments: (executionItems[rowIndex]?.attachments || []).filter(item => item.id !== attachmentId) };
          setForm({ ...form, executionItems });
        }
        if (section === "process") {
          const processItems = normalizeProcessItems(form.processItems, "", true);
          processItems[rowIndex] = { ...processItems[rowIndex], attachments: (processItems[rowIndex]?.attachments || []).filter(item => item.id !== attachmentId) };
          setForm({ ...form, processItems, processNotes: processItemsToText(processItems) });
        }
        if (section === "final") {
          const finalResults = normalizeFinalResults(form.finalResults, "", true);
          finalResults[rowIndex] = { ...finalResults[rowIndex], attachments: (finalResults[rowIndex]?.attachments || []).filter(item => item.id !== attachmentId) };
          setForm({ ...form, finalResults, finalResult: finalResultsToText(finalResults) });
        }
        if (section === "review") {
          const reviewItems = normalizeReviewItems(form.reviewItems, form, true);
          reviewItems[rowIndex] = { ...reviewItems[rowIndex], attachments: (reviewItems[rowIndex]?.attachments || []).filter(item => item.id !== attachmentId) };
          setForm({ ...form, reviewItems });
        }
      };

      const renderRowAttachments = (items, section, rowIndex) => (
        <div className="row-attachments">
          <div className="quick-actions">
            <button type="button" className="btn btn-secondary row-attachment-button" onClick={() => openAttachmentDialog(section, rowIndex)}>添加附件</button>
          </div>
          <div className="row-attachment-list">
            {(items || []).length ? (items || []).map(attachment => (
              <span key={attachment.id} className="row-attachment-link">
                {attachment.type === "local" ? <button type="button" className="attachment-action" onClick={() => openAttachment(attachment)}>{attachment.fileName}</button> : <a href={attachment.fileUrl} target="_blank" rel="noopener noreferrer">{attachment.fileName}</a>}
                <span>{attachment.type === "local" ? (localAvailability[attachment.id] ? "本机文件｜原设备可读取" : "本机文件｜仅原电脑可读取｜当前设备无法下载") : "云端链接"}</span>
                {attachment.type === "local" && <button type="button" className="attachment-action" onClick={() => relinkAttachment(attachment, section, rowIndex)}>重新定位</button>}
                {attachment.type === "local" && localAvailability[attachment.id] && <button type="button" className="attachment-action" onClick={() => exportLocalAttachmentCopy(attachment)}>导出临时副本</button>}
                <button type="button" className="attachment-action danger" onClick={() => deleteRowAttachment(section, rowIndex, attachment.id)}>删除记录</button>
              </span>
            )) : <span className="row-attachment-empty">暂无步骤附件</span>}
          </div>
        </div>
      );

      return (
        <div className="modal-backdrop" onMouseDown={event => event.target === event.currentTarget && onClose()}>
          <form className={`modal${expanded ? " modal-expanded" : ""}`} onSubmit={submit}>
            <div className="modal-header">
              <div>
                <h2>{isNew ? "添加工作任务" : "任务详情"}</h2>
                <p>先记录当前有用的信息，后续可以继续补充细节。</p>
              </div>
              <div className="modal-header-actions">
                <button type="button" className="btn btn-secondary" onClick={() => setExpanded(current => !current)}>{expanded ? "退出全屏" : "全屏编辑"}</button>
                <button type="button" className="close-button" aria-label="关闭" onClick={onClose}>×</button>
              </div>
            </div>
            <div className="form-body">
              <div className="form-grid">
                {isNew && (
                  <section className="quick-entry">
                    <h3>智能入口</h3>
                    <p className="quick-entry-intro">新建任务：输入一句话，自动填写任务信息。解析内容不会保存，直到你点击“保存任务”。</p>
                    <textarea ref={quickEntryRef} value={quickText} onChange={event => setQuickText(event.target.value)} placeholder="例如：我今天收到了我老板给我的市场规划作业 / 苗让我做俄罗斯市场规划，周五前给他 / 客户让我确认包装文案" />
                    <div className="quick-actions">
                      <button type="button" className="btn btn-primary" onClick={parseWithAI} disabled={parsing}>{parsing ? "AI解析中…" : "AI解析"}</button>
                      <button type="button" className="btn btn-secondary" onClick={parseWithRules}>规则解析</button>
                      <button type="button" className={`btn btn-secondary${listening ? " mic-active" : ""}`} onClick={startDictation}>{listening ? "正在听…" : "语音输入"}</button>
                      <button type="button" className="btn btn-secondary" onClick={clearQuickEntry}>清空</button>
                      <button type="button" className="btn btn-secondary" onClick={onOpenAISettings}>AI设置</button>
                    </div>
                    {parseMessage && <p className="parse-message">{parseMessage}</p>}
                    {parsedResult && (
                      <div className="parsed-preview">
                        <h4>解析结果预览 · {parseMode || "解析模式未确定"}</h4>
                        <div className="preview-grid">
                          {PARSED_FIELDS.filter(([key]) => parsedResult[key]).map(([key, label]) => (
                            <div className="preview-item" key={key}><strong>{label}:</strong> {key === "status" ? statusTitle(parsedResult[key]) : key === "reminder" ? displayReminder(parsedResult[key]) : parsedResult[key]}</div>
                          ))}
                          {parsedResult.executionItems?.map((item, index) => (
                            <div className="preview-item" key={`exec-${index}`}><strong>执行清单:</strong> {item.text}｜{item.status}{item.startedAt ? `｜启动：${item.startedAt.replace("T", " ")}` : ""}{item.endedAt ? `｜结束：${item.endedAt.replace("T", " ")}` : ""}{item.actualHours ? `｜耗时：${formatHours(item.actualHours)}` : ""}{item.feedbackNote ? `｜${item.feedbackNote}` : ""}</div>
                          ))}
                          {parsedResult.reviewSummary && <div className="preview-item"><strong>复盘小结:</strong> {parsedResult.reviewSummary}</div>}
                          {!PARSED_FIELDS.some(([key]) => parsedResult[key]) && !parsedResult.executionItems?.length && !parsedResult.reviewSummary && <div className="preview-item">暂未识别到任务字段。</div>}
                        </div>
                        <div className="quick-actions">
                          <button type="button" className="btn btn-primary" onClick={applyParsedResult}>应用解析结果</button>
                          {previousForm && <button type="button" className="btn btn-secondary" onClick={undoParsedFill}>撤销解析填充</button>}
                        </div>
                      </div>
                    )}
                  </section>
                )}
                {!isNew && (
                  <section className="smart-update">
                    <h3>智能入口</h3>
                    <p className="smart-update-intro">更新任务：输入开始、完成或反馈内容，会优先关联已有执行项，再更新状态和时间。</p>
                    <textarea value={smartUpdateText} onChange={event => { setSmartUpdateText(event.target.value); setSmartUpdatePreview(null); }} placeholder="例如：完成事项2和3 / 事项2开始，事项3等待反馈 / 剩下的事项全部开始处理 / 我完成了查找目标品类的类型…" />
                    <div className="quick-actions">
                      <button type="button" className="btn btn-secondary" onClick={() => parseSmartUpdateText()}>解析补充</button>
                      <button type="button" className={`btn btn-secondary${smartUpdateListening ? " mic-active" : ""}`} onClick={startSmartUpdateVoice}>{smartUpdateListening ? "正在听…" : "语音补充"}</button>
                      <button type="button" className="btn btn-secondary" onClick={() => { setSmartUpdateText(""); setSmartUpdatePreview(null); setSmartUpdateMessage(""); }}>清空</button>
                    </div>
                    {smartUpdateMessage && <p className="status-message">{smartUpdateMessage}</p>}
                    {smartUpdatePreview && (
                      <div className="smart-preview">
                        <h4>将添加到：</h4>
                        <ul>
                          {smartUpdatePreview.status && <li>当前进展：{statusTitle(smartUpdatePreview.status)}</li>}
                          {smartUpdatePreview.startDate && <li>开始日期：{smartUpdatePreview.startDate}</li>}
                          {smartUpdatePreview.dueDate && <li>完成日期：{smartUpdatePreview.dueDate}</li>}
                          {smartUpdatePreview.reminder && <li>提醒时间：{displayReminder(smartUpdatePreview.reminder)}</li>}
                          {smartUpdatePreview.executionUpdates?.map((item, index) => <li key={`exec-update-${index}`}>执行清单更新：{item.resolvedIndex >= 0 ? `序号${item.resolvedIndex + 1} · ${item.resolvedText}` : (item.text || item.matchText)}｜{item.status}{item.startedAt ? `｜启动：${item.startedAt.replace("T", " ")}` : ""}{item.endedAt ? `｜结束：${item.endedAt.replace("T", " ")}` : ""}{item.actualHours ? `｜耗时：${formatHours(item.actualHours)}` : ""}{item.feedbackNote ? `｜${item.feedbackNote}` : ""}{item.requiresExistingMatch && item.resolvedIndex < 0 ? "｜未找到匹配项，不会自动修改" : ""}</li>)}
                          {smartUpdatePreview.executionItems.map((item, index) => <li key={`exec-${index}`}>执行清单：{item.text || "仅附件"}｜{item.status}{item.startedAt ? `｜启动：${item.startedAt.replace("T", " ")}` : ""}{item.endedAt ? `｜结束：${item.endedAt.replace("T", " ")}` : ""}{item.actualHours ? `｜耗时：${formatHours(item.actualHours)}` : ""}{item.feedbackNote ? `｜${item.feedbackNote}` : ""}</li>)}
                          {smartUpdatePreview.finalResults.map((item, index) => <li key={`final-${index}`}>交付结果：{item.text || "仅附件"}</li>)}
                          {smartUpdatePreview.reviewItems.map((item, index) => <li key={`review-${index}`}>复盘小结：{item.text || "仅附件"}</li>)}
                          {smartUpdatePreview.attachments.length > 0 && <li>相关附件：{smartUpdatePreview.attachments.map(item => item.fileName).join("、")}</li>}
                        </ul>
                        <div className="quick-actions"><button type="button" className="btn btn-primary" onClick={applySmartUpdate}>应用解析结果</button></div>
                      </div>
                    )}
                  </section>
                )}
                <div className="field full">
                  <label htmlFor="title">任务标题 <span className="required">*</span></label>
                  <input id="title" name="title" value={form.title} onChange={change} placeholder="要做什么？" />
                </div>
                <section className="collapsible-section">
                  <button type="button" className="section-toggle" onClick={() => toggleSection("basic")}>
                    <span className="section-title">基础信息 <span className="section-summary">{basicSummary || "项目、来源、日期、优先级和状态"}</span></span>
                    <span>{openSections.basic ? "收起" : "展开"}</span>
                  </button>
                  {openSections.basic && (
                    <div className="section-content">
                      <div className="form-grid">
                        <div className="field">
                          <label htmlFor="project">项目或类别</label>
                          <input id="project" name="project" value={form.project} onChange={change} placeholder="例如：市场规划、包装文案" />
                        </div>
                        <div className="field">
                          <label htmlFor="source">任务来源/指派人</label>
                          <input id="source" name="source" value={form.source} onChange={change} placeholder="例如：老板、客户、苗、自己" />
                        </div>
                        <div className="field">
                          <label htmlFor="receivedDate">收到日期</label>
                          <input id="receivedDate" type="date" name="receivedDate" value={form.receivedDate} onChange={change} />
                        </div>
                        <div className="field">
                          <label htmlFor="startDate">开始日期</label>
                          <input id="startDate" type="date" name="startDate" value={form.startDate || ""} onChange={change} />
                        </div>
                        <div className="field">
                          <label htmlFor="deadline">完成日期 / 最后期限</label>
                          <input id="deadline" type="date" name="deadline" value={form.deadline} onChange={change} />
                        </div>
                        <div className="field">
                          <label htmlFor="actualHours">实际耗时（小时）</label>
                          <input id="actualHours" type="number" min="0" step="0.25" name="actualHours" value={form.actualHours || ""} onChange={change} placeholder="未填写" />
                        </div>
                        <div className="field">
                          <label htmlFor="reminder">提醒时间</label>
                          <div className="reminder-control">
                            <select id="reminder" value={form.reminderAt ? "custom" : "none"} onChange={event => setTaskReminderMode(event.target.value)}>
                              <option value="none">不提醒</option>
                              <option value="custom">选择提醒时间</option>
                            </select>
                            {form.reminderAt !== "" && (
                              <input type="datetime-local" value={form.reminderAt || ""} onChange={event => setTaskReminderAt(event.target.value)} />
                            )}
                            <span className="reminder-display">{displayReminder(form.reminderAt || form.reminder)}</span>
                          </div>
                        </div>
                        <div className="field">
                          <label htmlFor="priority">优先级</label>
                          <select id="priority" name="priority" value={normalizePriority(form.priority) || "优先级3"} onChange={changePriority}>
                            {priorityOptions.map(priority => <option key={priority} value={priority}>{priority}</option>)}
                            <option value={ADD_PRIORITY_OPTION}>+ 新增优先级</option>
                          </select>
                        </div>
                        <div className="field">
                          <label htmlFor="status">当前进展</label>
                          <div className="status-control-row">
                            <select id="status" name="status" value={form.status === "archived" ? "done" : form.status} onChange={change}>
                              {COLUMNS.map(column => <option key={column.id} value={column.id}>{column.title}</option>)}
                            </select>
                          </div>
                          {statusMessage && <p className="status-message">{statusMessage}</p>}
                        </div>
                        <div className="field full">
                          <label>系统日历</label>
                          <div className="quick-actions">
                            <button type="button" className="btn btn-secondary" onClick={() => downloadTaskICS(form)}>下载日历提醒文件(.ics)</button>
                          </div>
                          <p className="hint">将生成标准 .ics 日历文件。下载后可用 Outlook、系统日历或手机日历打开导入；Windows 如未设置默认日历应用，可能只会下载文件。</p>
                        </div>
                      </div>
                    </div>
                  )}
                </section>
                <section className="collapsible-section attachments-section">
                  <button type="button" className="section-toggle" onClick={() => toggleSection("attachments")}>
                    <span className="section-title">附件 <span className="section-summary">附件只保存记录，不保存文件本体。</span></span>
                    <span>{attachmentCount(form)}项</span>
                  </button>
                  {openSections.attachments && (
                    <div className="section-content">
                      <div className="attachments-header">
                        <div><p>云端链接适合跨设备打开。本机文件不上传，只保存本机记录；重新定位不会下载文件，只用于重新选择原文件；导出临时副本会生成下载副本，可能占用下载目录空间。</p></div>
                        <div className="quick-actions">
                          <button type="button" className="btn btn-secondary" onClick={() => openAttachmentDialog("task")}>添加附件</button>
                        </div>
                      </div>
                      <div className="attachments-table-wrap">
                        <table className="attachments-table">
                          <thead>
                            <tr>
                              <th>文件名</th>
                              <th>类型</th>
                              <th>说明</th>
                              <th>操作</th>
                              <th>重新定位</th>
                              <th>删除记录</th>
                            </tr>
                          </thead>
                          <tbody>
                            {attachmentCount(form) ? form.attachments.map(attachment => (
                              <tr key={attachment.id}>
                                <td className="attachment-name">{attachment.type === "local" ? <button type="button" className="attachment-action" onClick={() => openAttachment(attachment)}>{attachment.fileName}</button> : <a href={attachment.fileUrl} target="_blank" rel="noopener noreferrer">{attachment.fileName}</a>}</td>
                                <td>{attachment.type === "local" ? "本机文件" : "云端链接"}</td>
                                <td>{attachment.type === "local" ? (localAvailability[attachment.id] ? "原设备可读取" : "仅原电脑可读取｜当前设备无法下载") : "电脑和手机都可打开"}</td>
                                <td>{attachment.type === "local" ? (localAvailability[attachment.id] ? <button type="button" className="attachment-action" onClick={() => exportLocalAttachmentCopy(attachment)}>导出临时副本</button> : "当前设备无法下载") : <button type="button" className="attachment-action" onClick={() => openAttachment(attachment)}>打开</button>}</td>
                                <td>{attachment.type === "local" ? <button type="button" className="attachment-action" onClick={() => relinkAttachment(attachment)}>重新定位</button> : "—"}</td>
                                <td><button type="button" className="attachment-action danger" onClick={() => deleteAttachment(attachment)}>删除记录</button></td>
                              </tr>
                            )) : (
                              <tr><td colSpan="6">还没有附件记录。</td></tr>
                            )}
                          </tbody>
                        </table>
                      </div>
                      {attachmentMessage && <p className="attachment-message">{attachmentMessage}</p>}
                    </div>
                  )}
                </section>
                <section className="collapsible-section">
                  <button type="button" className="section-toggle" onClick={() => toggleSection("execution")}>
                    <span className="section-title">执行清单 <span className="section-summary">{executionChecklistItems[0]?.text || "把计划、进展、反馈调整合在这里执行"}</span></span>
                    <span>{executionChecklistItems.length} 项</span>
                  </button>
                  {openSections.execution && (
                    <div className="section-content">
                      <div className="structured-table-wrap">
                        <table className="structured-table">
                          <thead><tr><th>序号</th><th>事项/步骤</th><th>状态</th><th>时间段</th><th>自动耗时</th><th>反馈/调整记录</th><th>相关附件</th><th>删除</th></tr></thead>
                          <tbody>
                            {executionChecklistItems.map((item, index) => {
                              const timeKey = item.id || String(index);
                              const hasTimeRange = Boolean(item.startedAt || item.endedAt);
                              return (
                              <tr key={timeKey}>
                                <td data-label="序号" className="structured-index">{index + 1}</td>
                                <td data-label="事项/步骤"><textarea value={item.text} onChange={event => updateExecutionItem(index, "text", event.target.value)} placeholder="填写要执行的事项或步骤" /></td>
                                <td data-label="状态">
                                  <select value={item.status} onChange={event => updateExecutionItem(index, "status", event.target.value)}>
                                    <option>未开始</option><option>进行中</option><option>已完成</option><option>等待反馈</option><option>需调整</option>
                                  </select>
                                </td>
                                <td data-label="时间段">
                                  <div className="time-reminder-cell">
                                    <button type="button" className="time-range-toggle" onClick={() => toggleExecutionTime(timeKey)}>
                                      {openExecutionTimes[timeKey] ? "收起时间段" : (hasTimeRange ? "查看 / 修改时间段" : "设置时间段")}
                                    </button>
                                    {hasTimeRange && !openExecutionTimes[timeKey] && (
                                      <span className="time-range-summary">{displayDateTimeRangeValue(item.startedAt)} → {displayDateTimeRangeValue(item.endedAt)}</span>
                                    )}
                                    {openExecutionTimes[timeKey] && (
                                      <>
                                        <label>启动时间</label>
                                        <input type="datetime-local" value={item.startedAt || ""} onChange={event => updateExecutionItem(index, "startedAt", event.target.value)} />
                                        <label>结束时间</label>
                                        <input type="datetime-local" min={item.startedAt || undefined} value={item.endedAt || ""} onChange={event => updateExecutionItem(index, "endedAt", event.target.value)} />
                                      </>
                                    )}
                                  </div>
                                </td>
                                <td data-label="自动耗时">
                                  <div className="auto-hours">
                                    {formatHours(item.actualHours)}
                                    {!item.actualHours && <small>填写启动和结束时间后自动计算</small>}
                                  </div>
                                </td>
                                <td data-label="反馈/调整记录"><textarea value={item.feedbackNote} onChange={event => updateExecutionItem(index, "feedbackNote", event.target.value)} placeholder="记录反馈、调整原因或注意点" /></td>
                                <td data-label="相关附件">{renderRowAttachments(item.attachments, "execution", index)}</td>
                                <td data-label="删除"><button type="button" className="attachment-action danger" onClick={() => deleteExecutionItem(index)}>删除</button></td>
                              </tr>
                            )})}
                            {!executionChecklistItems.length && <tr><td colSpan="8">还没有执行清单。可以点击添加，或用智能入口拆解任务。</td></tr>}
                          </tbody>
                        </table>
                      </div>
                      <div className="quick-actions"><button type="button" className="btn btn-secondary" onClick={addExecutionItem}>添加执行项</button></div>
                    </div>
                  )}
                </section>
                <section className="collapsible-section">
                  <button type="button" className="section-toggle" onClick={() => toggleSection("final")}>
                    <span className="section-title">交付结果 <span className="section-summary">{finalSummary}</span></span>
                    <span>{finalResultItems.length}条</span>
                  </button>
                  {openSections.final && (
                    <div className="section-content">
                      <div className="structured-table-wrap">
                        <table className="structured-table">
                          <thead><tr><th>序号</th><th>时间</th><th>结果内容</th><th>相关附件</th><th>删除</th></tr></thead>
                          <tbody>
                            {finalResultItems.map((item, index) => (
                              <tr key={index}>
                                <td className="structured-index">{index + 1}</td>
                                <td><input value={item.createdAt} onChange={event => updateFinalResultItem(index, "createdAt", event.target.value)} placeholder="时间" /></td>
                                <td><textarea value={item.text} onChange={event => updateFinalResultItem(index, "text", event.target.value)} placeholder="填写结果内容" /></td>
                                <td>{renderRowAttachments(item.attachments, "final", index)}</td>
                                <td><button type="button" className="attachment-action danger" onClick={() => deleteFinalResultItem(index)}>删除</button></td>
                              </tr>
                            ))}
                            {!finalResultItems.length && <tr><td colSpan="5">还没有交付结果。</td></tr>}
                          </tbody>
                        </table>
                      </div>

    function TableView({ tasks, onOpen }) {
      const [search, setSearch] = useState("");

      const [sortDirection, setSortDirection] = useState("desc");

      const projects = useMemo(() => [...new Set(tasks.map(task => task.project.trim()).filter(Boolean))].sort((a, b) => a.localeCompare(b)), [tasks]);
      const priorityOptions = useMemo(() => uniquePriorityOptions(tasks.map(task => task.priority)), [tasks]);

      const filteredTasks = useMemo(() => {
        const keyword = search.trim().toLowerCase();
        const statusOrder = { ...Object.fromEntries(COLUMNS.map((column, index) => [column.id, index])), archived: 99 };
        const valueForSort = task => {
          if (sortBy === "createdAt") return createdDate(task)?.getTime() || 0;
          if (sortBy === "deadline") return toDate(task.deadline)?.getTime() || 0;
          if (sortBy === "updatedAt") return toDate(task.updatedAt)?.getTime() || 0;
          if (sortBy === "status") return statusOrder[task.status] ?? 99;
          if (sortBy === "priority") return priorityRank(task.priority);
          return 0;
        };

        return tasks
          .filter(task => {
            const searchable = [task.title, task.project, task.source, task.background, task.nextAction, task.processNotes, task.feedbackRecords, task.finalResult, task.links].join(" ").toLowerCase();
            const created = dateKey(createdDate(task));
            if (keyword && !searchable.includes(keyword)) return false;
            if (status && task.status !== status) return false;
            if (project && task.project !== project) return false;
            if (priority && task.priority !== priority) return false;
            if (dateFrom && (!created || created < dateFrom)) return false;
            if (dateTo && (!created || created > dateTo)) return false;
            if (unfinishedOnly && ["done", "archived"].includes(task.status)) return false;
            if (feedbackOnly && task.status !== "feedback") return false;
            if (attachmentFilter === "has" && attachmentCount(task) === 0) return false;
            if (attachmentFilter === "none" && attachmentCount(task) > 0) return false;
            return true;
          })
          .sort((a, b) => {
            const first = valueForSort(a);
            const second = valueForSort(b);
            const difference = typeof first === "string" ? first.localeCompare(second) : first - second;
            if (sortBy === "priority") return difference || a.title.localeCompare(b.title);
            return (sortDirection === "asc" ? difference : -difference) || a.title.localeCompare(b.title);
          });
      }, [tasks, search, status, project, priority, dateFrom, dateTo, unfinishedOnly, feedbackOnly, attachmentFilter, sortBy, sortDirection]);

      const openFromKeyboard = (event, task) => openTaskFromKeyboard(event, task, onOpen);

      return (
        <main className="table-view">

            <div className="filter-field">
              <label htmlFor="tableSearch">搜索关键词</label>
              <input id="tableSearch" value={search} onChange={event => setSearch(event.target.value)} placeholder="搜索标题、记录、反馈、结果…" />
            </div>
            <div className="filter-field">
              <label htmlFor="statusFilter">状态</label>
              <select id="statusFilter" value={status} onChange={event => setStatus(event.target.value)}>
                <option value="">全部状态</option>
                {COLUMNS.map(column => <option key={column.id} value={column.id}>{column.title}</option>)}

            </div>
            <div className="filter-field">
              <label htmlFor="projectFilter">项目或类别</label>

                <option value="">全部项目或类别</option>

            </div>
            <div className="filter-field">
              <label htmlFor="priorityFilter">优先级</label>
              <select id="priorityFilter" value={priority} onChange={event => setPriority(event.target.value)}>
                <option value="">全部优先级</option>
                {priorityOptions.map(item => <option key={item} value={item}>{item}</option>)}
              </select>
            </div>
            <div className="date-filters">
              <div className="filter-field">
                <label htmlFor="dateFrom">创建日期从</label>
                <input id="dateFrom" type="date" value={dateFrom} onChange={event => setDateFrom(event.target.value)} />
              </div>
              <div className="filter-field">
                <label htmlFor="dateTo">创建日期到</label>
                <input id="dateTo" type="date" value={dateTo} onChange={event => setDateTo(event.target.value)} />
              </div>
            </div>
            <div className="filter-checks">
              <label className="check-label"><input type="checkbox" checked={unfinishedOnly} onChange={event => setUnfinishedOnly(event.target.checked)} /> 只看未完成任务</label>
              <label className="check-label"><input type="checkbox" checked={feedbackOnly} onChange={event => setFeedbackOnly(event.target.checked)} /> 只看等待反馈任务</label>
              <label className="check-label"><input type="radio" name="attachmentFilter" checked={attachmentFilter === "has"} onChange={() => setAttachmentFilter("has")} /> 有附件</label>
              <label className="check-label"><input type="radio" name="attachmentFilter" checked={attachmentFilter === "none"} onChange={() => setAttachmentFilter("none")} /> 无附件</label>
              {attachmentFilter && <button type="button" className="btn btn-secondary" onClick={() => setAttachmentFilter("")}>清除附件筛选</button>}
            </div>
            <div className="sort-controls">
              <div className="filter-field">
                <label htmlFor="sortBy">排序方式</label>
                <select id="sortBy" value={sortBy} onChange={event => setSortBy(event.target.value)}>
                  <option value="createdAt">创建日期</option>
                  <option value="deadline">完成期限</option>
                  <option value="updatedAt">最近更新</option>
                  <option value="status">状态</option>
                  <option value="priority">优先级</option>

              </div>
              <button className="btn btn-secondary sort-direction" onClick={() => setSortDirection(current => current === "asc" ? "desc" : "asc")}>{sortDirection === "asc" ? "升序" : "降序"}</button>
            </div>
          </div>

          <p className="results-summary">当前显示 {filteredTasks.length} / {tasks.length} 个任务</p>

          <div className="task-table-wrap">
            <table className="task-table">
              <thead><tr><th>任务标题</th><th>状态</th><th>项目或类别</th><th>任务来源</th><th>优先级</th><th>附件</th><th>执行清单</th><th>创建日期</th><th>完成期限</th><th>最近更新</th><th>交付结果 / 摘要</th></tr></thead>
              <tbody>
                {filteredTasks.map(task => (
                  <tr key={task.id} tabIndex="0" onClick={() => onOpen(task)} onKeyDown={event => openFromKeyboard(event, task)}>
                    <td className="table-title">{task.title}</td>
                    <td>{statusTitle(task.status)}</td>
                    <td>{task.project || "—"}</td>
                    <td>{task.source || "—"}</td>
                    <td><span className={`pill ${priorityClass(task.priority)}`}>{normalizePriority(task.priority) || "优先级3"}</span></td>
                    <td>{attachmentCount(task)}</td>
                    <td>{normalizeExecutionItems(task.executionItems, task).length}</td>
                    <td>{formatDate(createdDate(task))}</td>
                    <td>{formatDate(task.deadline)}</td>
                    <td>{formatDate(task.updatedAt, true)}</td>
                    <td><span className="table-summary">{task.finalResult || "—"}</span></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          <div className="mobile-task-list">
            {filteredTasks.map(task => (
              <article key={task.id} className="mobile-task-card" tabIndex="0" onClick={() => onOpen(task)} onKeyDown={event => openFromKeyboard(event, task)}>
                <h3>{task.title}</h3>
                <div className="mobile-task-meta">
                  <span className="pill">{statusTitle(task.status)}</span>
                  <span className={`pill ${priorityClass(task.priority)}`}>{normalizePriority(task.priority) || "优先级3"}</span>
                  {task.project && <span className="pill">{task.project}</span>}
                  {attachmentCount(task) > 0 && <span className="pill">{attachmentCount(task)} 个附件</span>}
                  {normalizeExecutionItems(task.executionItems, task).length > 0 && <span className="pill">{normalizeExecutionItems(task.executionItems, task).length} 个执行项</span>}
                </div>
                {task.source && <p><strong>来源：</strong> {task.source}</p>}
                <p><strong>创建：</strong> {formatDate(createdDate(task))} · <strong>期限：</strong> {formatDate(task.deadline)}</p>
                <p><strong>更新：</strong> {formatDate(task.updatedAt, true)}</p>
                {task.finalResult && <p><strong>结果：</strong> {task.finalResult}</p>}
              </article>
            ))}
          </div>
        </main>
      );
    }

    const EXPORT_FIELDS = [
      ["title", "任务标题"], ["project", "项目或类别"], ["source", "任务来源/指派人"],
      ["receivedDate", "收到日期"], ["startDate", "开始日期"], ["deadline", "完成日期 / 最后期限"],
      ["reminderAt", "提醒时间"], ["priority", "优先级"], ["status", "当前进展"],
      ["workCycle", "工作周期（天）"], ["actualHours", "实际耗时（小时）"],
      ["executionText", "执行清单"], ["executionStatus", "执行清单状态"],
      ["executionStart", "执行清单启动时间"], ["executionEnd", "执行清单结束时间"],
      ["executionHours", "执行清单耗时"], ["feedbackNotes", "反馈/调整记录"],
      ["attachments", "附件"], ["finalResults", "交付成果"], ["reviewItems", "复盘小结"],
      ["createdAt", "创建时间"], ["updatedAt", "更新时间"]
    ];
    const DEFAULT_EXPORT_FIELDS = ["title", "project", "status", "startDate", "deadline", "actualHours", "executionText", "finalResults", "reviewItems"];

    function dateForBasis(task, basis) {
      if (basis === "receivedDate") return toDate(task.receivedDate);
      if (basis === "startDate") return toDate(task.startDate);
      if (basis === "deadline") return toDate(task.deadline);
      return toDate(task.updatedAt) || createdDate(task);
    }

    function currentRange(mode) {
      const now = new Date();
      const start = new Date(now);
      const end = new Date(now);
      if (mode === "week") {
        const day = now.getDay() || 7;
        start.setDate(now.getDate() - day + 1);
        end.setDate(start.getDate() + 6);
      } else if (mode === "month") {
        start.setDate(1);
        end.setMonth(now.getMonth() + 1, 0);
      } else if (mode === "year") {
        start.setMonth(0, 1);
        end.setMonth(11, 31);
      }
      return { from: dateKey(start), to: dateKey(end) };
    }

    function daysBetween(startValue, endValue) {
      const start = toDate(startValue);
      const end = toDate(endValue);
      if (!start || !end) return null;
      const diff = Math.round((dateKey(end) === dateKey(start) ? 0 : (end - start) / 86400000) + 1);
      return diff > 0 ? diff : null;
    }

    function taskWorkCycle(task) {
      return daysBetween(task.startDate, task.deadline);
    }

    function totalTaskHours(task) {
      const taskHours = hoursNumber(task.actualHours);
      if (taskHours !== null) return taskHours;
      const stepHours = normalizeExecutionItems(task.executionItems, task)
        .map(item => hoursNumber(item.actualHours))
        .filter(value => value !== null);
      return stepHours.length ? stepHours.reduce((sum, value) => sum + value, 0) : null;
    }

    function joinText(values) {
      return values.filter(Boolean).join("\n");
    }

    function exportValue(task, field) {
      const executionItems = normalizeExecutionItems(task.executionItems, task);
      const taskHours = totalTaskHours(task);
      const workCycle = taskWorkCycle(task);
      const describeAttachment = attachment => attachment.type === "local"
        ? `${attachment.fileName}｜本机文件，仅原电脑可用`
        : `${attachment.fileName}${attachment.fileUrl ? `｜${attachment.fileUrl}` : ""}`;
      const attachmentNames = [
        ...(task.attachments || []).map(describeAttachment),
        ...executionItems.flatMap(item => (item.attachments || []).map(file => `${item.text || "执行清单"}：${describeAttachment(file)}`)),
        ...normalizeFinalResults(task.finalResults, task.finalResult).flatMap(item => (item.attachments || []).map(file => `${item.text || "交付成果"}：${describeAttachment(file)}`)),
        ...normalizeReviewItems(task.reviewItems, task).flatMap(item => (item.attachments || []).map(file => `${item.text || "复盘小结"}：${describeAttachment(file)}`))
      ];
      const formattedExecution = executionItems.map((item, index) => {
        const parts = [
          `${index + 1}. ${item.text || "未命名步骤"}`,
          item.status,
          item.startedAt && `启动：${item.startedAt.replace("T", " ")}`,
          item.endedAt && `结束：${item.endedAt.replace("T", " ")}`,
          item.actualHours && `耗时：${item.actualHours}h`,
          item.feedbackNote && `反馈：${item.feedbackNote}`
        ].filter(Boolean);
        return parts.join("｜");
      });
      const map = {
        title: task.title || "",
        project: task.project || "",
        source: task.source || "",
        receivedDate: task.receivedDate || "",
        startDate: task.startDate || "",
        deadline: task.deadline || "",
        reminderAt: displayReminder(task.reminderAt || task.reminder),
        priority: normalizePriority(task.priority) || "优先级3",
        status: statusTitle(task.status),
        workCycle: workCycle === null ? "未填写" : String(workCycle),
        actualHours: taskHours === null ? "未填写" : String(taskHours),
        executionText: joinText(formattedExecution),
        executionStatus: joinText(executionItems.map(item => `${item.text || "未命名步骤"}：${item.status}`)),
        executionStart: joinText(executionItems.map(item => item.startedAt ? `${item.text || "未命名步骤"}：${item.startedAt.replace("T", " ")}` : "")),
        executionEnd: joinText(executionItems.map(item => item.endedAt ? `${item.text || "未命名步骤"}：${item.endedAt.replace("T", " ")}` : "")),
        executionHours: joinText(executionItems.map(item => item.actualHours ? `${item.text || "未命名步骤"}：${item.actualHours}` : "")),
        feedbackNotes: joinText(executionItems.map(item => item.feedbackNote)),
        attachments: joinText(attachmentNames),
        finalResults: joinText(normalizeFinalResults(task.finalResults, task.finalResult).map(item => item.text)),
        reviewItems: joinText(normalizeReviewItems(task.reviewItems, task).map(item => item.text)),
        createdAt: formatDate(createdDate(task), true),
        updatedAt: formatDate(task.updatedAt, true)
      };
      return map[field] ?? "";
    }

    function csvCell(value) {
      return `"${String(value ?? "").replace(/"/g, '""')}"`;
    }

    function downloadTextFile(content, fileName, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(url), 30000);
    }

    function backupDateValue(value) {
      const date = toDate(value);
      return date ? date.toISOString() : (value || null);
    }

    function taskForBackup(task) {
      const normalized = normalizeTask(task);
      return {
        ...normalized,
        createdAt: backupDateValue(normalized.createdAt),
        updatedAt: backupDateValue(normalized.updatedAt)
      };
    }

    function backupFileName() {
      const now = new Date();
      const stamp = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}-${String(now.getDate()).padStart(2, "0")}`;
      return `daily-work-tracker-backup-${stamp}.json`;
    }

    function extractBackupTasks(data) {
      if (Array.isArray(data)) return data;
      if (Array.isArray(data?.tasks)) return data.tasks;
      throw new Error("备份文件里没有找到任务列表。");
    }

    function exportFileName(rangeMode) {
      const now = new Date();
      if (rangeMode === "week") {
        const firstDay = new Date(now.getFullYear(), 0, 1);
        const week = Math.ceil((((now - firstDay) / 86400000) + firstDay.getDay() + 1) / 7);
        return `工作追踪-周报-${now.getFullYear()}-W${String(week).padStart(2, "0")}`;
      }
      if (rangeMode === "month") return `工作追踪-月报-${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}`;
      if (rangeMode === "year") return `工作追踪-年报-${now.getFullYear()}`;
      return `工作追踪-自定义-${dateKey(now)}`;
    }

    function StatsExportView({ tasks, onOpen, priorityOptions, onExportFullBackup, onChooseBackupFile, backupImporting, onBackfillProjectCategories, backfillBusy }) {
      const [rangeMode, setRangeMode] = useState("week");
      const defaultRange = currentRange("week");
      const [customFrom, setCustomFrom] = useState(defaultRange.from);
      const [customTo, setCustomTo] = useState(defaultRange.to);
      const [dateBasis, setDateBasis] = useState("updatedAt");
      const [projectFilter, setProjectFilter] = useState("");
      const [statusFilter, setStatusFilter] = useState("");
      const [priorityFilter, setPriorityFilter] = useState("");
      const [search, setSearch] = useState("");
      const [selectedFields, setSelectedFields] = useState(DEFAULT_EXPORT_FIELDS);

      const projectOptions = useMemo(() => [...new Set(tasks.map(task => task.project).filter(Boolean))].sort((a, b) => a.localeCompare(b)), [tasks]);
      const emptyProjectCandidates = useMemo(() => tasks
        .filter(task => !String(task.project || "").trim())
        .map(task => ({ task, category: inferTaskProjectCategory(task, "临时事务 / 其他") }))
        .filter(item => item.category), [tasks]);
      const range = rangeMode === "custom" ? { from: customFrom, to: customTo } : currentRange(rangeMode);
      const filteredTasks = useMemo(() => {
        const fromTime = range.from ? toDate(range.from)?.getTime() : null;
        const toTime = range.to ? toDate(range.to)?.getTime() + 86399999 : null;
        const keyword = search.trim().toLowerCase();
        return tasks.filter(task => {
          const basisDate = dateForBasis(task, dateBasis);
          if (fromTime && (!basisDate || basisDate.getTime() < fromTime)) return false;
          if (toTime && (!basisDate || basisDate.getTime() > toTime)) return false;
          if (projectFilter && task.project !== projectFilter) return false;
          if (statusFilter && task.status !== statusFilter) return false;
          if (priorityFilter && normalizePriority(task.priority) !== priorityFilter) return false;
          if (keyword) {
            const haystack = [
              task.title, task.project, task.source,
              ...normalizeExecutionItems(task.executionItems, task).map(item => `${item.text} ${item.feedbackNote}`),
              ...normalizeFinalResults(task.finalResults, task.finalResult).map(item => item.text),
              ...normalizeReviewItems(task.reviewItems, task).map(item => item.text)
            ].join(" ").toLowerCase();
            if (!haystack.includes(keyword)) return false;
          }
          return true;
        });
      }, [tasks, range.from, range.to, dateBasis, projectFilter, statusFilter, priorityFilter, search]);

      const summary = useMemo(() => {
        const completed = filteredTasks.filter(task => task.status === "done").length;
        const inProgress = filteredTasks.filter(task => task.status === "inprogress").length;
        const projects = new Set(filteredTasks.map(task => task.project).filter(Boolean)).size;
        const hourValues = filteredTasks.map(totalTaskHours).filter(value => value !== null);
        const cycleValues = filteredTasks.map(taskWorkCycle).filter(value => value !== null);
        const overdue = filteredTasks.filter(task => task.status !== "done" && task.deadline && dateKey(task.deadline) < today()).length;
        const totalHours = hourValues.reduce((sum, value) => sum + value, 0);
        const totalCycle = cycleValues.reduce((sum, value) => sum + value, 0);
        return {
          total: filteredTasks.length,
          completed,
          inProgress,
          projects,
          totalHours,
          averageHours: hourValues.length ? totalHours / hourValues.length : null,
          overdue,
          totalCycle,
          averageCycle: cycleValues.length ? totalCycle / cycleValues.length : null
        };
      }, [filteredTasks]);

      const projectSummary = useMemo(() => {
        const groups = new Map();
        filteredTasks.forEach(task => {
          const key = task.project || "未分类";
          if (!groups.has(key)) groups.set(key, { project: key, tasks: [], hours: [] });
          const group = groups.get(key);
          group.tasks.push(task);
          const hours = totalTaskHours(task);
          if (hours !== null) group.hours.push(hours);
        });
        return Array.from(groups.values()).map(group => {
          const totalHours = group.hours.reduce((sum, value) => sum + value, 0);
          return {
            project: group.project,
            count: group.tasks.length,
            done: group.tasks.filter(task => task.status === "done").length,
            inprogress: group.tasks.filter(task => task.status === "inprogress").length,
            newCount: group.tasks.filter(task => task.status === "new").length,
            totalHours,
            averageHours: group.hours.length ? totalHours / group.hours.length : null,
            updatedAt: group.tasks.map(task => toDate(task.updatedAt)).filter(Boolean).sort((a, b) => b - a)[0]
          };
        }).sort((a, b) => b.count - a.count || a.project.localeCompare(b.project));
      }, [filteredTasks]);

      const toggleField = key => {
        setSelectedFields(current => current.includes(key) ? current.filter(item => item !== key) : [...current, key]);
      };

      const exportRows = () => {
        const fields = selectedFields.length ? selectedFields : DEFAULT_EXPORT_FIELDS;
        const headers = fields.map(key => EXPORT_FIELDS.find(([field]) => field === key)?.[1] || key);
        return [headers, ...filteredTasks.map(task => fields.map(field => exportValue(task, field)))];
      };

      const exportCSV = () => {
        const csv = "\ufeff" + exportRows().map(row => row.map(csvCell).join(",")).join("\r\n");
        downloadTextFile(csv, `${exportFileName(rangeMode)}.csv`, "text/csv;charset=utf-8");
      };

      const exportExcel = () => {
        const rows = exportRows();
        const html = `\ufeff<html><head><meta charset="UTF-8"></head><body><table>${rows.map((row, index) => `<tr>${row.map(cell => `<${index ? "td" : "th"}>${String(cell ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\n/g, "<br>")}</${index ? "td" : "th"}>`).join("")}</tr>`).join("")}</table></body></html>`;
        downloadTextFile(html, `${exportFileName(rangeMode)}.xls`, "application/vnd.ms-excel;charset=utf-8");
      };

      return (
        <main className="stats-export-view">
          <section className="stats-panel">
            <div className="stats-filter-grid">
              <div className="filter-field">
                <label>时间范围</label>

              </div>
              <div className="filter-field">

                </select>
              </div>
              {rangeMode === "custom" && (
                <>

                  <div className="filter-field"><label>结束</label><input type="date" value={customTo} onChange={event => setCustomTo(event.target.value)} /></div>
                </>
              )}
              <div className="filter-field">
                <label>项目或类别</label>
                <select value={projectFilter} onChange={event => setProjectFilter(event.target.value)}>
                  <option value="">全部</option>
                  {projectOptions.map(project => <option key={project} value={project}>{project}</option>)}

              </div>
              <div className="filter-field">
                <label>状态</label>
                <select value={statusFilter} onChange={event => setStatusFilter(event.target.value)}>

                </select>
              </div>
              <div className="filter-field">
                <label>优先级</label>
                <select value={priorityFilter} onChange={event => setPriorityFilter(event.target.value)}>
                  <option value="">全部</option>
